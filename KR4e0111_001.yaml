body:
  text: 平橋藳巻一明鄭文康撰古風朝天頌戊午年纔辭南京館又踏南宫門下馬鴻臚報名姓早入大明朝至尊君門九重深幾許金殿瑤階浄如洗一朝忝作國家賔千載幸逢堯舜主皇仁浩如天皇智妙如神萬幾獨斷合造化重瞳一視回陽春自古日月光或遺覆盆下所以田野臣尚多建言者我願一人聖六卿賢天地定位中外晏然天下書生無可言梅雪詞梅花兮條條白雪兮飄飄雖氣味兮頗異慨清白兮同高我思古人兮遠莫可招夢寐周公兮神魂相交懷好音兮鸞鳯附短翅於青霄愛萱歌萱葉何青青萱花何盈盈花繁識土沃葉盛由根萌霜臺有客雙瞳清愛花惟恐花飄零花前歌舞花下行繡衣光與花争明我對花忘憂花向我欲語我心見花即歡樂花亦相迎共相與白日遲遲行流年遲遲過春歸花若老我心將奈何但願此花長在目老不遷官心亦足弔宋靖州通守江公墓宋靖州通守江公諱元字子明衢之開化人曾祖袞朝散郎宗學博士贈通議大夫祖邦光文林郎衡州常寧令父藏國學奏名贈奉直大夫公開祐乙丑射䇿丙科授廸功郎臨安府仁和縣尉積官至通判靖州年六十六卒二孤長廷玉廸功郎潭州湘潭縣尉次廷圭將仕郎公疾革語二孤曰汪冦餘黨尚存崑山有母家可依等語二孤從治命乃以淳祐壬寅塟公崑山縣須浦之原此皆誌石所書今之墩頭尼菴是也正統四年因築義塚誤發其藏好義者仍為掩之余聞而徃弔焉乃按淳祐理宗年號也二年壬寅元成宗大德六年壬寅順帝至正二十二年壬寅至我明永樂二十年壬寅又至今歲己未三紀零十有七年通計一百九十七年文康記崑南城外二里許叶一水遙遙是須浦浦旁有地名墩頭原是前人一抔土舊時土墩今已平鄉民尚喚墩頭名何年創作尼僧院近日攻開長夜城城中主翁愁見日露出城門一方石大書深刻數十行爵里姓名明且白世家云是衢州人托體此邦依所親誰道歴年纔二百桑田變海海揚塵君不見南渡諸君何失德山陵盡付楊家賊三泉機弩亦徒然讀罷誌文三太息瓶中紅梅鮫人暗處馮夷國織出丹綃如血色龍王竊奪龍女譁碎裂一聲飛作花鐵網千年沉海底網得珊瑚價無此翦裁不用并州刀五出妝成三尺高舶商載歸凍不折入手火星彈指熱君不見驚人豈在紅顔子鼎味元生清白裏瑞葵歌青青階下葵曄曄階下花年年正炎天當階麗繁葩今年種葵舊時地開出竒花共稱瑞天生瑞物多為人君家有之非草異明年種葵者躡上青雲梯赤手奪得月中桂醉向瑞葵花下迷人傳瑞葵事我歌瑞葵歌瑞物尚云少瑞人詎能多願君讀書作人瑞名與瑞葵同不磨承恩頌君恩重如山又若海水深臣軀等一羽承之詎能任薄才誤蒙收任使三載㣲勞何足齒玉音頒賜過褒嘉上及雙親下妻子恩從天上降明同日月光幽明思報苦無䇿但祝聖壽齊天長更願兒與孫盡為犬與馬為犬守宫牆為馬清塞野邊塵不動内廷安方遂區區感恩者送畨禺趙御史并寄何太守踈星墮江波鷄鳴曙光白驅車下長阪相送嶺南客客來一何遲客去一何廹來時雨雪交去路花盈陌為君折取河東栁情多更買河西酒人生傾蓋貴相得豈論結交新與乆我歌當暫停君輪從此發離别雖一朝途程須兩月風流文采何荆州吳山楚水曾同游遥將十載相思夢附寄行囊付與收虞啓東喪偶朝露易為晞佳人難再得雖云壯士心誰能免悽惻侍郎有兒當少年讀書不減梁鴻賢一朝娶得孟家女十年撥斷琴中弦未賦白頭吟先歌綠珠怨入門空飲合卺杯結髪竟違偕老願臼炊入夢事如何塟玉埋香泣素娥濕透青衫聲轉咽櫻桃樹下月明多賦得短歌行送張一清年年别家來上道天下名山半曾到能書能畫復能詩彷彿潘郎少年貎雙瞳㸃漆髯如油步趨輕舉神仙流銷暑愛眠白薤簟禦寒長著黑貂裘錦囊一方色如土此物人㸔共稱古常時擕置行李中盛貯瑤琴共梅譜平生懶上侯門書等閒虛度三十餘恥逐山翁跨黄犢從教學士懸金魚徃來厭殺人家俗每向禪房伴僧宿竹窻啼鳥日三竿起沐尚嫌眠未足一奴雙鬟如處女脱卻方言學漢語客來烹茗爇爐薰禮節猶能動賔主湖海交游多義氣獨我兩人尤得意相逢握手對君言自分我言君必記前年來醉蘇臺春去年去踏臨安塵今年春歸忽三載歲月無情多誤人莫戀江南春意早聞説金陵春更好買花沽酒須及時免使旁人笑將老思養堂鎮海衞指揮使武公政早喪父獨與母居追念死者不與生者同其禄以思養名堂開封鄭某探其情而為之歌靈椿未老彫風霜音容一去空高堂堂陰萱草喜無恙金英翠葉相輝光椿枯不復榮終天恨何極時憑夢魂中聊得見顔色頼此忘憂花歲久猶未衰花前稱壽花下拜愛花長與花相隨暮興羊棗思朝盡板輿樂北邙路雖遙西山日亦薄此心一日幾悲歡舞罷斑衣淚還落題舟人吹笛圖乙亥年客有持舟人吹笛圖求題者客因言太守昨日賞雪事因賦短歌書之去年遭水潦今年復旱暵米價抵珍珠薪芻貴如炭壯夫饑餓盡成鬼水上漂流不可算舟行此經過傷心忍回首沿江人家拆屋賣拆去大間存小半且圖茍延今日命肻顧明朝與來旦夫棄妻兮母棄子兄弟誰能不分散幸我民性良寧死敢思亂皆頼朝廷福使我如堵安笛中吹出總民情笛裏凄凉眼盡經一曲未終雙淚落使君酒醒好來聽思親詞人皆有父我獨孤人皆有母我獨無此身不知竟何得白日堂上將誰呼我非本無父有父疽背殂我非本無母有母歸𤣥都百年哀怨不可極仰天俯地聲嗚嗚羮牆未易即夢寐還能通精靈會有期永矢相為從我願丹青手寫出平生面思誠在敬恭對此一方絹不須徐肇返魂香暮暮朝朝與相見送沈秩下第還山中沈郎讀書如好酒終日喃喃不停口愈醉愈貪滋味佳半夜葩經猶在手沈郎作文如作畫萬象森羅同造化江湖鉅眼一見之争致千金來問價讀書作文未足竒胸中抱負誰能知立心要做三代士不數漢唐羣小兒相逢俗客腰懶折共罵書生太豪傑我言沈郎不獨鐡作腰請㸔沈郎心膓都是鐡昨日當塲選鄉試諸子競陳椒與桂滿前辛辣氣多烈掩却太羮𤣥酒味沈郎笑歌歸去來讀書更上山中臺人傳沈郎頗不樂我言此子器量非瓶罍勸君且暫居田野顔淵稱舜何人也來科奪取黄金榜上元壓倒紛紛先進者竹溪竹溪之水清且漣竹溪之竹多如煙竹溪主人懶出仕三十躬耕溪上田借問竹溪何所在西望玉山東近海一都門户五千家十代衣冠三百載城中有客過竹溪盡説王家風景竒風景雖竒何足數主人心事吾能知溪南溪北皆春水豈但樓船徃來此種竹不種楊栁枝非畏旁人呼俗子古人滄浪歌濯纓濯纓為怕塵埃生主人日日臨溪水要濯此心如鏡明竹林雖曰主人主常年亦聴都氓取掃葉為薪筍療饑貧寒開口何曾沮君不見七賢六逸風流師蘭亭修褉誇文辭煩君從事湯盤刻更讀少陵桃樹詩同鈍菴諸公弔李侍御墓樂菴江都人來作崑山客布衣三十餘言行皆道德王公名葆諡文毅雙眼如鏡明一見遂識人中英即令女弟侍巾櫛不乆竟成天下名州縣屢遷官臺閣薦膺職甘心民事恤饑寒苦口君身論闕失一朝謝病解朝簮托身便築圓明菴自言臘月三十日散塲似與禪和參哀哉三百年荒丘久無主猛欲問梅花梅花寂無語嗚呼白石爛滄海枯先生之名不可磨先生之名不可磨其二郭外東南隅行行僅六里土地頗高肥泉流亦甘美昔人愛此民風和王公薤露時來歌誰知興廢眼前事舊墳漸少新墳多楊生一鄉彦考槃在空谷官田時趂雨中耕父書夜向燈前讀樂菴之墓屋東頭人物吾邦第一流楊生懷賢憫蕪穢有時歲事來恭修斯文在斯人斯人不可作我欲薦梅花梅花已零落嗚呼三尺法天下知先生之封誰敢夷先生之封誰敢夷寄賀甫里嚴公寧五袠嚴先生隱者流胸中五車汗爾牛星軺物色卒未遇布衣將老東南陬宅傍天隨子學恥平津侯眼空四海百不憂平生抱負誰與儔今年已半百蒼髪雙明眸客星久不犯帝座壽星忽見弧南頭山中酒熟香可篘阿恒沉疴今又瘳銀篆盤鐡拄杖紛紛車馬來交游詩成醉飽飲未休我有一枝花贈君為壽籌伯玉知非年買臣富貴秋江水東馳無日夜蟠桃莫信癡兒偷要將忠孝名長留題張志和恒軒一壺懸掛閶門市不學壺公隱名字手持百藥親㕮咀調合君臣并佐使三因六氣將無同七表八裏誠難工診療時施七勺力笑談坐取十全功問君神巧何能爾家法相傳有微㫖利心不守守恒心起死回生端在此嗚呼民病全憑州縣治州縣幾人識恒字煩君磨礪古砭鍼鍼起貪頑作良吏送人歸養朝上北闕書暮登南歸途朝陽無意逐鳴鳳私情但願為慈烏軒車百輛清酒百壺彼何人斯中朝大夫送爾孝子還姑蘇君王今日恩上如天覆下如地鋪生死肉骨甦焦枯升堂母子重相見一家拜舞齊山呼白雲窩山中白雲白於月山中美人清且潔一窩小小在雲深高臥白雲如臥雪朝煑雲為食暮翦雲為衣美人不耒亦不機長年飽暖無寒飢下視塵界如汙渠我願山中人暫舍山中窩乘彼白雲游上都相隨紅雲捧帝座手招天上青雲徒共為霖雨遍寰區要見滿眼黄雲鋪要聴滿耳歌唐虞此時還山尋故吾收歛神功寂如無吁嗟白雲之窩名不磨朱絃詞我琴有絃我絃孔朱得之尚記結髪時入指聲琳琅照眼光陸離朝朝暮暮長相隨房中奏之無不合家人聴之無不宜無何三十年忽爾中絶東與西合歡曲連理枝一朝變作凄凉詞鸞膠不可致歲暮無還期朱絃朱絃兮繫我思安得新絃兮差似之陳孝子四川巴人僑寓京城陳孝子昏夜擊人誤傷死讐家擒父入秋臺鍜鍊獄成將棄市孝子寃聲如怒雷殺人者我親手為陳情伏闕獻天子勿刑臣父當刑兒天子臨軒觀奏劄念此誤傷非故殺况能求死代親身特命充軍饒重法古來孝行能動天開平之行無一年重逢恩宥還鄉里不是皇天誰使然天意君恩須記取刻骨銘心宜自許知君今日不忘親他日臨危肻忘主孫孝子滁人孫孝子遺腹兒生辰孤苦何其竒三年舅奪母志去父踪父影茫無知人有孝心天肻負舊篋公文天所䕶此中遺事宛然存方知父死邉城路孝子看來悲復喜和淚和愁戒行李彷徨匍匐向南奔瘴雨蠻煙七千里廣西山川浩如海况復丘陵幾遷改纍纍相似一何多知爾荒墳竟安在紛紛異夢來㝠㝠㝠㝠之中殊有靈一朝忽得一抔土鶴骨深藏元姓丁共言試骨當試血骨肉相投疑可决孫郎瀝指血如川漬入骨中紅不滅孝子歡聲震若雷解衣包骨抱歸來南寧郡裏新風景添得孫郎哭父臺俗禮歌有序崑俗娶婦俗禮可嗤者甚多若所謂跨鞍問龍進寶摟飯甑傳彩之類是也考之禮書一無所據不知自何時何人始耶今士大夫家不審是非安而行之畧不怪恥尚何罪於愚夫愚婦波頺草偃者乎至若討喜一事言之汚人齒頰此壻家以賊道待婦與婦之父母也瀆禮不經莫此為甚余為膏兒畢姻醮子親迎交拜合卺之外非禮之禮一切屏絶鄰姬里媼有不樂者驚聞駭問嗚呼名為士大夫者既不能行古禮一二以示人安忍蹈時俗之弊為其口實乎病中無事因其名而采其義各成短歌一章以曉之吾輩中能同心革罷亦移風易俗之一端也莫跨鞍新婦未到之先壻家設馬鞍於正門限上婦出轎令跨以入俗傳要平安須跨鞍也作莫跨鞍莫跨鞍莫跨鞍跨鞍未必家平安鞍高足小跨不過露出繡鞋人共看東家娶婦有鞍跨西家無鞍争笑話誰知一跨心膽麤亂走胡行都不怕嗚呼跨鞍不如不跨好俗禮紛紛奚足道莫問龍新婦到門其姑用染紅燈草三然火在熨斗内兩手執其柄又一人持大鏡一面同前問曰新婦何方來婦之從者答曰旺方來又問何龍入宅答曰寶龍入宅問已姑退而婦進謂之問龍作莫問龍莫問龍莫問龍問龍龍在龍窟中掀天頭角役雷火引入宅來何處容總使寶龍能帶寶誰解降龍與龍討只有煌煌頷下珠㸔得貪夫眼中飽嗚呼寶龍豈是池中物肻逐婦人同入宅莫進寶新婦入門問龍已畢其姑隨其家之所有或持白金一錠或持酒器一件與婦持入上堂復納還與姑謂之進寶作莫進寶莫進寶莫進寶進寶書中無可考婦家有寶當自進借取夫家亦何好古人眞寶眞可憐今人假寶徒紛然婦人孝順是眞寶進與舅姑無價錢嗚呼寶兮寶兮無爾獻三日入厨來進膳莫摟飯甑新婦從堂入厨庖丁用飯一升揑成銀錠模様以瓦甑盛之上覆以巾令婦開巾以筯摟開謂之摟飯甑作莫摟飯甑莫摟飯甑莫摟飯甑飯甑破時如破鏡甑裏深藏是何物摟出揑成假銀錠甑雖有眼喜無口入得門來便教摟少年新婦恃力强故向人前擎好手嗚呼莫教甑破不可為臼中免使良人炊莫傳綵新婦從堂入厨自厨入房家人以草席兩條布地號曰龍鬚席一巻一舒令婦步行其上贊者前唱賀新郎引導進房徹席不用謂之傳綵作莫傳綵莫傳綵莫傳綵兩席相傳禮安在媒婆前引伴婆隨傳入洞房齊喝采人家娶婦在傳家不在容顔如舜華前席舒開後席巻呼作龍鬚徒爾誇嗚呼新郎有綵莫鋪地留製斑衣老來戲平橋藁巻一
