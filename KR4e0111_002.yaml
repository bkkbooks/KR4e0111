body:
  text: 平橋藁卷二明鄭文康撰五言古田家作壠上有良田山中有茅廬良田供嵗計茅廬足安居朝出事耕作暮歸讀詩書凉濯茂樹陰飯罩清溪魚秋高納禾稼霜寒采薪樗三時力頗勞卒歲心還舒田廬固荒陋父祖遺業餘世守知幾年承傳今在豫追念先人艱豈易成菑畬雖云一方土重若瓊瑤琚我今享厚穫詎敢忘當初地偏夢寐熟志靜思慮虛明月至皎皎清風亦徐徐鵝鴨惱比鄰桑麻遍村墟舊榖歲屢陳新酒時常釃劵許貧嫗貸飲召鄰翁俱迂懶自成癖禮法誰嫌踈有心務本業無意干名譽韋布幸粗安矧敢懷軒車穢矣郭霸糞哀哉范增疽長歌畎畝中此樂當何如趙進士夢萱堂慈母辭北堂季子恨何極托彼堂下花對此長相憶俯羮不可見面牆竟誰即昨夜夢魂中分明見顔色覺來獨遑遑陰風邊塞黑義井鑿地得清泉泉香甘若醴入口齒牙寒煩蒸淨如洗百轉轆轤聲主恩深到底義橋伐木架危梁民無病涉者砥柱樹中流行人來四野渡蟻尚多功兹勞豈云寡落齒余年四十有九牙齒漸脫俗謂痞疳因考韓文公落齒詩年才三十六歲時為監察御史其詩曰去年落一牙今年落一齒俄然落六七落勢殊未己餘存皆動搖盡落應始止憶初落一時但念豁可恥及至落二三始憂衰即死每一將落時凛凛恆在已義牙妨食物顚倒怯嗽水終焉捨我落意與崩山比今來落既熟見落空相似餘存二十餘次第知落矣倘常歲落一自足支兩紀如其落併空與漸亦同指人言齒之落壽命理難恃我言生有涯長短俱死爾人言齒之豁左右驚諦視我言莊周云鶩鴈各有喜語訛默固好嚼廢軟還美因歌遂成詩持用詫妻子用韻記述非曰敢和退之未四十俄落六七齒作詩十八韻付之不得已余生忝為士隱獨愼動止視父固不肖行已頗有恥夙懷心腹疾久待旦晚死臨鏡照面目自疑不是已去年冬至夜節氣冷於水一齒忽焉落易與拔毛比旁者皆動搖參差不相似今年落漸多牢者無幾矣譬彼熟瓜蒂誰能强經紀嚼物苦及齦剔塞敢勞指糜粥與豆液百物此可恃自念始半百老態遽若爾親賔愛莫助候問空驚視情至亦可傷理明聊復喜天地有時老紅顔豈常美何以慰我懷願有讀書子秋夜宿山中分題詩四首分得紗帳禪牀淨如洗紗厨亦清素質比鮫綃輕色與狐腋妒聊爾蔽蚊蚋誰言障風露鈎懸鐘響朝窗掩日夕暮不用墜流蘇爐香自來度分得布被木棉非繭絲粗厚亦難壞裁成七尺被一幅三縫界公孫富飾詐老衲貧忍賣垢汲澗泉浣晴掛松樹曬時或禮如來橫鋪共膜拜分得蒲團良工斬澤蒲編織同屨捆外圓似多智中充如有本跏趺僧入定狼藉客醉混坐馬恐奔逸乘車防覆損獨有山中禪長年占安穩分得藤枕肌膚擅清凉骨格負剛毅上帶刀斧㾗中多黑甜味藉首睡至卯攤飯枕過未不霑脂粉香頗有蔬笋氣嗤彼邯鄲翁榮華片時貴匿名書匿名書穿窬伏梁之徒之造言也朝廷嚴立禁約律著令絞近有以區區姓名投諸里巷之牆以余不臧得罪於異已之人固不足怪向年南昌况公鍾守蘇日有投於門於堂於室者公笑曰汝敢投吾面乎公自處固是論以聖學似失反己之道余故作詩以見志焉友道尚忠告何為投匿名過愆得昭告自新路能行余生信多畏畏天尤戰兢舉目見神電側耳聞轟霆口有愚直言勢無趨附情獲咎或在斯辱教知自懲君當勿復作國典有明刑饗餘菴竹石七首父族本南山母家在湘水生兒有重質清風滿人耳共言弗簫韶終當柱下史歲改色不易世遠質難糜氣與霜雪競壽與天地俱丈夫在比德焉能較微軀衛風興歌德大易亦言介德者壽之基介內斯介外此志諒弗渝吾心久云泰神禹斧鑿舊湘妃淚㾗鮮天地亦有窮萬物終化遷但當遺形迹留與作者傳此君君共稱丈人人亦拜呼君復呼丈尊異無或怪聲聞若踰情誰能永多賴嶰谷有佳種荆山多異姿路遠人力難造進不可遲一朝幸入手夕死復何辭踈篁非楚材白石豈荆璞一備任公竿一充鶴鳴錯微物尚多庸余生久淪落贈客逸羽戀岑蔚潛鱗樂深廣既無繒􅗤虞且復遠罟網錦城固多樹龍門亦堪上所處己云適何煩起遐想笑歌北山文雲林振清響夢夏存良員外存良豪傑士二十登巍科功名與詞翰夙夜心靡他朝士紛如雲入眼苦不多謙謙義興尹弼誓言為藺頗南宫新陟階東廣已違和十年腹中書埋沒荒山阿孤兒托世父寡妻依病姑顓臾未足憂蕭牆起風波區區蝸角上白石尋干戈遂令萱荆詩存良有母子兄弟萱荆榮㑹詩卷翻成長恨歌質成遇匪人哀哉淚滂沱陳處士夫婦同日逝潁川陳處士年八十六與其配俞同日殁事具臨川吳餘慶志出世不同年謝世却同日同心結生前同歸在兹夕不作枝連理定作鳥比翼異彼中道者去化山上石紀載良可書相期永無逸挽范葦齊葦齊竒男子可望不可羈平生負孝義斷斷無乖離壯年事文藝出入黃金閨供奉三十載屢將榮遇辭建安最許可東里尤相知蕭然一儒冠朝野瞻容儀直道老彌堅清節貧弗移皓皓方寸地殷勤付佳兒念兹不可作淚灑墳前碑雲林卷身在雲林下心在雲林外林深白雲冷荷衣不堪賴牛羊滿田野風露夜未艾清境固朝夕幽懷豈能泰送范義莊北上北風吹高林衆樹枝皆鳴嚴霜遍郊野宿草已雕零寒氣日夕烈水澤成堅氷迢迢彭城驛舟膠不能行登車走曠遠輪轉煙塵生後山忽相送前山又來迎問程借宵炊聽雞候晨興綿袍勿嫌厚村酤宜自傾壯遊豈不歡况復觀光榮但念夙昔好歲晚難為情其二元昊有事日尊公在西陲有謀者三人負氣不受羈薄遊塞上觀經略能自期長嘯示已志賦就崆峒詩欲獻恥自售不獻無由知於焉礱大石鐵筆寫其詞壯夫拽以行三人哭相隨尊公忽有聞驚問何其竒召之與相見欲用還躊躇一人雖肻留兩人竟西馳尊公恐失士亟令急騎追追之不復返昊也倚為師家屬在隨州官司重羈縻一朝遣間諜矯詔來釋之作樂笑迎去吾曹被其紿連兵十餘年職此兩人為兹事載雜籍將信還將疑君行遇西士為我問當時七言古分得錢塘候潮送客還溫州錢塘江流平似掌雲散海門潮未上村雞啼遍四郊聲淡月踈星尚微朗帆檣滿目紛如麻候潮同坐江頭沙近郭鐘聲識僧寺隔江燈影是誰家衆中有客相依並訪我里居兼問姓自言家住樂清邑從小讀書期待聘先君舊日事文皇朝朝暮暮趨明光畫筆當朝推第一房山北苑皆尋常內外交遊多俊傑老大逢人猶折節一朝仕路各東西兩地書郵俱斷絶當時一人最知已道義忘形是君子年來宦寓在崑山曾致緘書託雙鯉囊琴載鶴遙相過舊情不減新情多花前對酒頻教醉月底談詩屢聽歌傾倒離懷將一月上道南還天正熱衆山拱揖俯臨吳一水迢遙曲通浙蘇杭相去五日程野花啼鳥如來迎前宵夢斷松陵驛昨日帆過檇李城夜來棲泊依林樾醉沐江風灑毛髮鄉心一片不容眠早起候潮將曉發須臾語罷潮已來舟船盡向江心開行到江南望江北欲付相思潮寄回廬墓兒神塘山陽敬亭北三尺高墳土花澀戚容滿面誰家兒向客未言先掩泣自言生身才八月黃口呱呱流乳汁可憐兒父在鬼簿催赴泉臺趨令急此時阿母方始嫁緑鬢紅顔踰二十一朝忽作未亡人無意獨生判絶粒哭夫橫抱似夫兒夫業有兒還可葺茹悲飲恨度朝暮鸞鏡鳯叉都什襲瀾翻劉向列女傳手寫共姜詩暗習寒燈不厭翦刀冷暑夜勤將麻縷緝共嘲壯夫既夭折弱稚那能保成立朱門衆子多下流况爾寡妻何所及母志堅持肻少動覆水難收終要拾八齡即遣就外傅髮綰雙鬟驅負笈束修纍嵗力經營筆劄隨時苦供給三餐同咬菜根飯井臼甘勞㸑躬執叮嚀告誡言滿耳一日辛酸幾回集從此操危又慮深幸爾成人在鄉邑母能守節兒讀書歡若卑官轉崇級百年光景等須㬰思報慈恩心汲汲誰知此念竟虛負母命云殂斷呼吸籲天叩地了莫聞猛欲下從無路入空將兩眼帶血淚灑浸松根土痕濕田間來取蓼與荼覆得新菴大如笠海枯石爛繫哀思何日何年忘鬱悒我聞此言亦悽慘下馬墳前頻慰揖為兒作歌兒謂誰關西孫子其名伋松竹篇徂徠之山山有靈四時秀氣隂冥冥中産古松髙百尺頭角怪異非凡形逢時開花吐香雪一寸堅心一方鐡嚴霜烈日不改顔風雨惟聞聲激切夢中肯上丁公腹浪遊之封徒自辱養成良藥在深根要與蒼生濟惸獨平生知己獨此君此君乃是虛心人直節略施何晏粉清標不汚元規塵般倕伶倫俱未來相逢盡說非良材誰知老天有深意暗施雨露加滋培一朝使者軺車動有司取赴明廷貢自緣生長草萊中不是朝家遲爾用姚江草堂草堂舊在姚江滸門對清流列環堵明窗净几似仙家中有佳人服勤苦養高懶去干州縣十載將心攻筆硯興來不賦散人歌閒時只讀功臣傳珠璣文繡撑心胸袖擕長䇿朝重瞳丹墀獨對五千字羣英誰敢爭前鋒長安陌上恩榮日從此金門遂通籍青春衣繡入烏臺寒郤當年讀書席客邊日夜長相思别來庭樹生孫枝清泉白石畫中景凉風踈雨燈前詩有時高望添惆悵夢魂飛到姚江上千樹桃花幾度紅半庭芳草元無恙去年懷歸奏明主曉叩天閽聽天語鑑湖賜與賀知章一棹南還特相許嘯歌重上江邊堂藤花落地莓苔香紗帽籠頭作堂主坐令蓬蓽增輝光尋踪訪舊多零落只有青山宛如昨雖云田野久荒蕪且喜松篁未蕭索未歸長憶故園春到得家來興已分不為草堂無樂趣此心一飯敢忘君題劉氏世榮堂永豐劉傑希秀舉進士而授官有年自鼻祖省元至高曾而下代有顯者道德節義滿人口耳豫采其實題其世榮堂使讀者知劉氏之榮在此不在彼也昔人文獻稱西江西江人物多淳龎山川降神豈無意生賢用世資家邦君家舊居鷲溪裏儒業相承近誰比清風高節滿前朝盛德豐功載良史省元奮發開後昆百年子姓俱蘭蓀東亭先生德尤厚天畀令器如溟鵾令器為誰諱鶚者早歲詞章播朝野外藩中祕屢遷官隨把丹衷向君寫可憐末路逢坎坷平時草野皆干戈間關奉命守韶郡撫輯能使民心和無何又掛將軍印駐節邊疆靖邊釁忠肝義膽付天知婢膝奴顔恥時擯元阼將湮不敢續大厦支傾非一木俯知時勢兩難為坐取文山傳來讀從容賦就絶筆詩英魂暗逐旌旗飛舍身下從巡與遠三軍血淚齊沾衣仁聲不減泰華重凛凛孤忠鬼神誦心田一片無寸瑕留與後人耕且種太學儒生乃其嗣東陽明府為孫子詩書浸漬卒有獲仁義栽培允堪恃熙朝啓運億萬年大開科目羅英賢一時君家五兄弟齊驅並駕相爭先纍世榮通世非少名節多虧無足道孰似言言百尺堂蒂固根深不傾倒瓊枝玉樹新成行後來門戶將尤昌僭題長句慶私幸還期過爾瞻輝光烈女陳若英烈女陳若英瑞州高安人受靖安舒璉之聘璉卒若英自經死時年一十九妾生未識檀郎面妾貌檀郎未容見兩家名姓各相聞妾始加笄郎突辨阿翁讀書官作郎兒郎從之親筆硯寒燈暑帳不辭勞飽學醉經將領薦阿翁遷官向南返子父相隨共家眷淮陰城下驛亭邊誰料因緣事成變珊瑚枝向掌中折道上人看淚如霰青天白日愁無光野魅山妖寒欲顫銘旌高表異鄉魄襦袴空留慈母線妾家遙隔西江水訃入深閨心膽戰不知眼底有人間望近黃泉離一箭橫插郎家雙股叉勇繫蘭房三尺練但求同化穴中土肻作孤棲梁上燕從容頃刻畢此身烈烈清風湖海遍乃知天性無古今堯舜塗人同一善請歌女子若英詩莫看太師長樂傳與葉及菴論商山四皓高皇暮年將易儲期期御史强沮之留侯從容肻直諌公義定滅宫幃私斯人平生仗多智預卜將來有人彘功成謹縮三寸舌推禍與人圗自避吁嗟四老真呆夫等閒誘出如嬰雛雖令太子生羽翼亦使悍后為屠奴先王一姬并一子一朝盡向砧刀死他年又召諸呂來此禍皆從老人始讀倥侗子補劉龍洲小傳用陳亮韻龍洲巨眼雙垂虹四海一望都成空有時痛發賈生哭血淚迸落珍珠紅初心甘老山中酒寢不成眠亦須走東南日月欲墮地渡江思顯擎天手洛陽田地本中原還我輿圗舊時有胸中十萬總兵器用夏變夷期可致從來好事苦多違十常八九難如意五國城頭雙臥龍中興懸望商高宗區區泗上一亭長仗劎猶能歌大風正爾艱難傷國步堪歎滿朝皆妾婦先將此輩酒飯囊大車來載斗來量此心未遂身先死郤把并州作故鄉朱氏雙節進士朱鉉二母早寡不嫁號曰雙節賦以贈之霜華夜度湘簾影玉兔寒沉簾外井孤燈雙婦抱雙兒淚結紅氷濕衣冷太阿出冶火星熱鋒鋩射人肝膽裂誰知兩㸃少年心同化堅貞一方鐡送錦衣劉公子往南京殘月雞聲曙光白寶劍金鞭帶行色緑楊堤上紫騮嘶一道風煙向南國南國繁華莫久留歸來重整舊弓裘君家世沐恩波厚好斬樓蘭早拜侯平橋藁卷二
