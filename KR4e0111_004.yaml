  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0111_WYG_004-1a, image: WYG1246/WYG1246-0551a.png}
body:
  text: 平橋藁卷四明鄭文康撰五言律春日偕龔工部過楊氏東郭草亭小小茅亭下隂隂桞樹多町畦接城郭花卉近陽和閣老題詩在遊人載酒過坐聽灌園者時唱太平歌過南溪翁莊嘉樹繞崇垣清流映蓽門治生餘粟帛供祭足雞豚詩酒間情寓衣冠古製存時時逢野老共話長兒孫城南夜集明月照髙秋城南昨夜遊行厨依緑樹長席近河流鷗夢芙蓉渚漁燈杜若洲荒間儘堪樂何必酒家樓白屋南京施進士題其讀書之處曰白屋蓋以公卿自期其期亦大矣雖然期其濟時行道可也期其崇高富貴不可也豫又知其所期已在此不在彼也白屋無媒地春來亂草深席門風自動圭竇日長陰袖有匡時䇿詩皆治世音一朝登紫閣慎莫變初心夏封君草堂埋骨荒山下於今已草年兩雛雙白璧三世一青氊髙行鄉人誦遺經弟子傳惟餘手栽樹長對草堂前屯田海上無烽火兵夫半入屯田廬皆得業雞犬自成村社飲翁歸舍春耕婦守門不知戎馬苦同荷主君恩敲棋所對客談兵處松風繞澗阿一枰消日月尺地起干戈世路機心險人情局靣多莫教輕下著一錯更無何代妹宜君哭彭餘璋配偶是前緣從君未五年兩周雖有子半世已無天大義身徒在深恩骨可鐫吾家舊詩禮敢負柏舟篇餘璋殁於正統癸亥十月六日此詩作於七日宜君死於十二日送彭伴讀復任藩府舊仙郎居官鬢已蒼晨興時伴讀朝退謾徜徉殘雪皆征路寒山總異鄉平生遂良願長得事賢王雲山客路多岐阻經春復到秋雲山千里目風樹一天愁鴈影將心逺江聲帶淚流明年寒食飯歸去灑松楸送張知縣之崇明憐君新作宰邑在海東頭家近書頻寄官間印早收魚鹽盈市肆蘆葦繞汀洲多少瘡痍者懸懸待爾瘳思鄉髙堂有華髮何為貪逺遊每逢吳下客頻問海東頭宦達固云樂餘生何足謀纍纍城下冢見説盡王侯與諸公酌酒燕趙多豪傑悲歌不暇裁素知黃祖性敢恃禰衡才酒盡月將落燭殘風又來下階成獨步惆悵一興哀哭邑宰鄭尊生痛哭尊生老雙親尚在堂負心淹薄宦遺恨付諸郎綵戲樂難再錦封恩異常斷魂招不返先已到襄陽其二痛哭尊生老滎陽共祖姬謬看如拱璧相愛若連枝愷悌三年政和平十卷詩自憐多病者和淚斂君尸病中戊午京闈榜題名得頗先授官十載後賜告七年前篋貯陳情藁囊存歷俸錢君恩深未報病枕夜無眠其二先子多名譽人稱偉丈夫病奄千日久命向一朝殂封殮煩鄰友扶持付老奴此心遺恨在雙眼漸成枯其三羣妹皆同母諸甥日漸多每從賔孰散頻向舅家過聚立年相若同行氣總和情懷好傷感棠棣不成歌其四三子雖豚犬相看抵萬金父書期盡讀母線要關心靖節留詩久徐卿種德深二公歌詠在一夜一長吟其五宋駕南轅日移家海上峯華原王郡非謬譜顯肅后諡是同宗世有儒書業門無酒保傭余生敢忘本書姓必開封其六從小稱知已當場總善文八閩廉憲副沈訥獨石老監軍盛氣味芝蘭合飛翔燕雀分近來消息杳惆悵賦停雲其七先祖留遺業山中有敝廬從教妻子纍肻負聖賢書太守朱勝知貧薄尚書李敏問起居若非守清節誰暇枉軒車其八七尺堂堂貌蹉跎鬢欲秋讀書期事主杖䇿望封侯正大胸中學凄涼眼下愁老天如有意未必此生休其九病髮風前葉紅顔雨後花閉門思義士看劍想仇家久斷賔筵酒頻供石鼎茶草堂雖矮小日日望京華其十四十當強仕年來頓早衰髮將鬚共白手與足同痿風雨燒燈早晴明就枕遲愁懷憑紙筆寫出盡成詩余有癖在右乳下已草五年丙子臘月八日大作痛劇不省人事數日幸家人頗信區區平日之言所謂巫覡僧道課卜星算之類一切謝絶此皆細君主之特附録於詩尾天順元年正月識病劇再韻卧病四年備嘗百藥頭髮盡落三齒已脫近又增劇似將謝世因誦舊韻再作十首時天順三年己卯三月三日百嵗居人世歸休相後先莫嗟將死際請看未生前跖老固多夀石郎空富錢余生已如此玄谷欲長眠其二一癖成堅物四年為曠夫自矜春未晚誰道歲將徂頭似坐禪衲面如行丐奴青天降時雨還可潤焦枯其三斂含固塞束濩尸良意多遭喪惟俗信講禮有誰過古制思收復今人事議和最憐相送醜前路擁笙歌其四鄒魯詩書語精如百鍊金古來三寶意亦説衆生心唐室沙門盛中原地獄深蔓延不可解搔首獨呻吟其五最愛藏身處崇丘背逺峯哀哀羊叔子表表郭林宗刻志錢宜備穿山力可傭行將營一室期與萬年封其六謬忝科名後操觚學綴文心思韓吏部夢寐鮑參軍草藁隨年積門生每卷分恐遺身後醜一火上凌雲其七里有狂巫宅人爭夜叩廬語言憑祟説符篆代神書左道恬無畏嘉名每自居西門懸望久何處候軒車其八花老不禁雨草衰偏怕秋繞山新土冢滿眼舊王侯大數有時盡細君終夜愁回頭笑相告飲泣且須休其九四時都市酒二月洛陽花日日常為念年年只在家婢丸燈下藥僧送火前茶到此方令悟無心老歲華其十百藥都嘗過連年不救衰艾經三日壯身覺十分痿擁被坐更永聽雞嫌曙遲自緣無睡苦不是愛吟詩自笑自笑乖崖子乖崖與衆違年荒飯不足病久客來稀檢厯傷人老調羮喜菜肥明年當五十只恐未知非清逸溷雜豈我事奔趨非我能身如臨水鶴心似出家僧入竹雪堪聽採花蜂可憎夜來讀無逸不厭濁油燈挽徐老翁百歲實難致近之能幾人平生方寸地到老一腔春文獻當時族衣冠太古民從今後來者何處望清塵送郡庠生赴部泮水遊歌日於今已十年蹉跎天府榜迢遞客鄉船歲月當強仕文章得正傳髙山須仰止只在范莊前題倪公禮隱居家近閶門市清風一草廬窗明人問卜山晚僕收書蓍老神龜守藝香宿蠧除靜眠過食肉徐步當乘車客笑鳩巢拙妻憐蟻甕虛城南炎熱地不識近何如和鬼仙詩五十韻有序鬼仙者晉陵澄江人身長而癯步輕而趨言鑿鑿如截鐵為人多才多藝於天下書無不讀於儒者事無不精雖小道雜流賤技亦多能為之常往來江湖間其為文章不造草落筆輒頃刻數千言不窮與客談笑自如遇紙盡乃已或有益以紙者隨多寡亦復盡所益已而讀之略不覺有重復窘迫語狀見者皆稱天才或求作古篆𨽻行書大小楷纍數日不少倦各滿所欲而去性惡酒點滴不入口鮮鱗肥肉亦不御蔬食之外日惟啜苦茗數十甌獨好服飾華麗坐此不免為小丈夫所議天順六年夏五月殁於北京僧舍秋官郎陸君孟昭買棺葬之今年春往往於故舊家假筆道平生敘契闊賦詩歌大意以離塵寰麗真府為樂嘗有五言詩五十韻寄余及汝南周德元章末曰招魂煩鄭賦降筆冀周傳倘得千金諾銜環報二賢人録至余所讀之不覺凄然淚數行下因念素辱愛厚許與奬借每勞動於口舌之餘幽明隔絶愧負愧負兹者安敢無言以答雅情敬依用韻次第和就聊當招魂之賦第篇中韻同者四句豈隂冥别有體製與人世間不同耶不然何生前信手纍百韻而無此失也然終不敢以此自解輒敢忘其固陋僭取四字可以承接詞義者易之不審可否原韻五十有一題稱書懷五十韻寄介菴易軒二公此舉成數無害也鬼仙周氏曰慎菴曰呆拙子曰江湖散人皆其别號云憶昔初通贄雞盟訂自天姓名雖久識邑里各相懸傾蓋衷腸合分襟夢寐連竒才駭神鬼浮議謗迍邅翠羽悲鸚鵡紅顔落杜鵑瘦因粱肉減忙為藝文纒暑閣朝橫膝寒齋夜聳肩扇搖倭國紙被擁日南綿寶玉深藏璞驪珠暗在淵未逢宣室召甘向茂陵眠經史心俱醉王公眼盡憐長庚重孕白司馬復生遷蹤迹多方到風波幾處全反躬思寡悔搔首動追愆路口彈長鋏江心補漏船自緣三島謫敢望九霄騫雅操堅如石生辰薄似磚四時恆暘若雙眼獨醒然燕寢凝香處清霜點鬢年詞章誇敏捷篆籀擅窮研夢繞江湖上身依客旅邉韜光封鏡匣病緩佩弓弦孤比懸崖竹清同出水蓮放歌來樹底舒嘯立山巔命僕呼聲煦逢人禮貌虔煙霞成痼疾筆硯是良田到處詩名播誰家酒債牽樓船粧雪洞白馬覆紅氊纓濯滄浪水茶烹義井泉土抔揮鏹楮木偶視豪權噦噦丹山鳯行行陸地仙蓬瀛三萬里錦繡幾千篇厭俗常居寺談空慣問禪善書修殿記不受賣文錢誤愛豫多幸相過意每專時從雞黍約共話結交緣畏飲杯浮毒雄談鼎沸煎書筒踈未久訃札報何遄仙子形骸蛻臺郎道義堅斂含依法制冠履擇新鮮精爽還鄉里悲愁滿市㕓貞妻渾欲死令女半成顛天泣霜華降風號樹影偏仙班仍入籍靈性了無眩神逐鸞箱下幡隨鶴駕旋藥方真索隱詩句愈鈎玄海鳥歸華表門生掃墓阡沈沈寒食雨淡淡夕陽煙已説登佳境無勞歎逝川招魂今日賦遺事後人傳正直聰明者皇天不負賢平橋藁卷四
