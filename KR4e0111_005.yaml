body:
  text: 平橋藁巻五明鄭文康撰七言律奉天殿早朝禁城漏盡九門開喔喔雞人報曉來燭影遥連堂上樂鞭聲三衮殿前雷羣隂伏地天顔喜萬歲呼山御輦回文武滿朝忠與義謾誇賈至有詩才正統己未㑹試中副榜辭授教職特䝉俞允一官辭謝冐嚴威聖主恩深特賜歸鶴髪有縁重聚㑹鵷班無分得留依九重宮闕瞻天近千里家山見鴈稀非厭廣文氊冷澹恐教塵滿老萊衣贈道者曾向仙壇赴逺招手持符籙下雲霄誰人葉縣雙飛舄何處秦樓一段簫罏鼎有丹傳弟子江湖無路覓松喬從君願借降魔劍斬盡花間月下妖有道者作符篆頗有小驗因言飛昇有術予笑而不答愚意王喬蕭史等事文勝質史家常態雖言不與合亦索吾詩詩中曰誰人曰何處曰無路皆寓恐無是也之意觀林松谷遺像晉人書法盛唐詩曾向人家屢見之故老怕談參政事諸生痛哭授經師華亭城外松連谷文筆峯前樹掩祠遺像宛然多歲月仰瞻還動後人思遺民縣城南去渺江津煙水滄洲杜若春百畝園田供祭享幾家雞犬聚比鄰功名不入閒邊夢鷗鳥如知物外身不是聖朝徭役簡豈容林下有遺民甫里留别管金祝韓唐諸君子甫里繁華照市明况多人物負才名青春詩酒平時社白晝絃歌到處聲唐士昔居元有宅吳王此地舊無城行隨流水登歸棹一路居民識宋清林東齋居溪流一曲繞柴門屋後園田有路分莊在輞川成故事客歸盤谷見遺文借書夜讀三更火聽鳥春眠半榻雲堪笑幾人雙健足毎於城市報新聞送鍾司訓之黄岡才名曾聽振文塲共喜除官近故鄉鐵甕漸遙知白下竹樓將近是黄岡沿江煙草隨舟綠夾岸楊花撲靣香到日不須騶吏候諸生執贄繞門牆送李寺丞弟還弋陽落花飛絮繞都門送客將歸祭水濵行李祗攜三尺劍錦囊賸貯百篇文官橋駿馬衝塵去禁苑流鶯隔樹聞同譜有兄居近侍莫因鄉國久離羣挽丁行人璿袖拂長安馬上塵少年曾醉杏園春官船夜載三更夢使節長隨萬里身天上玉樓應妄説道傍黄土自傷神可憐臺省同年伴遍數升沉少一人和簡菴沈少卿題畫書法淋漓滿巻中眼前生意與真同當朝名筆應多在前代遺縑尚未窮翰苑品題文耀日賔筵展玩笑生風古來獨有監門者畫出流民第一工賀甘别駕弟歸衢州甘别駕失其庶弟宻數年求之不得一旦遇於都市乃知被盜所鬻贖而還之賀以短章西風吹冷鶺鴒原失卻孤鶵衆所憐已分塤篪成獨奏誰知華萼又同妍夢回喜得西堂句事往休歌杕杜篇今日掌中珠復得若翁含笑在黄泉送吳司訓之辰州吳廷實自永樂庚子應試連七科不合主司之格年近六十始得訓導辰州賦以送之辛苦平生萬巻書辰陽博士得新除腰錢已跨揚州鶴貰酒先嘗漢水魚門下諸生多館閣眼前同輩久軒車嗟君莫恨功名晚梁顥才華更有餘挽季教諭室簟笰軒車不再逢萱花香冷繡幃空家居不變江東俗宦寓羞聞鄴下風井臼勞心甘白首鸞凰沉影怨青銅夫君書罷𤣥堂石膓斷寒山暮雨中挽袁宗魯母袁宗魯之母徳剛之室年三十一而寡九十三而殁賦以挽之藁砧客路作長辭孤負紅顔與歲時身保一生心似鐵年登百歲髩如絲遥山逺水從誰弔苦雨酸風只自知地下若逢先主問已將全節付佳兒挽平湖沈御史結廬當墓近黄泉苫塊將除骨已仙合院舊僚傷往事兩京新進哭同年尚書有表名長在僕射無兒事可憐留得幾多章疏藁難兄和淚為重編挽長洲翁叔昂鶴髪童顔太古形不資丹石駐頽齡平時道誼心常在浮世風波眼盡經漢室曾頒三老帛廬山不見伍喬星幾人淚灑墳前樹來讀中郎石上銘過鹽運副使陸公故第年纔二十宰遐方中歲遷官入建章去國共憐雙短髩到家惟剩一空囊髙堂親壽時頻祝北闕君恩老未忘富貴消沉人事改翟公門巷亦凄凉刺䑕崇墉夏屋慣穿登此物人間衆所憎相體本無毛骨異養生全仗齒牙能飽餐公廪頻年粟渇饜私房徹夜燈可奈烏圓共眠處任渠無忌恣憑陵寄同年謝騫御史纔向瓊林醉綺筵又乘驄馬下南天臺中老吏稱多學路上行人説少年環珮暫離雙闕下封章頻到五雲邊春來行盡江東郡一路停鞭解倒懸十月十七日堂上仙翁去不回升階愁見舊屏幃蓼莪未讀眉先蹙霜露初寒淚已揮幾夜音容隨夢散半生菽水與心違若教化得遼東鶴莫待千年及早歸送廣東方憲使入京萬里遙瞻尺五天夢魂先到御堦前袖中奏藳皆民瘼擔上行囊只俸錢旌節曉衝梅嶺雨軒車寒帶薊門煙重來莫負南人望要見貪泉變醴泉同錢户部登山使節遙臨曙色開蒼苔白石路崔嵬藤蘿遶澗峯千尺松竹當牕酒一杯鳥識歌闌隨客散鶴知茶熟伴僧來四郊莫道無荒土還有飢寒遍草萊和王侍郎一寧留别濬縣魏少尹肺肺垂楊渺渺河平川驛裏暫經過白頭天使鄉情好青眼仙郎舊話多候吏幾人沙上立新詩八句酒邊哦知君共有蒼生念細説民艱奈晚何諸兒燈下請説書因以示之家居通徳舊儒門南渡衣冠十代孫闕里經書皆實行考亭章句盡真言犂牛曽見生騂犢良馬還期出大宛嵗月無情容易過莫教人笑改金根通徳坊自縣治南酒坊橋下西至高平橋是也元州博浦城楊譓玉峯誌内載通徳坊在鄭大資府前云大資者以億年為資政殿大學士也宋人稱龍圖閣學士為龍學集英殿修撰為殿撰之類皆從省文稱呼我朝福建島尾巡檢徐启東居通徳坊内景徳寺左宣徳初其子上舍建安於圃内掘出斷碑一塊是吾家故物上有八世祖凖刻先世事一段凖乃大資嫡孫疑徐氏所居即吾家舊宅一隅也舒筠澳春日見過燕子東風栁下門澹雲微雨浥輕塵南山路逺移舟過北斗名高識靣新理學忘眠談入夜夀容得酒醉生春重來不用重相約同是斯文即是親題陳通判和氣堂棠棣歌殘小雅詩弟兄聚首話連枝遺言不負先人訓世徳真成後𦙍師春雨池塘芳草綠東風簾幙紫荆垂同心自有同聲處聽取塤篪口畔吹同朱道人孫紹先周徳元過廣慈菴近水招提也自幽好山只在殿東頭天花香散庭堦雨簷樹凉生枕簟秋野老辭家容入社縣官出郭愛停騶梅花牕下僧靈澈笑倒貪夫老未休觀學愚先生遺像永樂四年進士銅鞮太守斯文主松谷先生後學師及第文章存舊藁過庭詩禮記當時功名到手煙雲薄忠孝存心天地知前軰典型今漸逺仰瞻遺像一嗟咨次宗能韻君家兄弟好規模不忝徐卿二子歌為客偏驚秋信早寄書無奈雨聲何城東流水還家近橋北青山入市多半月小樓詩幾首郢中音調許誰過贈周傑萱花凋謝北堂隂霜露頻驚孝子心幾夜夢魂隨雨散四時哀怨逐年深鏡中人去塵生匣窻外烏啼月滿林留得桮棬是遺物難將春酒為重斟瞻王憲使遺像少從故老問平生共説當時最有名鐵靣屢驚朝士膽赤心頻動聖君情十年憲府如山重三品官囊似水清遺像雖無生氣在舉頭聊當識韓荆題上洋沈翼南槎軒一軒瀟灑枕清流彷彿靈槎水上浮春雨隨潮迷浦溆夜燈和月照滄洲鄉人共擬天隨子野史虛傳博望侯張騫乘槎事本傳不載富貴功名元有定莫將詩興托楊舟題周寺丞雙壽堂靈椿埀葉晝隂隂下有萱花歲月深堂上兩人雙白髪朝中一子萬黄金風流賀老仙人骨書史曹家女士心命服駢肩逢壽日南山詩在為重吟為王同知題夏太卿萬竿煙雨圖容臺仙老歲寒姿慣寫瀟湘玉萬枝近水煙梢㣲有影隔江雨葉遠含滋鳥聲多在黄陵廟草色遥連屈子祠别駕退公來看畫為君重詠五紽詩登薛烈婦塚城南湓瀆舊時居粉閣猶存地一隅狂物自罹三尺法佳人兼送萬金軀夕陽陵谷煙雲變寒食荆榛雨露濡使者觀風無暇問土中埋没夜明珠分得黄旛綽墓送客天寳年中一老伶孤墳三尺舊題名沉香亭畔曾供奉太液池邊得從行蜀道馬騑塵袞袞棃園人散草盈盈置君夜雨淋鈴曲三疊陽闗自有情分得西花園送客西園春暖樹參差曾向園中共酒巵對靣鬭來新葉子隔河呼出好花枝合盤佳㑹逢時約橄欖餘甘入夢思他日歸來温故事還尋石上舊題詩讀及菴寄詩及菴在廣中寄至水東詩集一帙其於交游中寄荅之什甚多獨於余無二三焉蓋失投桃之義也讀畢附題巻尾錦心繡口出天資况復青年際盛時塞北嶺南多著作燈前馬上費尋思紀行别有開封藁畢巻當題絶妙辭不是故人踈賤我自緣深厭倡酧詩讀楊鐵崖集鐵崖自許謫仙人又説前生小李身史冊鋒鋩明日月文章光焰射星辰江州總管誇同榜南國諸公識舊臣只恐遺編千載後存亡不及宋頭巾甲申元夕夏太卿席上新城張大尹誦燈詞但願年年慶此宵句余為足之三十六燈明錦繡畫堂頓覺晚寒消花前鼉皷三更月桞外人家幾段簫白髪仙卿春未老銀筝玉女醉多嬌隂晴風雨從天定但願年年慶此宵趙松雪家垂雲石太卿得之賦詩次韻温如荆璞濕如雲松雪齋前舊所聞大地分時元有質南山覓處更無羣雨中謾遣書僮洗竹裏曾教學士欣回首平泉莊上路斷磚殘瓦正紛紛錢節婦葉與中與予言航練涇節婦錢氏年廿六而寡今已六十餘瑩然無玷偕往拜之端莊静重雖老尚然因題其壁畫船撾鼓渡江沙江上來尋節婦家壽相自於鄰媪異鐵心頻聽族人誇早年薄命輕如紙末路榮名穏似車莫怪到門輕下拜要令田野辨龍蛇訪錢君濟錢君濟家住大澞浦頗幽雅詩寫其景大澞近在小澞西此地君家水竹居兩岸垂楊分聚落一灣流水灌菑畬人沽小店頻驚犬鷺立渾潮不見魚早治浦傍蕪穢路明年容接長官車謝歸叔度歸叔度年九十六前輩中夀之最高者惜予久病累辱記問小詩荅謝薄伸下情國號新開氣運全生辰正在戊申年蓐中已卜為人瑞海上終看作地仙四子七旬成老大一家五世聚曾𤣥勞君愛我頻相問三絶慙非是鄭䖍哭同年張節之提學戊午年中總妙齡京闈秋榜忝同登狀頭卻被殘形誤䇿手頻教大老稱提學情懐濃似酒傳家衣鉢薄如氷移風易俗空賫恨不是無能是未能其二正大胸襟古怪姿南都佳士重當時生憎佛老添荆棘坐笑楊朱泣路岐向客愛談三代禮在家長誦二南詩腰金已遂平生志尚有餘情自可悲久病遣懐受病日久百體廢職獨一右眼瞭然無恙甲申初冬亦復變異黒眼上反直視不動醜惡日増無可救藥坐成短句聊遣悶懐共言雙眼似先公更許精明有父風三日乍昏微見膜一睛驟反半無瞳心牽邪色羣神怒人到中年百病攻正欲静觀天下事舉頭深恨視夢夢覽鑑怕將明鏡照衰顔一照衰顔一惘然尺頸漸長如瘦鶴半頭盡秃似枯禪道逢逺客疑非我人困沉疴卻是天獨有光明心一㸃不隨容貌變初年送徐士恂崑山徐忱士恂為學官弟子經熟而文竒意其取科第不難也近被御史逐吏太倉衛學古之君子處富貴聲色不為之大處貧賤聲色不為之小隨小隨大此賤丈夫之所為進退榮辱豈我所能保哉余恐士恂怠於學也故作詩慰解之脱卻儒冠換吏巾十年辛苦向誰陳暫從新例司刀筆莫怨前程訴鬼神遇客謾言成朽木讀書還待作祥麟王嬙本是傾城色愛惜黄金自誤身郭西田家郭西十里路非遐百畝腴田兩部車科斗池塘魚似蟻清明時節樹皆花桑隂社散隣翁醉塲上秋登稚子譁莫向長安歌此曲幾人憔悴正思家南戴田家不為功名戀鎻韁布衣甘老在南陽百年茅屋傳家物一巻農書教子方細栁髙牆江上宅野田荒草雨中羊東鄰西舍皆良善卻笑他州有互鄉沈東軒竹石聞説君家景趣幽東軒竹石映清流萬竿蒼玉松煤潤一塊𤣥精墨瀋浮舜世移根從嶰谷禹時充貢自青州虚心盡日當牕立重質何年此地留十載子孫多似簀三春苔蘚滑如油月中風舞顛鸞尾歲晚霜凝睡虎頭借看屢招坡老軰拜呼頻見米公儔聲敲環珮星芒夜骨露瓊瑶鶴夢秋席地醉眠憐翡翠引瓶磨洗厭蝸牛謾期别墅開三逕誓向平泉占一丘挑筍旋燒供茗椀束薪爛煑對吟甌明當直造林深處鐫刻新詩記勝遊平橋藁巻五
