body:
  text: 平橋藁卷六明鄭文康撰記贈資善大夫工部尚書王公神道碑隂記熙朝受天景命君臨萬方禮樂休明中外寧謐於兹八十餘年仰維列聖聖德神功之大是亦國有仁賢之衆也正統十四年秋七月額森造悖天之釁肆犯邊陲守臣羽書以聞太上皇帝謂承平日久一旦有此大憝恐震驚臣工乃親帥六軍征之八月內豎悮事旋師至土木師陷文武從臣死者若干人工部右侍郎崑山王公永和用節其一也明年庚午皇帝即位改元景泰贈死者爵有差公為工部尚書階資善大夫官其長子汝賢大理寺評士存殁之恩嗚呼盛哉公訃聞時淑人陸氏在京邸頓絶數四憤罵曰恨為婦人不能斬賊萬段以雪恥遂感疾亦卒汝賢奉公衣冠及淑人柩合葬焉竊嘗論之天之眷愛國家奚以知其然必多生忠義之人於其國蓋忠義者天地之大經也國之強弱治亂存亡繫焉廣土衆民利國之資也金城湯池衛國之器也民土之利孰若忠義之為利金湯之衛孰若忠義之為衛恃此則得恃彼則失此古之王者不以民土空虛為慮而以忠義空虛為慮不以城池堅深為樂而以忠義堅深為樂也夫人臣之忠莫大乎死難而尚書盡殉國之忠婦人之義莫大乎憤惡而淑人盡殉夫之義忠義出於一時一家之人夫何不能懾伏外寇俾其奔走竄突之不暇哉雖其闕之心闕之行未必不知國多仁賢忠義固結不可易為搖動也謂其不達乎此何尼瑪哈有南朝死節者惟李侍郎一人之言而輕宋耶是知天之眷愛國家多生忠義之人股肱王室則以之扶持綱常則藉之也嗚呼文康公之里人也嘗聞里之長老言公之先世履禮蹈道元季時羣雄擾攘吾崑武斷鄉曲者乘時彌道公之大父允吉父子禎獨能退然隱伏里中以待天下之清入我國朝向之土豪村霸芟刈殆盡而王氏之門巍然自如逮後二公皆膺侍郎之贈此天生尚書固為國家亦積善之攸報也或曰天既報之何又毒之罹此不幸耶豫曰不然一命之士食升斗之祿恆以許國為心矧尚書公任為國卿當車駕蒙塵之際睨彼醜類既不能醢其肉而粉其骨奚庸生為哉君子有死為幸不死為不幸者豈直老死牖下然後為幸哉今朝廷贈死褒生上以發九原之馨香下以感百世之豪傑使後之人過神道之下知為有明忠臣義婦之墓凜然毛髮森豎俯伏致敬不敢褻視謂之幸乎不幸乎文康記其略而繫以論淑人固古之女士尚書神魂吾知其為厲鬼也夫李神靈應碑記沙溪延禧院有祠曰李王祠王湖州長興人生有異相年十八告其民曰吾將適山東膠西無還期矣無疾而逝事在宋景定間民以為神立祠肖厥像祀之凡長興之水旱疾疫必與神禱神受禱必輒應理宗入繼含山人潘壬潘丙挾濟王謀叛理宗怒將屠其城帝夢白衣者曰臣李姓吳興土神也亂者潘氏兄弟盡屠民何辜帝怪其事而止今之民於長興者皆當時老死牖下者之子孫神之惠莫大焉常熟致道觀亦有神祠至正壬午民大疫相率來庭下取柏葉與井水啖飲之民得不死載於前元甬東顧盟崑陽鄭東所撰致道紀績碑刻如此常熟距長興四百里不知致道延禧祠何始耳沙溪之民曰王文富厥子恭嬰滯疾醫將弗藥文富惶惶走祠下泣且訴曰文富一編氓天與愚直敢隂謀以壞心術敢陽善以欺鬼神訴或神誣請受殛無所怨望脫可矜恤神能生人之死吾兒命在旦夕何獨不賜其生乎駿奔肸蠁之餘若有答其誠者踰旬恭果獲瘳文富欲示神惠於若子若孫若曾玄雲仍若長興之民之子孫謀文載諸石以永厥傳余因而歎曰神之惠固多在人神未嘗妄施人亦不可幸得也人知神能生人之死不知神能置人於死文富之訴曰敢隂謀以壞心術敢陽善以欺鬼神有若人焉雖其疏逺尚將眷佑之矧其子乎此神施惠為有道而文富孰謂其幸也茍非其人非禮以干聽淫祀以徼福豈神之志哉余贊述靈貺於其末曰必如文富之言而後可禱禱則無不應也東溪舊隱記永樂初福之長樂有隱君子曰李仕蟠先生居東溪之上不求聞達窮日夜之力盡取先世遺書讀之積數十年其心直欲搜天下所未見者盡讀焉旁求博訪幸有所遇雖厚直易之弗較先生讀書務行其言非直讀以求知而已故先生古心古行東溪之人皆曰先生非東溪之人東溪之古人也凡書之要語斜行細字書滿四壁隨起隨坐三復玩味恆曰此非古語蓋古人之得吾語也寒燈暑雨立二子於旁教之有問者曰子盍仕乎先生曰至樂莫如讀書至要莫如教子讀書教子將以立仕之基也後先生謝世去二子孟玉叔玉先後舉進士孟玉教授潘王府叔玉主户部事朝廷以叔玉貴贈先生如其官噫先生之志成矣叔玉切念東溪者乃舊時隱居之地杖履雖往遺業具存考流風餘韻與東溪之水浸潤人心愈久愈滋徘徊瞻望寧不繫遐思乎因先生自號東溪乃加所居之名曰東溪舊隱間來請記嗚呼君子之隱非樂為之也多出於不偶焉耳不出於不偶而樂為之者豈其知命歟知命而能讀書教子此其處隱而待顯也今叔玉顯先生之隱先生之顯其致於隱哉雖然居東溪之居者顯其隱叔玉已然矣顯其顯又有望於後人也東軒記東軒者太倉沈宗海行樂之所也軒在城南張涇上風帆沙鳥日接於目畦蔬園果四時取給軒遠近之景可樂也誦詩讀書以修已業雅歌投壺以娛賔客軒朝暮之趣可樂也宗海居是軒也豈樂一已之樂哉兄弟綢繆內人諧和奴職耕而婢職織樂一家之樂也州縣亷明四民安業芻糧頗饒宵柝沉響樂一方之樂也一人尊而中外靖老者安而少者懷惟正之供不加毫末樂天下之樂也宗海之樂不但一已而又一家也不但一家而又天下也其心無時而不樂也抑不知其亦有時而不樂乎蓋亦有焉軒之庋有遺書取而讀之手澤之氣存弗樂也軒之匱有杯棬焉取而飲之口澤之氣存弗樂也然則宗海有時而樂有時而弗樂雖然子由謫髙安創東軒自號東軒長老子瞻因其壻過焉寄詩曰贈君一籠牢收取盛取東軒長老來子由復之東軒只是空虛物何處人家籠解盛今宗海有冠帶之榮無貶謫之禍東軒無事乎籠取時雖或不樂而終未嘗不樂也薛將仕祠堂記將仕姓薛氏宋季人吾祖宗舊題其主曰外祖薛三十將仕神主蓋三十疑是行將仕疑是官階或曰宋人多以雙數加諸名字之上以承事朝奉之類為通稱則三十與將仕又似非行與官階將仕善醫産錢氏初得其術吾鄭氏又從錢氏得之至今崑山村氓與鄰封之人直指吾家為薛醫産家不知久為鄭也將仕之術之神在當時可知自祖宗來傳習其術二百年雖有春秋二祭以報遺澤竊慮姓氏再易精神不能與之流通欲計其逺且大者為之歲癸酉側室潘娠彌厥月余小子拜舞告將仕曰幸男當嗣公已而達然果男愚意將仕在天之神必默受之因名曰受今已七年矣知覺日生頗能拜跪余欲委領歲事乃立薛氏祠堂易書其主外祖為始祖沒其姓餘仍祖宗舊書祝板改曰孝曾孫受庶幾將仕自今以始得醉飽焉此祖宗與豫小子之志也嗚呼將仕有神寧不使受有成乎脫有成棲神之堂當從禮制而改圖將仕之主雖澤斬服窮毋得遷毁如吾祖宗故事受敬聽之哉堂成謹以為記晏公靈異記正統三年秋九月四日余與張和節之夏遂存良南京領薦還渡揚子江舟入中流而風作勢漸猛惡疊浪如山舟中之人皆失色余三人書生且年少自分必葬江魚之腹有鄉翁朱彥達者同載乃大聲連呼晏公舟中之人從而皆大呼之頃間覺舟若蓬旋轉者再似覆狀遂定不動起視之在叢葦中四靣皆葦環繞望不可盡問舵者亦莫知所至也計故處罔知何在嗚呼誠靈異哉明旦風恬浪平移舟覓人家酤酒酬神衆皆鼓舞笑歌始知有生矣因記嚮年朝廷有事西洋日中貴人經劉家港謁神行宫見其對土木像若君父然有彭指揮者稍弗謹箠之幾死聞其羣從言神於江海無乎不在呼之則火至火至則無虞余時為贊者且信且疑以今遭值揆之非神威靈昭著何以使人畏敬奉承如此哉前光祿寺署丞崑山李謹有常因南郊得罪謫交址還談神亦嘗為漕運南謫借宿之夢尤為駭異李又云至今南人歷歷能道文康謹筆所見所聞所遭為記詩曰中心藏之何日忘之非神而誰是月望日開封鄭文康謹記泗橋潘氏姓源記崑山泗橋潘氏與太倉亭子後殷氏在勝國時皆以資産稱雄於鄉且有㜕方國珍寇海上首劫殷氏男婦皆竄匿草野獨一十八歲處子被執以白刃礪頸上問藏金處處子懼指示之盜發十八甕去寇退殷乃移其家依潘而居適潘之主者祥卿老無子殷為擇一九歲子後之名紹宗今之散居泗橋沈巷者本殷姓也紹宗既壯鄉民推掌萬石者四十年家日益大牛羊倉廪肥腯充滿家人駕巨艦往來江漢為大商者十數輩時朝廷選實閭右通縣無與肩者由是紹宗之子日新在遣自後少者未立而老者繼殁事殊世異家遂凋落矣此潘之大略也亭子之殷罔究伊始自遭劫後未幾何時星散煙滅一支徙居常州城中今不知何在潘氏雖微而日新之子竒號桂林更守儒業開門授徒覓饘粥自贍不知殷氏其先何為而遽爾也國初咸陽教諭殷孝章亦太倉舊家與弟孝揚博學古行教諭公有文集行於世今其嗣孫現居北門為儒生桂林翁年已六十餘豫嘗問之翁之先太倉舊家教諭亦太倉舊家豈教諭與翁同一族歟桂林不能知也桂林四子瑛琇璡瑩瑛之行已百餘指豫嘗俾其擇一秀敏者復殷姓且囑曰此急務非細故又許翁百歲後重以此事刻諸墓石庶來者有考焉藝軒八詠記崑城南下二舍許曰安溪民居稠密雞犬之聲相聞達乎數里旦則聚百物為市逺商巨賈舟車行李亦多出其途而寓其肆視猶山州野縣或不知為墅落焉有隱君子沈廷圭氏讀書善聲詩為其地有文之主構一軒藏六經子史及古今傳記數千卷階前後植藝以辟蠧扁曰藝軒嘗命八題自勵人初未之知也雲間老儒舒公志學為之首倡好事者羣和之然後軒之名始著八題者曰敬祖先曰睦宗族曰親師友曰訓子孫曰讀詩書曰勤稼穡曰謹言行曰擇交遊是也噫修身齊家之道備矣廷圭年踰五十有園田池沼之樂宜其賞花釣魚嘲風弄月以養驕吝之氣顧乃切切有志於聖賢之學歟必其道得於心而非庸夫小子所能及也嗚呼世逺人亡服窮澤斬追思水木本源者何人耶角弓興刺乾餱致愆懷念一視同仁者何人耶吾知廷圭有戒乎此也聖如仲尼不舍老聃萇𢎞賢如仲孫蔑亦取樂正裘牧仲與夫中養不中才養不才今又幾人哉吾知廷圭有鑑乎此也詩書者載道之器稼穡者衣食之本言行乃君子樞機交遊繫吾身損益茍不於此而盡心力焉何以成人而造家乎廷圭智足以燭理仁足以克已勇足以任事立此八條為家法不疑不懼謂其無得於心者能之乎曽子傳大學治國平天下不出乎孝弟慈三者廷圭於祖先曰敬於宗族曰睦非孝而何於師友曰親於子孫曰訓非弟與慈而何如有用我執此以往惜其甘老間野而不願仕也支巷觀音堂記崑城西大澞上村蔚然者曰支巷民淳而里仁有觀音大士堂故在焉嘉樹蔭其旁清流帶其前左則架木為梁以通適南之路堂肇造無歲月可考然而啓闔灑掃晨香夕燈村著姓錢氏世主焉村氓於歲首率詣大士卜田事之水旱豐歉水云則水旱云則旱悉驗如所卜或卜疾疫訟爭之類其吉凶勝負悉驗如田事噫亦靈異哉故氓於春正月秋八月某日羣會堂下各持香花供養大士歲為常永樂庚子錢之孫曰思敬增創山門一間越十年思敬往戍營州去草有五年而後返則大士堂日漸頽敝矣顧瞻徘徊乃命其孫用宜撤而新之用於歲戊寅秋召工度材成厥祖志氓之肻堂者爭來趨事兩月而落成位像於中幡幢掩映過者罔不讚歎作禮而去初用之始事也掘地及尺得石焉隱約有字用乃磨洗拓一本讀之則墓志也幸未及壙左右請除之用曰不可或曰大士好清淨穢物觸犯恐不利於吾村氓用曰若聞大士好清淨獨不聞大士有慈悲心乎脫有不利願請自當不與若輩事遂以石置故處掩之今之堂中間稍西偏是也志總二百九十八字疑而未定者三疑而定其是者草有六磨滅不可辨認者草有九其敘曰公姓蔡諱密字彥藏吳郡崑山縣人年六十有四淳熙戊戌疾卒於家用浮屠氏法火化越丁未之冬以其骨卜葬於大澞之原生二男長曰永年次曰化鵬孫男五人孤化鵬泣血刻石藏諸墓等語用言石靣背四旁皆滑澤似嘗被水衝激淘汰之狀豫因記往年獲見須浦尼僧菴下靖州通守江公淳祐壬寅壙志計一百九十七年又見邵家灣高平郁公政和丙申墓志計三百二十三年皆無一字剝落此刻計淳熙丁未至今僅得二百七十二年其模糊若是誠有如前所云者有之則壙之在此不在此莫可得而知也豫既往觀拓本用復使豫記其事圖永其存嗚呼古人以體魄托之墓以氏名爵里托之石以墓與石托之子孫無非欲永其存也今托之墓與石者既已變遷托之子孫又不知何在矧托之語言文字之微哉始用告夫村氓之來者異時或遇改作當知堂基之下有宋人之墓在焉用字尚賔求斯人者請求於斯文平橋藁卷六
