body:
  text: 平橋藁卷八明鄭文康撰序玉山雅集詩序金臺羅侯永年作宰於崑將十年通政人和百廢具興崑之山去縣治二里先是為樵牧之所日臻於童侯買柏樹之禁無剪採便凡瘞體魄於山之隂者咸安其藏焉衆口一辭名柏以郎官用寓不忘正統丙寅春侯回自京政餘慮有風雨之患率僚吏躬視之吏部尚書郎夏君仲昭攜酒往焉一時聚會者十有四人中書舍人夏君孟暘禮部主事衛君以嘉刑部主事吳君相虞鹽運司副使陸君孟和延平府同知甘君用汝會稽知縣陳君孟東南海丞屈君季恆臨海丞夏君存賢慈利教諭蔣君奎章山僧文律其一人則文康也野花發而幽香林鳥亂而繁音窮深陟顛雲嵐拂衣掃石以坐引泉以滌謔浪笑傲林谷響應隨寓隨酌酒多盡醉教諭蔣君首賦近體有百里桑麻同雨露之句蓋樂侯之政也依其聲而和之者多寡不齊交唱互答沒日以返翌旦衆將獻之於侯使余序其事嗚呼人之聚會有不可得而易者樂亦有不同者焉有心樂者有身樂者絲竹滿前芳辛列陳蒼頭赤腳頥指氣使身固樂矣其如心有隱憂何是不得謂之樂也今侯以吾民飽暖為樂羣公際遇聖明優遊鄉里從侯而樂孰為隱憂者耶况合斯文而一之夫何而不樂哉此雅集之詩所以作也雖然無已太康職思其居好樂無荒良士瞿瞿唐風蟋蟀尚當為諸君誦之致和樞要序醫仁術也利濟為甚博非若巫與函人然惟君子為能擇而處之天地隂陽之氣耳目口鼻之欲一失其正皆能使人疾疾而非藥無以收和平之功藥之則病者愈而死者蘇矣精其術者利濟一世其心猶謂未能盡我之仁又著書以垂後若近代河間潔古東垣丹溪諸公此仁人君子之用心也金陵徐子宇先生有志利濟於人弱冠時即取先世所藏儒醫二家之書盡讀之理日以明學日以贍居善藥以療疾抱竒疾者療之多竒中永樂中先公被召入太醫院與金華趙公友同海虞吳公訥往返先生所余時為兒侍聽其緒言餘論鑿鑿皆實理至今頗能記憶先生亦欲仁及後世倣古君子著書若干卷題曰致和樞要余竊論之立言不易之事而亦不得已之為也要在厭服天下後世使天下後世用之而無差在古之人或言之而未及或及之而未當非我言之終無以發其久蒙補其未備必有待於我之言不然烏在其為言也然天下若是其大也後世若是其逺也以我之言布之於甚大而且逺茍非至要而至精豈無是非可否於其間哉矧醫之為言生殺所繫不但是非可否而已先生之書隨類立論而繫以方藥確乎其可憑的然而有見知其必傳而無議矣讀者當自得之送徐推官致仕序瑞安徐公某由上舍授蘇郡推官始兩考入京即上章致仕其故人尚書何公止而語之曰子何為去之亟乎子亟去則所當留者誰耶以子之才小大內外煩劇簡靜無施不可少試於郡已見端緒今天子勵精圖治求任老成人子奚宜去哉近例朝廷用賢必命大臣遴舉所知今之為士者異於古一聞有舉士即求主坐此用多敗事我方注意於子凡遇蘇之仕於朝者即問焉甲曰仁恕乙亦曰仁恕御史出巡而還者必問焉甲曰仁恕乙復曰仁恕方將推轂以大爾用以茂爾績子奚宜去哉禮七十有引年之義古先聖王念其久勞而逸其老也今子耳目聰明筋力強健漢吏重聽猶以不妨拜跪用留在位子奚宜去哉爾負未可去者三我無取乎爾之亟去也公謝曰某幼充學官弟子蠲徭於家繼領鄉貢食廪於官藉朝廷不以下體而遺葑菲授官為郎慚負實多此可去者一也詳讞是非負明敏者猶或不逮某才無絶人明無燭妄能無枉濫於聽斷之下乎此可去者二也知足不辱知止不殆過分妄圖悔吝隨焉矧今天子明聖宰執皆賢故山有先人之廬薄田足供賔祭歸而伍田夫野老頌歌太平志願畢矣尚書何公知其不可留也親為文送之餞於都門之外崑山縣尉王日升公之鄉人也以其清風髙節遍告縉紳大夫求言送之余因歎曰蘇郡大邦也推官要職也郡不屬藩臬無廉訪監臨之臣樂地也官大邦領要職居樂地為子孫計者咸願老於其位瓜期既及遲留覬覦吾見亦多孰肻以六載之近二毛始别從容亟去猶敝屣者哉豫雖以文字為業茍非其人不敢妄與稱述若公之賢敘以送之夫何愧之有哉送談主簿致仕序君子幼而學壯而仕老而得以其官告休者有則不可不加之敬焉初士之修於家積勤勞思以為不及古人則弗已視彼帷薄不修簠簋不飭者恆私議而竊訿之一旦使有爵位越禮愆度尤有甚於彼者或一捷而即蹶或再轉而遂仆坎坷終身委棄弗録其能至於告休者幾何人耶惟其不可以幸致在君子不可不加之以敬焉長沙談君惟進主崑山簿者十年雖無赫赫之聲而民自不忍欺之朝廷以天地為心仁愛臣工內外大小羣執事久於位而筋力弗勝者咸許冠帶優歸而吾談君在告噫若君者可不加之敬乎君還也內無愧怍之疚外無縶維之慮桑梓以怡遲暮詩酒以歌太平豈無因君而感動者乎必有善守其官亦欲有君之日者矣此又流風餘韻之所及也行李在門敘以識别送郭士紳序山隂馮翼夫教諭崑山即余曰兩京交遊夢寐不相忘者一人焉余從而問曰同年乎曰否同官乎曰否同里乎曰否居是三者而人或秦越否則何不忘若是耶翼夫曰不然同門似乎同年同寓似乎同官同浙似乎同里非同而同吾於郭君士紳不能相忘焉士紳樂成人文通先生子也永樂初文通與先子同寓南京我與士紳俱齠齓相伍相偶不殊周親者幾十年逮後文通薦入內廷先子亦官近侍我與士紳髮俱燥復同寓北京受業今吏部尚書魏公伯房門下相偶相伍無異前時者又十年宣德中文通豫告我亦忝科名教諭儀真始與士紳相逺矣南北垂草年言無我虞行無我詐心腹相孚若同年也有犯弗校有譖弗行道義相結若同官也有無相通休戚是同始終保恤若同里也曩在儀真朋簪一盍今將數年無復言笑德之不能忘也忘之不能得也余聞而咨嗟歎息恨未識而與之遊焉今年夏士紳恐日就衰暮走二千里會翼夫於崑傾倒平生踰月士紳戒行李翼夫縶之維之而不可得乃繪圖賦詩用寫戚戚之情欲余有言蓋自伐木絶聲谷風興歌朋友之道薄矣友多同年也翻手則對覆手則背心腹恆悖也友多同官也一言則諧一言則猜道義恆乖也友多同里也設險以欺鼓智以愚終始多渝也二君心腹同孚不必問其同年也道義同結不必問其同官也始終保恤不必問其同里也離合不同奚庸戚戚為哉俾當世之人皆二君之交同其不同而歸諸同則友道幾幾矣送沈君序人負抑鬱不平之氣必發憤悶激烈之言言之者禍患不以為意聽之者雖陽與其壯而私相笑議其罹咎之有日也夫以時政之弊民心之寃衆非不知其寃其弊也特以禍患是懼寧弊寧寃而不敢言焉或者不計其他而一言痛弊不足以革弊隱寃不能以伸寃徒以渺然之軀而當不測之風波矣此沈君之重得罪於人而取禍也沈君謀深而智逺氣剛而志大遇有抑鬱不平之事即發於言非言於私也必與人言焉非言於寡也必與衆言焉犯顔色觸忌諱略不之顧則夫何求不得何欲不遂者寧不欲置之以死地哉今年春沈君以言而得罪至秋始獲釋與若交者惡其敢言也求言以為將來之規余維危言危行危行言孫孔子垂訓貴適其時沈君何勞苦若是耶屋廬足以蔽風雨田園足以供賔祭酌酒賦詩長養子孫此外奚庸用意哉至若求政之弊究民之寃朝廷明法自有攸歸而今而後沈君宜免夫送張進士赴京序雲間多明經士源委脈絡甲乙授受雖逺不失其真自國初以經學進士至今垂八九十載鄉會試主司多録其解經之義程式於天下天下之士信松之多賢清河張公濟松之尤賢者其為經生不求於言語文字之末務得乎至當歸一之趣歲丁卯嘗挾其平時所為文章數千百篇遊京師爰是名隱隱起公卿間果領薦所司後歸江上常熟鳯林顧有終家肥而指衆卑辭厚幣聘主西賔之席俾授羣子弟經公濟告曰摘裂題意發揮萬言衆方以鸞膠續斷為工吾獨不之是巧立異論居之不疑彼直以發蒙指南為辭吾獨不之取蓋謂經以載道道在人𢎞援經以求道奚事乎摘裂以道而成身奚取乎異論茍曰文章而已矣經何物也哉公濟朝講暮解日課月程型範羣子弟咸有所成就製作時文一以理為主嗚呼公濟其善教哉今年夏復將遊京師徹席而去有終率羣子弟追餞江滸謁余贈言余述其教所以稱君而警人也送吳竹菴還括蒼序崑山尹吳侯伯昭迎其父竹菴公至官踰月告歸中書舍人夏君孟暘湖廣參政沈君孝祥輩留之曰公始至即去得無近兒女子情不忘鄉土乎公笑曰烏有是哉吾子昭荷朝廷恩叨掌大縣志願足矣吾嘗病夫作縣者論深切於事情言不離於道德翳迹其為自相齟齬處已以甚尊視民以莫賤剛則吐而柔則茹喜有福而怒無禍此外猶有耻談而羞道者使部下之人不敢言而敢怒坐是多敗吾子不學無術深惟兹懼故初入境即諏曰尹何為野老曰善曰奚善曰愛民如子也入城又諏曰尹何為市人曰善曰奚善曰理官如家也嗚呼使吾三年不下之懷釋於一日此吾所以不必久留也矧日供調膳恐妨民事食指繁多或損廉節烏乎宜乎余聞而矍然驚拜於牀下噫自屯田郎中辛玄馭殁百千年間未聞有此髙論若竹菴者其有道之士哉使天下作縣者皆伯昭之父為父則循吏必多矣將為天下之民賀矣伯昭余布衣友能言有局幹文之寓意蓋藥之也龔鈍菴嘗以書為贄條陳三十餘事不納未久惜其卒以敗去文康識保嬰集序保嬰集者崑山葛哲明仲所輯也明仲業傳纍世於儒醫二家之書無不讀於內外諸科之言無不究竊謂嬰孩之疾語言不通脈理未定猝有所遇無所措手憑仗者惟色與聲耳汶陽錢仲陽漢東王鐔之言固無容議若陳文中喜熱而惡寒喜補而惡解利已不免丹溪朱氏之辨非若張長沙傷寒方法後世莫之違而可據也爰是采取諸家已試獲效之方分門繫論以藥隨之劑皆平和而孟浪者弗録集成奏進宣宗皇帝親覽之賜宴奬勞明仲存其副於家請言引首噫醫仁術也天下之術莫有仁於醫者夫父母之於子無所不至不幸而有疾計無所託乃託之醫醫無良方善樂將奚受其託哉得其人則變危為安蘇死為生非其人則患有不可言者世系或至於莫續宗祀或至於遂殄矧萬金之産乎此明仲保嬰集之所由輯也明仲博學明脈而有恆心今為迪功佐郎楚府良醫副云嵩髙遺意序河東吕時處中集録前輩餞送其大父沁州先生與其尊人建昌公詩文若干首分為十卷題曰嵩髙遺意余讀之不能無所感焉國初崑山多文學之士率貴重名節佩詩書為文繡嗜禮義猶飲食其於利祿一介弗肻茍且取受於人華亭殷奎孝章范陽盧熙公暨及先生先後被召孝章得教諭咸陽公暨得同知睢州而先生丞浦城進守沁州三人者皆古君子不因窮達而有所變後皆不幸殁於官所咸陽雖掌文教不與民事而二州一縣之民哭者載路斂與葬家不能辦悉出於彼此官府焉事載縣志可考也建昌之行略附見余所撰朱都事墓志中逮今三家之子孫雖無良田華居以享厚遺而舊時門户不改筆硯未蕪噫天道可憑如此未知今之仕者其向後子孫又何如也嘗聞致仕教諭睢陽朱士栗談沁州公在浦城赴召行諸父老各持鈔相贈公厚謝之一無所取至杭已無買舟錢抵家以新榖二斛償之及得沁州之命時天已寒體無綿衣過徐舊時授經弟子共買一毛裘并驢一頭以去今誦其詩讀其文追想其人而俯視乎今安得不發慨歎而寓景仰也哉梅塢詩序梅塢者包山老人之别號也老人姓徐氏字某年踰七帙誠心直道隱然太古之民童年讀詩板卒章即知求致夀考之道其詩曰昊天曰明及爾出王昊天曰旦及爾遊衍喟然歎曰夫理出於天天即理也逆理則悖天悖天則獲罪雖未速置以死亦不福汝矣爰是言一言也必度諸天果當耶抑否耶行一行也必揆諸理誠順耶抑逆耶夙夜前後左右若有鬼神監臨者自少而老子姓繁衍壽考而康寧焉嗟夫在人之事不可用智求而力致者非壽而何以有主宰者為之豫奪也然在大舜有必得之文又似可求可致嗚呼德孰有若大舜者乎是知智求不可而可以德求力致不可而可以德致德亦理而已矣天曷負於人哉元翰林學士涿郡盧摯處道座右銘大書一天字其下分注六字云有記性不急性今包山老人壽考康寧豈摯所謂有記性而然歟南州徐君用理輩賦詩與老人壽推豫為序如此云秋夜宿山中分題詩序景泰丙子秋八月十有五日余偕邑宰蘄陽鄭侯叔通掌教泰和陳君從善登玉山絶頂酌酒賦詩盡一日之歡及暮鄭侯陳君既去余與三人留山中主僧昌瀹茗設素食供侍者進具衾枕幃帳滌除湢浴溷厠奔走事客惟恐客或不樂余飲少被酒輒為所使不自持謔浪笑傲無復禮法入更侍者請就寢余辭未能乃與三人取卧具分題賦詩詩限五言人各五韻久之未有就者衆皆垂頭腕脫令侍者擊節以作其困然後甲乙而成時漏下三鼓矣遂踉蹌而睡翌旦昌請記其事留詩山中余性最喜山水之樂自賜告歸屢與中書舍人夏公孟暘禮部主事衛公以嘉期一宿山中數年以來願與時乖今與三人不約而聚豈人事不繫於有意而遂歟使天下之事能遂於有意人將竭智力為之而不顧矣嗚呼歲月易邁人生幾何禮部公已殁世中書老不能行達人智士宜及時相樂也三人者懷柔令尹孫恭武徴士周德元永懷住山嗣南宗曰余謂誰開封鄭文康也平橋藁卷八
