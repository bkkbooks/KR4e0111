body:
  text: 平橋藁卷十四明鄭文康撰志銘愚直翁墓志銘世以無知識者為愚無回邪者為直愚而直亦君子之所不棄愚而詐斯為絶物也常熟沙溪有一翁姓王氏諱蒸字文簠髙祖純居郡城中曽祖褀自郡城徙海上之塗松祖貴一再徙於沙溪考子榮母陳氏居沙溪至翁已三世矣翁早喪父與弟文簋友愛深至謀曰人倚官府為漁民計左策也我與若有田可養母有舟船可經紀宜専心事此無妄圗文簋從之寖致家有餘財推以周急貸人遇稱貸者初不計其人能償與否貸即與之彼擇人而貸者咸笑其愚及期不能償者紿曰我將持償適又有急盍再貸我當刻期併償翁信之復與不疑彼設機巧者又笑其直翁聞之喜曰是善命我乃自號曰愚直翁積嵗既久逋券盈篋若龔乙顧義沈敬數十輩卒莫能償翁念曰彼豈忍負我乎是果無所措也乃盡焚其劵景泰甲戌歲飢且大疫民不聊生巡撫侍郎都御史募民納粟旌義有差翁出米五百斛穀蓰之例得冠帶榮身翁辭謝再三乃已此皆鄉貢進士潁川陳問狀云天順四年閏月念二日疾卒夀六十有七配張繼朱子男二曰恭字廷節娶陸氏曰謹字廷慎娶楊氏女一嫁楊和皆張出者孫男四曰臣曰宰曰賔曰儒孫女一曰玉英以歲甲申三月朔旦葬七浦塘均司漕東颻字之原銘曰愚以處已直以待人直云固爾愚恐非真其愚如愚惟愚乃智遺安寡怨以授來世致仕良醫副葛明仲同配蔡氏合葬墓志銘吾崑多世醫若周若許若董若沈若吾鄭咸著工巧於前代近時獨葛氏以術顯而得官葛氏數傳而至諱吉甫者益𢎞其業名出數家之上吉甫生叔成叔成用藥専以守成為本慎於尅伐其收功雖緩而活人甚多修眉長髯年八十五而終叔成娶張氏生三子長某次即公諱哲字明仲次睿字季真永樂間明仲選士太醫垣授荆府良醫副季真起為本縣醫學訓科昆仲在位三十年各致其仕今季真之孫闌又嗣為訓科一門之內以術而膺冠帶者三人噫前人積德之厚可徴矣明仲自荆改梁又改楚持恆守道歷三府鮮有敗事府僚自長史而下莫不重其人而神其術也在醫垣日嘗集保嬰方論若干卷上進在荆府日嘗授賜敕有式克勤慎之褒階修職佐郎公之配蔡氏諱淨同縣思齊之女柔慧孝謹童而處室白而偕老夫夫婦婦內外無間言公卒天順五年四月念一日蔡卒臘月七日公夀七十有三蔡踰其一子男六某某孫男四某某擇明年二月念五日合葬馬鞍山陰鳳凰峯下乃按長垣縣儒學教諭徐季昭狀而造銘曰既多男復多夀二難并不必富偕老者結髮婦同日藏永無咎朱宗海室蘇氏墓志銘碩人蘇氏諱馥崑山淞南人其父元禮在永樂間為萬石長有美名縣大夫有過誤敢與一時同列若泗橋潘紹宗輩陳言規正之非若今之結好為通家以行已志元禮無子生二女長者已承其家次與碩人擇嫁乃得朱公宗海於衆口同賢遂托焉時有欲女宗海者後之已而悔曰奪我佳壻碩人柔順孝敬有女道焉儉勤雍睦有婦道焉愛慈教訓有母道焉具是三德為鄉里所聞天順五年九月草七日卒夀七十有六子男三人孫男女一十七人有官者一人曾孫男女如其孫之數以癸未嵗臘月十八日葬合許墓塘東之兆銘曰夫在左子在昭位有序永逍遙吳槃室夏氏墓志吳縣吳槃室素定崑山夏廷威之女也槃之祖兵科公與廷威素舊槃父瀞聞素定生長禮法家孝順敬謹族人同出一辭於是從其鄰物色之又得其容貌女紅在族人所未言者遂聘為槃婦遭家多事年二十八始克成禮踰兩載受娠彌月居夾室遲遲三晝夜幸而子及蓐即睛定反視其侍者羣聚而號呼之不應竟弗蘇天順六年秋七月九日槃將謀葬尚酷暑猝莫能畢事乃火其尸取其顱骨而囊之以是月辛酉瘞於薦福山先塋廷威抱始生子俯素定函慟哭曰我持歸付汝母求乳母乳之待稍長當付汝夫槃汝勿念嗚呼不亦悲哉顧庭實墓志銘翁諱茂字庭實顧姓本出其曾祖妣王氏之族考彥銘母張氏初彥銘無子擇族類瓜葛之多男者為續後計得翁於其父某乃求為嗣尚未髫齔踰年彥銘生子庭桂又十年而彥銘卒時有欺其子母孤寡無能為者潛竄其上世土田舊物入已版衆為之不平比翁壯與庭桂悉收復之人曰彥銘有子矣自後庭桂選掌萬石夙夜在公家事咸翁主之庭桂好使氣不能俯下於人遇酒後尤不可犯坐是多得罪於鄉之豪俠壯士有所不堪者亦往往造言生事圖雪一時之憤翁聞之輒匍匐求見其人卑辭屈身委曲順承必使怨消事解然後已所以庭桂聲聞愈壯而家業得不破者以有翁為之兄也及庭桂殁子先無子翁命一孫子之翁謙和有容質朴無妄於聲伎華靡之事淡然無所好雖與庭桂制行頗異而旦暮聚首未嘗或傷和氣也翁生洪武戊寅某月日卒於天順六年十二月十六日春秋六十有五配陸氏子男三升昂昺孫男四浣瀾濙源孫女四卜嵗癸未三月壬寅葬於陳墓里所居之後福成墟新阡升奉其館客餘姚岑竦狀來求余銘銘曰蓮池院兮桂之宅翁之宅兮院東北百步相望一水隔後或茫昧求此刻柴孟膚配俞氏墓志銘太倉柴君孟膚既殁之十六年其配俞碩人享夀八十有一於天順七年二月十四日卒以三月某日開古塘南原之兆合焉碩人諱清俞姓祖天祥父叔經母吳氏碩人早喪父繼喪母時尚未笄乃抱其二弟浩淵聚於一燈之下怨慕號呼纍月不輟鄰里為之動容及歸孟膚孟膚之髙祖廷富嘗為海道萬户至孟膚世逺人亡門户不及前時孟膚往來湖海為業化窶約為豐溢碩人主其內政凡百所需具有節度惟祭饗不為槩焉其視孟膚視猶賔客左云則左右云則右無傲色無違言至老無専制獨成之病故孟膚樂稱其賢而聞者亦信之也男子二長楙娶陳氏次惠娶金氏女子一壻曰朱朂孫男二曰欽曰福生孫女一曰善珍朂之壻舉子查庸狀述碩人疾革時呼楙曰汝既失學無似當令欽讀書為儒業無違我言噫其賢益可信也已銘曰女而知孝婦而能敬垂殁之訓尤出於正銘以昭之敢告羣聽沈氏三殤葬志銘嗚呼小兒夭死痛創其父母心者莫甚痘瘡何耶以其耳目口鼻變異可畏也不幸有之何能為情况又至再至三者乎太倉城南沈氏伯仲兩房男女數人天順七年春相連痘發二月十日一女素紈死生已十一年矣三月十有一日一女妙清乂死年同素紈越明日一男慶生八嵗又死嗚呼可懼哉二女體貌肥晳動止端詳慶生性聰慧且知孝能暗誦日記故事數十首客至又能信口歌文丞相詩其出不待呼歌已能使客愛賞不置識者曰沈氏寧馨何其纍纍耶及死愛賞者多泣下以後死者後六日丙午同葬其骼於先祖墓陰殤位素紈之父曰宗海母曾氏妙清與慶生之父曰宗能母胡氏宗海適在客未知宗能獨遭其戚其能勝乎為之銘曰韓昌黎喻孟東野詩事怪而言竒黃山谷録遺石君美亦既紓其悲矣沈郎沈郎盍三復其辭焉支經歷墓志銘郤陽支氏崑山人也其諱曰琮其字敬將挺身七尺出人一頭恆斂足於濁流不勞心於偽事遊歌芹泮醉飽聖經口吃於言笑其吃者而不怒意専乎誠譽其誠者而不喜由太學上舍之士擢金吾蓮幕之賔歷最考功積階徴仕授錦敕之封贈被天語之褒嘉丘隴生輝門庭具慶慨桑榆之將暮念松菊之尚存上疏乞身還山遂願久已逍遙於鄉里溘然歸返於玄冥無愧生前永寧身後生於洪武丁卯八月草九殁於天順癸未三月十三銘生德一德一生安是為曾祖考滎陽之鄭樂安之任是為母與妻二子曰禎曰祥婦皆姓杜二壻周璇徐柔甥總成行禎生一男子長克督家祥生一女子幼尚處室祖居羅漢橋北先隴虞家巷中是歲四月庚午差穀以禮安厝粗陳本末合繫銘辭辭曰昔公同遊時髙才疾足者率多其人公甘心遲鈍曾敢與之掉一舌而鼓一唇乎由是緩䇿徐行養晦待信弗競弗爭不震不驚終焉既祿其身又爵其親回視向之巧力絶倫星多向晨矣嗚呼孰謂天道不可憑而不可詢耶夏季明墓志銘余友夏君季明患洞泄未平會其子鑑領貢赴禮部殁於京邸其從弟中書舍人文振函其骨還君抱持嗚咽不自勝治葬甫畢而君不起矣天順某年某月日春秋六十有六君姓夏氏諱杲季明字也世家蘇之崑山曾祖君實祖文通考伯亮别號商潛以仲子貴贈中憲大夫太常寺少卿母石氏贈恭人君自少讀書即知孝弟為性分內事人道莫此為大伯兄中書舍人孟暘仲兄太常寺卿仲昭並立於朝君事商潛與石恭人於家恭修子職罔敢或怠中書公為縣丞時被詿誤君得報輒匍匐奔伏闕下陳情事得從輕典及其兄先後致休旦晚燕集笑談尤盡友愛君涉獵經史能為長短詩歌工楷書又善𨽻古與人作齋堂扁額深有漢刻筆意兼曉音律問其古今格調鮮有弗知雖梨園老工往往亦屈服之君有仕才以兩兄既已顯達故無意進取卒老韋布而殁配陳氏子男二長即鑑本何姓初君無子子之娶陸氏次錡俱先卒女一曰慶適舉子孫肯堂錡與慶其母為支氏孫男女五曰登娶奉訓大夫荆府長史張循伯孫曰瀛尚幼君之葬事也不禁忌不舉樂不奉親友帛不用浮屠術士實皆太卿主之君其樂哉吾崑夙昔陋習殆將因之而少變矣為之銘曰鄉無善俗忒禮為之不經不法覺者其誰袪邪返正巨室是望上行下效豈敢曰誑惟君終事可謂合禮一洗故轍將自今始前金溪知縣陳君墓志銘余既冠未入縣庠時有友十人焉日以倡和講學遊從為事當時有忌者呼為十鐸方言鐸猶癡頑之謂至為十鐸詩向人傳誦噫不亦誤乎後十人者六人皆有官陳君賢佐其一也獨倥侗玄谷滄洲戅菴不願仕今皆為聞人君在十人中最名有清才能為長短詩歌日數十章一下筆輒連出俊健佳句不休精歐陽率更書法又能古篆𨽻行書與其姊丈今滄州同知張元龍相為師友間寫喬柯竹石亦多雅趣遇美石為知已鐫刻圖書甚有古法度正統初元與元龍先後薦起元龍授江西按察司照磨君授浙江桐廬丞九年升知臨江新淦縣事遭憂制不果行起復改撫之金溪君在桐廬桐廬密邇會府會府大臣咸以能官目之比至金溪金溪固文獻而豪猾在在有之君為縣六年使不得少伸其氣有弗遂者旁窺其密發之遂落職君諱助蘇之崑山人為人豐厚而稍短性孝友夀母庶弟交致恩愛足素有濕病數月輒一發發即不能行者踰旬故在官久有休志逮歸數年每值芳辰佳景以休為樂必速故舊賔客相與詩酒竟日欣然為之不厭蓋其費皆出健奴三四輩在市腴田三百畝在曹李濵不深勞苦也考仲約母王氏妻沈氏子男三長曰諫邑庠生娶許氏次曰詔娶朱氏又次曰誥聘狄氏女四長適山東左布政使龔彥文子緩次適郡人魏童次適刑部主事吳相虞子德次幼誥及幼女之母為薛氏孫男一應魁孫女四君生永樂戊子正月十二日卒於天順癸未三月草三日享年五十有六以十一月草八日壬午袝葬馬鞍山北之兆其世系來歷已具余所撰仲約志中銘曰有母未終有子未成終之成之有孫有兄永懷在兹君宜以寧郭士英墓志銘崑山之太倉有為老氏之學者曰郭先生諱俊字士英年踰知非之一世之學老者槩以性分為虛無獨妄意實有者渺茫之事坐此不免為士君子所擯斥先生祖仲真父琬母歐氏生三子長士成次先生又次士能先生甫能食而父下世母亦尋殁葭莩於郭者收三子而撫之後先生奮起自樹能致怨慕於其先致友愛於其兄弟又能化兄子緮弟之子富昌咸興孝弟以矯俗之弊實其虛有其無復念漢名士之仙舟唐學士之瀛洲皆在平地乃遣子經從師遊求為先宗林宗之流經竟登天順庚辰王一夔榜進士第嗚呼先生所為所見豈果為老者無乃寄迹於老者歟故狀者曰不欺已而誣大於其先不希天而覬大於其後此人得其心術之微也元娶陳得子經繼娶徐得子綸又得二女壻丘昊顧俊經之室李氏生女蘭香壻楊錦俊與錦皆許嫁未行綸之室楊氏歲癸未春經入選授浙江餘姚縣知縣便道僅抵家而先生之疾不可為矣是為五月九日也經卜十二月壬寅安厝姚涇新原遷陳氏之函合焉蓋先卒已幾年矣仍虛其左以俟徐銘曰儒名墨行奚取乎儒墨名儒行墨也奚拘揮之進之置名責實噫郭先生特墨其迹馬叔良墓志銘往年睢陽朱日南請銘務本馬翁士隆之藏余既為之矣今又請銘其子叔良之藏嗚呼五六載間代謝如此然則昧止足之戒者何如也先是其甥鄉貢進士凌杞往來余所頗密嘗道叔良之賢曰欺心喪節人鮮畏之吾舅無是也姦紀辱先人屢見之吾舅無是也瘠人肥已人咸安之吾舅無是也此杞之言然及觀日南述叔良事母以仁睦族以義母安而族諧朝曰天理暮曰天道理合而道得一日之內三尺惟謹不敢踰越本分資雄於鄉待以舉火者恆百輩守父祖家法稱貸未能償者數緩其期惠澤旁流怨言不興此皆日南狀云亦杞三無之謂噫上不負天中不負身下不負人叔良殆庶幾乎叔良諱駿字叔良常熟塗松人享年六十有一卒於天順七年九月癸未娶張氏子男三綵組約女二孫男三以是歲十二月壬寅葬七浦塘之塋其三代名諱已具士隆志石銘曰不負天者天必厚之不負人者人必祝之厚之維何厚之以福祝之維何祝之以夀天人感通定如夜書叔良果能匪躬在後潘紹宗小君墓志銘崑山泗橋潘翁紹宗卒時小君裁三十歲至天順八年某月日卒寡居者五十幾年以某月日袝紹宗正室鄒次子二珍娶處士邵孟髙女瓊娶光祿寺署丞孫伯純女兩子俱年五十餘卒孫三瑶璿昶曽孫二鼎堂紹宗本太倉殷九宰子九宰元任海道萬户家造三巨舶大者勝萬石中者八千小者六千歲以所得舶腳錢轉往朝鮮市貨致大富九宰與紹宗父祥卿善祥卿亦故家老無子九宰憐之畀紹宗後焉紹宗巨軀大度嗜飲酒好施豫延祥寺大興造輒與米四千斛貧民死無棺與無算掌萬石三十餘年小心在公公牘無過誤笞犯永樂壬辰上湖湘過采石值風水壞舟疾作不能前還家小君候諸門外見紹宗已非故態抱持而泣後更數良醫弗靈小君懼每夜焚香密訴北辰求代卒不起小君美麗自重恐招侮即屏膏沐弗為容夏之日冬之夜間邪存誠有古貞婦風節天亦相之自壯至老略無少疾所苦數年前里長老欲謀狀其節以聞表厥里居小君聞而止之曰不可朝廷著令念九得聞三十不得聞長老曰降一在我無難誰能考者小君曰此非我心所敢安也遂寢不舉小君姓金諱增父某母陸氏上世微弗能盡知銘曰余聞小君石浦人石浦乃狀元里豈當時文節風化至今淑人心猶未已也何小君以一婦人其言行顧使喪節欺心之丈夫之顙有泚耶平橋藁卷十四
