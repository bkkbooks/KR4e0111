body:
  text: 平橋藁卷十六明鄭文康撰傳何順中傳何先生字順中其先婺人曽大父子雲為崑山良醫劉國英贅壻今為崑山人子雲而上七世皆髙科顯官諱熟者宋端平二年進士仕至朝散大夫當時出身家狀身後行狀刻本具在也子雲得劉之術傳三世皆以為業至先生大著工巧居太醫垣四十年王公貴人有招延之者視儀不視物有儀乃往往則疾家有所恃疾者雖鄭聲沉滯亦為之不懼或以勢位臨之弗能致也性嗜酒靡日不飲靡飲不醉醉則噴嚏連百十未已至噴嚏共知其醉先生為客則不辭主為主亦不留客頽然就榻鼻息輒震驚人年七十餘修睂長髯顔如渥丹其亦有道士歟家固貧極謹義利之辨故飯恆不足而獨酒有餘子澤頗有父風焉薛烈婦傳城南薛烈婦崑山半山橋人父為銀工嫁縣小吏邵某為妻洪武初小吏坐死法京司差人提取烈婦時年二十餘蒙垢莫能掩其麗將行差人見而悅之謂小吏曰若欲生致都下盍使事我否則若命盡在中路小吏懼曰如命乃密呼烈婦語故使從烈婦曰吾身潔汙君不可得復主矣佯應曰諾是日盛備酒饌飼小吏暮歸遂經於粉閣中鄰里解其尸葬之冢在西湓瀆村彭氏菜圃中即當時之粉閣也論曰豫表姑葉年九十所居與小吏家隔一垣曾識烈婦其小吏則忘之矣然家有粉閣彼遺業必尚可淡泊守也奚以吏為其身既自為惡又使妻為不善其陷大戮宜也差人不鑒小吏為前車覆亦有日獨惜銀工有此令女托之匪人使少有張負郤鑒之見安至是乎噫君子議婚之初可不慎哉可不慎哉許節婦傳崑山蔣哲妻許氏名安世醫用衡女用衡家教頗嚴庭無巫祝尼媪之迹安為處子靜心密地耳不納市井閭巷穢惡聲年十八嫁哲嫁兩載而哲殁殁後兩月而子生家無厚資堂有遺姑所親乘時以後事微動之安抱兒泣謂姑曰妾願與此兒同存亡人言無慮也紡績織紝一心養姑教子笑語不入於鄰積二十六年貞白之操無罅隙可議鄉里私稱為節婦今其子明為教官即遺腹者贊曰李令伯曰舅奪母志是章其母之醜也夫以匹夫匹婦之志奪之弗能也戒其勿奪亦弗能也惟已處之而已矣若曰可奪則共薑之誓蘇武之節何獨不然哉觀許安謂姑曰願與此兒同存亡奪姑弗論雖欲撼之得乎南菴傳南菴無照師滇南人也學佛之法而超乎法之外因進之門墻相與講中庸多有理趣但人病其性急師亦以此自病故與其徒多不合云論曰急非性也急不可以言性言性則氣質之謂也學道者當緩其急以歸乎中佩韋是也雖然急不可以言性而可以言志周公坐以待旦孔子發憤忘食非急而何急於道急何不可之有如如禪師傳如如禪師不知何許人神僧傳失載家君病瘧苦頭痛於顛頂之上寒熱劇甚指甲盡黑漫不省人事見二鬼約長四五寸舉動輕捷無與比復有一鬼衣冠儼武臣狀乘騎執弓矢俾家君偕二鬼給事備歷艱苦其言有數事若曰欲如此必如此家君儒者聞其言不經寧死弗肯從鬼大怒忽一僧不知何從來以拄杖微擊騎鬼之帽似有所責遂解圍中隔大河僧與家君在河西而鬼河東矣僧曰我乃如如汝歸記之遙見二鬼皆跪拜僧僧亦歡喜而受鬼隨不見瘧亦不復作事在宣德甲寅六月十二日鬼之言孔子不語怪故不詳越數日訪如如名號出處於鎮江府都綱紀司綱紀公云釋典有如如者一禪師一居士禪師好救難弭災所著有如如語録行世乃知所遇禪師非居士也家君命文康傳其事復立木主每歲是日設香燈茶果之供答靈貺焉附録報謝如如禪師疏戊辰年伏以神通廣大能令百世之尊佛力𢎞深解救衆生之苦仰惟靈感如如禪師名登釋典道振空門一本慈悲夙著厥靈之濯濯普同濟利已經奕世之綿綿曩在家君病淹痎瘧繼余小子痛劇瓠犀揮法杖諭法言曽援沉淪於彼岸爇天香扣天鼓再堅搖動於壯年父子銜恩寢興在念文康近於十三日間關在客調攝乖方為圖口齒之甘大作心腹之疾重資靈貺即獲痊安欲拜疏於玄龕特還書於故里展虔誠於幡幢之下布衷曲於文墨之中粗陳茶果之儀薄設香燈之供以綏後福敬答前休惟願有子有孫不替奉承之志宜家宜室永無災害之虞謹疏行狀崑山知縣鄭侯行狀侯諱達字叔通姓鄭氏世家黃州廣濟縣曽祖觀福祖善友父庸永樂初庸隸籍襄陽衛今為襄陽人侯念上世無仕者勝冠即發憤讀書修文辭圗進取兼攻真行書教授武臣子弟數十輩時襄陽府學鄉試三脫科提調官聞侯名招入補學官弟子宣德乙卯遂選湖廣秋闈第六人考官讀其策皆鑿鑿有用之言表章三問於試録明年卒業太學業成授陜西盩厔縣知縣盩厔舊有西洛峪水渠在勝國時為農利甚溥後被耕者夷之漫為陸壤令數代無有注意者侯至求原規改而正之農賴以濟詳載訓導長安董楙所撰廣濟渠記髙乙坐大辟囚繫九年侯讞其寃得不死三考書最朝廷賜敕有撫字克勤之褒封父如其官母王妻馮皆孺人景泰五年蘇松大飢大疫死者枕籍貧民牽扶入城市乞食旦人而夕鬼主縣者莫能措手稱病去巡撫尚書李公意時勢若此必得有為者吏兹土以拯民艱具奏時侯在選部該進秩乃升食從六品俸仍來知縣事崑為弊積久濟農預備諸倉雖有登載之數而實十無二三侯下車計實在數合諸貧民之數戶不過三斗土塊藁秸半之民雖入手終無以為計子棄父夫棄妻老弱待盡侯乃日夜遍詣稍贏餘之家喻以禍福官與文劵隨其多寡而稱貸之得穀數千斛於是分集將委溝壑者於僧寺道觀日給粥二次凡官府廢材神壇樹木悉取以供薪爨病有藥禮請致仕良醫副葛明仲掌其事勞心焦思黑髮變白及秋髙鄉頗稔且水退遣歸復業嚮之廬舍已為糊口所廢侯又市竹架屋為經紀之春復給與穀種俾里正假以耕具凡可用心者無一不至此侯在崑第一事初荒時民食犬賣皮犬盡食糟粳麥柤糟粳麥柤盡食草根樹皮草根樹皮盡别無可食時屬縣有折糧白金數萬兩在府侯痛以為言太守誤聽羣議持往湖湘糴米舍近之逺則涸轍之鮒無以為命矣此民之所以重困也他如巡江千戶索財擾民發其事千户充軍隨從都御史知事擅攬威權上書直言其姦學諭陳登有治才儒士周號有文學咸與推轂日進老儒龔大章沈誠學於堂咨訪民事得失利病咸聽盡言為鄉試簾外官者三會試簾外官者一性至孝封君與母孺人皆在原籍心不忘思言不置口語及必墮淚去年冬滿初考即日趣裝上道冀得奏請歸侍糧事嚴上司俾姑視事不得去劇不如意天順二年閏二月草八日患癃閉七日卒享年五十有九配即馮四川某府經歷義女弟生八男二女賔寅宜實完安宗寵男之名也寵母側室張韓馬劉倪韓王婦之姓也馬澄湯某女之壻也歸以某年月日葬某地嗚呼侯謙恭節儉盡心乃職布袍蔬食略無富貴氣味所謂憂民如有病見客似無官侯誠有焉所著有尊生藁十卷豫辱侯愛敬於其殁不能無情謹述數事授諸孤俾乞銘於立言信後者焉謹狀彭應德同配鄭氏行狀應德諱餘璋字應德姓彭氏蘇州崑山人俊敏不羣幼有孝行補學官弟子明經著文不失矩度於時監察御史廬陵彭公朂提督學政學者寡入其意獨奬進而材器之將應南京辛酉科鄉試遭父喪不果行在苫塊中哀毁成疾遂不起正統癸亥十月六日也其配鄭氏諱慶字宜君宋華原郡王居中裔孫生長儒家溫惠塞淵年十八嫁應德及期而夫病再期而夫卒其間蓼辛荼毒充牣心腹至是號咷仆地莫知所圖以胸暖其尸凡三晝夜尸溫家人奔告如狂謂其復蘇蓋由宜君近之以生氣也逮斂無以為計直呼曰天來爾偕我往爾不來吾誰與處不絶口者又四日竟潛自沉後應德才六日嗚呼痛哉武陵龔鈍菴詡為傳其實有司上其事未報應德祖士瓊考惟貢宜君祖以敬父有林俱無仕者應德年草一而宜君同其年有孤曰永春始二歲應德兄應節以某年月日葬於南城齊禮坊之墓竊謂子死於孝婦死於烈非名筆撰志銘垂示後世殆不可謹為之狀拜而請焉陳公政室王氏行狀碩人王氏諱某世家蘇之崑山父某母甘氏碩人為處子幽間貞靜庭無嬉遊之迹日依依母旁訓無違言身無惰容及笄歸常熟雙鳳鄉塗松里陳畿公政為冢婦公政以鄉長之役在官日多碩人事其舅叔文姑馬如事厥父母問安視膳頃步而不敢忘孝焉尤致謹於歲時蒸嘗之事浣滌祭器烹調品物必身親蒞之務極豐潔乃已一有不出已手則心歉然不安嘗有疾莫能興祭期適臨其介婦曰明日事誠在我戒左右勿使知之黎明聞爨下有鼎鑊聲起視之則碩人已先在矣公政故多資多資多怨亦勢之常里之惡少稍有求而弗遂輒奔走造言生事碩人謂公政曰彼之所希譬猶蠅蚋而圖砧几餘腥耳吾能少節一日之費揮以與之則其禍我之心自熄矣所得所失孰小孰大耶公政是其言從之往往有資家恆被官府所破獨公政終歲晏如蓋碩人已爭之力居多公政室廬倚於市中有園亭花木之勝日有佳客過從其遊至則輒命治具公政與客徜徉笑談不待頥指頃間杯盤芳馨肴核維旅隨其客之衆寡或豐或儉似嘗授其告示者凡百不深煩公政皆此類晚以家事付諸婦其考課僮婢耕織裁給上下衣食皆碩人所立舊規卒莫能改故殁公政遇事則興思追悼不置焉天順四年十二月某日中風卒享夀六十有八子男三長珣娶定海縣主簿朱孟林女次珙娶前福建按察副使衛季洪女次瑺為弟公賦後孫八儒倫偉佐侃僖仕佑曰佐者邑庠弟子公政擇再明年某月日袝里之先塋嗚呼婦人無外事揆法不當請銘有賢如碩人非銘無以昭懿德勸女婦然則可使無銘乎無銘既不可使銘不出於聞人又可乎於是録其素行數事備銘者銘焉像贊林仲山像贊林中散人林補仲山華亭人河東王嘏傳曰高祖少雅宋潮州推官祖和卿前元德慶儒學教授考德載平江崑山同知仲山襲父蔭歷官至某官張氏假王吳召公公歎曰元君也張賊也背君事賊吾不忍為遂隱去自題其像曰雅非雅俗非俗身居市㕓志在巖谷見之者呼為老林友之者識為知音叩其中則空空如也問其長則能固窮而不動心開封鄭文康髙其人拜瞻遺像於七十年之後僭擬而為贊焉學務道禮矯俗黃鳥喬枝白駒空谷氣之壯怒髮如林聲之和太古雅音觀其像則一遺老也讀其傳則知忠義而不易心朱處士像贊諱均禮衍之祖市非隱地隱不嫌市志在儒業儒以成志隱於市鄙髙蹈逺引者之為賢志於儒恥孤陋寡聞者之自棄正學是趨小道不泥故能咀羣籍之英華而遺子姓之餘味也王孺人像贊朱處士配不念佛不茹素年百四歲身不事佛而佛其心口不茹素而素其行事心佛而無意於來生之福持素行而有心於隨寓之誠邪言罔惑正理亦明宜其享百年之上夀而為閨閫之儀型也趙御史像贊永樂乙未進士神完而融德盛而恭博羣書於眼下飽史學於胸中言議清髙麗秋霄青雲之鶴夀容堅徑挺寒澗絶壁之松衣冠古製丘壑清風前輩名卿見之者呼為憲臺之遺老後生小子拜之者稱為鄉里之儒宗也何順中像贊恥機變而爭巧賤龍斷以私登攬詩酒而寄傲操七勺以擅能此太醫垣三朝之士而宋進士五世之曽也彭母葉孺人像贊見年九十二嵗性端莊也端莊之若神容慈和也慈和之若春孝敬著聞於族里儉慈稱美於鄉鄰天既備其四德夀將及乎百旬氣體尚強膺福祉之簡簡曽玄方茂見童稚之詵詵嗚呼先公與孺人表兄弟也孺人長先公十五年而先公前十年已下世也吐心聲而為製也飄豫神魂而將逝也金太守像贊歌鹿鳴也曾作登瀛之客贊司馬也早充入幕之賓探其學則孔顔道德問其志在堯舜君民一麾出守千里同仁肆從容而卧治變枯稿而陽春觀其退食撫鹿角牀而坐使望之者呼為神仙中人醉耕處士像贊封兵科都給事中玉山之陽石浦之旁依丘園而養望守門户而韜光曰少保曰知録名稱踰百年而尚在曰詩書曰禮樂風韻歷五世而未亡心無逸樂所樂者惟酒為最家無厚業所業者惟耕是常從容以和悅豫且康顧堂堂七尺之身軀丹青可狀慨汪汪一腔之仁恕斗斛難量故天報之以有子所以朝廷北門萬斤之鎖鑰既非其不可而南海一面之風波又非其莫當也平橋藁卷十六
