body:
  text: 平橋藁卷十七明鄭文康撰雜著書李樂菴語録後樂菴先生語録五卷門人龔昱立道集其師李衡彥平之言也昱殿中侍御史識之曽孫安貧樂道鄉人稱為龔山長云愚按崑山舊志載衡所著有易說論語說易義海撮要樂菴文集和寒山拾得詩總若干卷行于世噫未三百年今皆不可見矣獨幸此書抄本尚存使吾崑後生小子略可考見先生之正學直道非俗儒備臣比也先生江都人初布衣流落吾崑王葆彥光見而異焉以女弟歸之後致仕舍江都而就崑山豈以婦家之故歟今縣之通闠橋東有尼僧菴云是前元邵萬户捨宅為菴平正修廣右有小巷深不百步題曰李侍御巷又豈萬户宅先即先生所居歟又按至正草三年知崑山州事髙昌偰侯傒斯因州人袁華殷奎言先生與王御史葆劉龍洲過皆宋豪傑士皆有言行其墓近皆廢壞宜用修復侯乃一一追訪舊蹟而封表之當時若㑹稽楊維禎諸公皆有詩文以紀盛事明年州人管善又割常稔田三十五畝歲入租草有五石籍而𨽻之學宫以供時祭之費三公墓之所在見於殷奎所撰墓田記甚詳記曰王先生字彥光墓在南郭新漕里李先生字彥平號樂菴墓在州治南六里圓明村劉先生字改之墓在馬鞍山東齊其記如此今先生之墓漫不可尋矣余童時聞圓明古墓多被人所發有得槨中金銀珠玉者未久其羣小多惡死比年有一石槨露出當道未斷壞去槨不逺有一菴屢嘗邀其鄉長往視之覓土中志石考其為誰重與封蓋是亦陰隲之一事鄉長未暇也此事雖夙夜不忘自念才力薄弱無以為計時有才力為之有餘者獨肯為彼不肯為此以先生之言不入其耳先生之行不合其心故耳萬一冀得如偰侯者告之今兹尚未有遇也新漕之墓尤不忍言其地久為燔尸壇半被居民屋其上志石頗巨發而磨其刻賣之今復為任姓者墓志龍洲墓雖迷失故兆有石表有祠堂騷人墨客往往攜酒上塜讀其碑文何獨二公具有丈夫子具有科第官位顧若是之斬耶嗚呼若此之類不可盡究也余得此書於鈍菴買紙親手録之謹附區區懷抱於書尾深有待於今之偰侯與好事君子焉耳跋葉都給事先德卷春秋陳其宗器示能守也此數紙在他家不及一羽在葉氏等宗器也此吾與中父子寶愛而詳說之也嗚呼秀實公有名節焉有羣子姓焉有舊田廬焉與中一故紙尚謹謹寶愛况有重於故紙者哉跋夏太守竹卷竹有君子之道中通而外直枝葉相麗無茍亂四時不變其色取是三者舉其大者耳太守寫此豈直資玩好而已哉取其資玩好錯薪灌木紛紛若是之可寫也何獨君與之君與之而天下後世不以為過者是知其有君子之道也書拙菴卷後景泰乙亥蘇松大饑大疫斗米百錢死者交橫于道有寒生持禮部君拙菴卷過海上王以平以平展觀知為鄉故老范陽盧氏舊物恐流放不可復得乃以白粲四斛易之踰半載訪其諸孫中名恢者還之囑曰慎勿再失也夫禮部拙菴落成無年月而記書於洪武乙亥十月今六十年矣以六十年之近而孫曾又頗繁庶此卷已落他手則其歷世既逺子孫寖微者文獻不足宜無怪也以平雖曰好義有田百畝歲費恆弗給孰肯於凶荒艱難之日顧此無用之故紙乎若曰愛其卷首王中書孟端畫曾狀元棨文翰奚為不為已有卒返其故主乎以平昆仲四人其賢掩諸兄宜矣余於恢有說焉人家子孫知重先世遺物雖甚貧不敢輕視易失者惟讀數行書者能之否則或得或喪於心如浮雲略不為之憂喜此以平特歸之於恢也禮部君之先大夫兗州太守恢髙祖也為時名儒雖僅五十而殁著述甚富所望後人收藏者非但一卷詩文而已恢尚當盡心乎哉跋移家圖民移家多出於不得已非樂為之也夫以百年之親戚墳墓室廬孰不願相聚相守而輒忍於棄毁忍之是有不得已者存焉耳且民之倚以為命者曰食缺則不能一朝居蓋無食則無天無天則必死矣卷中所畫男婦共十有五人提攜抱負類皆粗重器物所謂倚以為命若米麥菽粟之類一無所有欲勿移得乎故子貢問政孔子必先之曰足食嗚呼永州之民三世死於蛇泰山之民三世死於虎其毒若是卒之弗移為州縣者使有移民得不為之懼諸吾願看畫如人不願見人如畫也跋范性真行草篆𨽻帖心無二用君子所同劉炫左畫方右畫圓口誦目數耳聽五事同舉無所遺失可謂難矣此冊出於一人一手所作豈非亦一難事也哉楊君示觀書而歸之跋袁安臥雪卷袁邵公臥雪事載汝南先賢傳本傳不載豈史家以其細事略之歟傳載初安父殁母使安訪求葬地道逢二書生指一處云葬此當世為上公安從之故纍世隆盛焉夫以安之寧已凍餓不肯干人是窮居已有愛人之仁矣及當竇憲之間獨能乃心帝室自天子而下惟安是賴則為臣大著愛君之忠矣人能以忠君仁民為心不待葬地天必厚其報也不然安之地憲葬之吾恐書生之言將不驗矣故論者曰其仁心足以覃乎後昆子孫之盛不亦宜乎跋謝克銘草書選唐詩帖竊怪近世選唐人詩者數家率取當世顯名之士若襄陽孟浩非王右丞與善亦無聞久矣不知是時為浩輩者曾有善作否耶用拙翁草書造詣古人深至余恐天下後世有選草者出不知孟浩之輩之有善詩也嗚呼吾心不足豈止草書而已哉吳興沈君宗能獨求其寫選唐詩意有在乎抑無在乎跋江村圖卷江村圖一卷中書舍人夏公孟暘筆也其畫不茍作不妄與不為富翁豪吏所役十日一山五日一水非佳興弗御楮墨性好奕佳興多為奕所奪此卷遲遲十年始得入手公自視頗為平生得意者太倉沈東軒游兩京有能詩聲極好清事數附雜物見寄彼謂博我詩文不應若是之多也余儒者無可為答持過贈之勝於彈棋負於人者逺矣跋足菴自古天下國家之事智者成之愚者敗焉何耶蓋智者知足愚者罔知足故耳古之封户自擇寵愛未巳也即懷道引辟穀之為父子師傅恩遇正隆也即謀出關歸老之計然則彼二子者其智孰過焉所以卒收始終令名故一有儒者氣象一來賢哉二大夫之贊若夫貴為天子貴之極也富有四海富之極也其間又有妄意而求仙捨身而事佛然則彼二君者其愚孰甚焉所以卒蹈及身之禍故一陳悔輪臺一餓死賊手使天下後世之人讀其書考其行事不覺為之歎賞而嗤笑之也長洲姚君正學以足命菴蓋指外物而言非謂內行也若曰內行得無昧招損之戒乎正學以外物為足君子固與之矣茍於內行容或有所未足此又不可不求其足也書世父公據文字後右世父公據文字一卷計紙三幅三場文字共一十三篇應天府鈐縫印如其紙數蓋永樂乙酉科京闈鄉試所謄録者公據已投禮部此特文字耳為世父手書明年㑹試中副榜授河間獻縣教諭遭憂制改饒之安仁世父修癯與先公雙松翁全不類能晝夜飲酒於肉食甚罕用年三十三而歿歿之歲為余始生之辰崑之同榜者三人河東吕旦寅伯睢陽朱泰安士栗睢陽不飲酒今夀九十瘦健善步吾世父已下世五十有三年矣見睢陽未嘗不悲吾世父也卷首批語稱同考官史學正是國子監學正象山史九韶考官王學士主文有兩王學士一為翰林學士松陽王景景彰一為翰林侍讀學士無錫王達達善不知批者為誰是科也府尹南昌向寶提調監試則監察御史沔陽歐陽謙浦江鄭幹焉題蓮經卷後仁宗昭皇帝在東宫時追念仁孝皇后遺命刋刻大乘妙典印施天下此蓋崑山縣僧㑹臣道良請授者泗橋有善男子曰潘紹宗家故饒資好施豫纍歲施豫良穀帛無算永樂某年良修大雄殿需大木紹宗舊市檜柏一長計尺六十價寶楮二千良乃從求之即遣人浮以施良素貴重東宫賜本非大道場弗敢御回奉捧答紹宗紹宗自是旦則授持讀誦一過貴重如良紹宗殁孫竒念出自內廷韜以木函庋諸閣宣德癸丑春二月草日火自家作及堂遂及閣一切繪像與供像之器諸佛羣品悉燬於災翌旦畚除灰燼而大乘妙典獨存無恙函則毁之矣竒舉家驚異忘其罹災之戚逺近聚觀莫不欣喜贊歎余聞天下異事固多率有理存乎其間無其理而有其事多妄也函與紙孰堅函毁而紙弗壞理安在哉是本竒親手韜之親目火之親身出之非若得之他人異方流言然則可信乎抑否乎或曰世尊功德無量無邊而回祿力為之擁護而然也信斯言也獨不使諸佛羣品像器併存之何耶余戅愚且更事少斯理必有能辨之者竒請記其事且言紹宗施豫不獨一良於延祥嘗施米四千斛餘多類此也記鄭氏志石按鄭氏志石髙二尺二寸濶一尺四寸厚三寸五分刻字云曾祖億年資政殿大學士提舉臨安府洞霄宫祖咸故承議郎通判太平州父韋故修職郎紹興府上虞縣簿氏年三十有五其卒也以寶祐甲寅正月二十七日是年十二月壬申葬於崑山縣圓明里姑塋之西偏夫鄉貢進士陳師尹謹記等辭不知何年被盜發出今得之車溪朱尚賢宅石初出圓明一人取回置爨下其家遂大疫意其為祟負而棄諸水濵又一人復取去其家亦病乃棄之新洋江中尚賢知之竟載以歸在其所已數年矣天順七年春三月宋君本道以余愛好為人掩藏冢墓殘碑斷刻來道其事初不知為豫家物也乃具人舟從尚賢求之既至洗刷細讀三代名諱官位始知是吾鄭氏七世祖姑尤恐草草失真於字之模糊處反覆認辨無有訛者明日遍告鈍菴諸公再明日穀雨同上樂菴塜并埋前年所得李溷妻唐氏舊志事甫畢又得顧氏志石於小橋堍下刻字云曾祖堯佐祖伯華故將仕郎父登見從議郎前監行在內藏庫門生於寶慶乙酉得年二十有二卒於淳祐丙午八月十二日明復隨仕宦不克葬以寶祐乙卯九月甲寅窆於崑山縣圓明里祖塋之水南夫迪功郎新特差監行在𣙜貨務都茶場中門陳明復志等辭其石字雖明白惜乎已作兩假不若鄭氏之石雖四字漫漶四角尚完也一時不知師尹明復乃親兄弟考之縣志始得知之寶祐宋理宗年號二年甲寅至今嵗癸未共二百一十年蓋顧氏先歿鄭氏八年後葬一年欲覓故處並與埋藏無從可問因念鄭氏與余固疏逺自吾祖宗視之則均是子孫議擇一日附埋湓瀆先隴左旁謹詳記其事使來者有考也其顧氏之石尚在他日與圖焉記唐姚仙客妻張夫人墓銘天順七年十一月草有八日潁川陳諫葬其父金溪君前期定穴築壙遇唐姚仙客妻張夫人墓在焉得磚一方刻曰夫人京兆人值安史亂離宗族奔喪夫人幼歲避地江南祖考名爵無得而稱爰及不惑歸於姚氏貞元七年十一月草八日終於私家春秋六十有六以十二月草八日葬於馬鞍山北原子長曰涓次曰昕等語銘十二句皆四言然不書撰人氏名序中有天不祐善落我舜華疑仙客自撰也諫祭以文而掩之乃退避三尺為穴焉諫可謂吾門下士哉按夫人生於唐𤣥宗開元十三年葬於德宗貞元七年太歲在辛未歷五代及宋及元至我朝景泰二年辛未又今歲癸未總十一甲子零十二年通計六百七十二年余見古志頗多未有若此刻歷年之最逺也近時小西門外古墓兩所一在井橋南堍水底一在孫郎中新買陳氏宅後各有金銀雜物附葬俱被人發出在水底者遺骼尚存志石未及見又大澞浦支巷一農家治地亦遇一墓云其所得藏物甚多此類在在有之惜其不幸不得盡遇吾諫耳宋譜圖引舊譜一十二翻止於一十二世由文康遡而上之五世曰季一季二季四季五皆後增入焉足徴為宋時所修者其逺可知此則譜之按本也惜乎其間有名諱為蟲鼠嚙缺新譜不敢妄補直書曰某重復裝背題曰鄭氏家寶俾子孫永保守之先世所藏契考文康謹按六提管諱隨知丞諱葦一子六六學士諱􅀈舊譜不見載六七官人者愚意當時自提管而下三世具有官位固非甚貧何至將已業賣錢歟譜中不載六七位次豈因擅賣父地而削之歟不可曉也契稱賣與重五官人為業乃其族姪實文康六世祖也其地復又被重五之姪季二所奪詳見重五之子季四具告尊叔翁判府開國侍郎狀辭宋理宗淳祐七年歲在丁未至明天順三年歲在己卯此本已藏二百一十四年宗孫文康謹考先世所藏狀考文康謹按舊譜無諱公顯者重五諱元輔重五二子曰季四曰季五季五失傳今狀稱重五為先父又稱季二為兄則公顯即季四名字無疑帝字渭地即重五淳祐七年所買族叔六七官人者文契具存可考也狀告尊叔翁提刑必譜中七世祖䇕又告尊叔翁判府開國侍郎必知府竦竦於譜中雖無侍郎之文而崑山志有開國之號志載竦謙和樂易不與物忤狀尾批判必其手澤不然何其辭氣從容筆翰飄逸可愛也所謂三僉判六學士念七宣教長洲縣彭華鄉及帝字渭橫山之墓今則茫無蹤影矣曾祖彥實公夀八十有一卒于永樂元年癸未先公雙松先生時年草二嵗事之甚熟略不聞有一言及二墓所在豈公顯具狀之後不再世而遂失耶公顯實文康五世祖也至元十六年乃元世祖承正統之始年太歲己卯是歲二月宋亡此本至今一百八十一年矣敬觀舊物考而珍藏之明天順三年嵗次己卯宗孫文康謹記平橋藁卷十七
