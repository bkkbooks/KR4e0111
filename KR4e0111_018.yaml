body:
  text: 平橋藁巻十八明鄭文康撰雜著靜齋説扶風馬君益清修好古有志於學名其讀書之齋曰靜予為之說曰君子為學靜其地不若靜其心地靜矣而心不靜地不勝心則心不免於妄動妄動未見靜地有資於學也心靜矣而地不靜心能勝地則心不至於外誘不外誘未見非靜地有妨於學也或者厭輪蹄以亂其聽坌塵以蔽其視求荒間寂寞之濵以為學曰不居是不足以澄神端慮而撓其中也噫是幸無父母妻子之養門户官府之事者歟使其不幸而有之將亦不得為此矣必待其地而後學葢終身有所不能矣茍得靜地而心不能靜其心必曰吾何能為晉楚之富也吾何能為趙孟之貴也方寸之間從横交錯謂靜地能資於學可乎身居闤闠名在州縣公有身役之供私有衣食之累時有暇焉誦詩讀書孜孜切切務求洞達聖賢精神心術之藴他有所不屑也謂非静地有妨於學可乎所以君子之學静其地不若静其心心静莫不静矣顔淵居陋巷孟軻舍學宫之旁陋巷學宫豈荒閒寂寞之濱也哉一為亞聖一為大賢不繫静地明矣馬君以静心而處静地異夫處静而役其心者待時而動將於静齋中人見之奉養堂説所處有順逆所為有難易人多易為於順境而難為於逆地君子求人不求其順而求其逆則盡其人矣人以百年為期貧賤富貴恒半居其間富貴為順境貧賤為逆地處夫順則道為易為居夫逆不能不少變其初心焉惟君子獨能樂為於順而亦勉為於逆也且夫人之於親吾身所自出雖以愚夫愚婦孰不願為盡心力而奉養哉况田園邸第吾親所遺者車馬囊槖吾親所遺者僮奴婢使又吾親所遺者以無一而非吾親所遺者以奉養之不過以彼之素有而自為之奉養焉耳是故身處富貴朝甘暮㫖而不薄烹鮮割肥而不吝不煩教令自能樂為焉不幸禍患出於不虞貧賤迫於身心借耰鋤而有德色取箕帚而有誶語又能甘㫖鮮肥朝暮烹割耶彼一人之身何為於前而不為於後哉因所處之順逆而為之難易也君子奉養其親今日是心也明日亦是心也富貴是心也貧賤亦是心也是知聖賢之學者歟噫藜藿療饑而百里負米者順境乎逆境乎體無完衣而親極滋味者易為乎難為乎君子易其難可也沛國朱君尚賢父母具慶作堂以奉養焉堂成求説於余因所處而異其所為舉世恒半之吾尚賢則無是心使天下之人皆若吾言將多純孝之士哉顧廷器三子字説古人愛子教之必以其道不在令其名與字而已愛莫愛於周公孔子周公謂魯公曰君子不施其親不使大臣怨乎不以故舊無大故則不棄也無求備於一人孔子謂伯魚曰不學詩無以言不學禮無以立不為周南召南其猶正墻面而立也周公教以忠厚孔子教以成人至其名子孔曰鯉周曰伯禽初未嘗求其令也鯉也禽也猶之可也夭為短命周公同列取以名牛為畜産孔子弟子取以字周孔聖人也令字亦夥也命名立字何獨取其不令者哉得非薄其子與弟子而不之愛乎教以忠厚教以成人愛之至也名字令不令不計也後世愛子者異乎古不求本而求末率以令名名其子貴之以金玉期之以富貴他莫遑䘏噫貴之也期之也固亦愛之道也不幸貴之不能使之貴期之不能副其期不亦惑之甚耶蘇城顧廷器年未五十三子已見頭角曰顒曰顥曰頡請余立字余問之三者何義乎廷器曰是亦進之以道也體貌尊嚴曰顒氣清白曰顥飛而上曰頡進之者進以威儀之有顒也進以心志之清也進以趨向之高也予因其義字顒士儀字顥士清字頡士高三者非士不足以知之也予知廷器非貴之也非期之也特進而勉之焉耳進而勉之不失為至愛也三子其無忘自進哉陳尚絅字説經曰衣錦尚絅此惟君子存為己之心者能然市井之人有片錦焉揚揚意氣專以誇耀於人為事否則弗樂者多矣噫以錦為錦尚不足怪甚至非錦為錦者有是心肯尚絅乎膠州學正陳君孟佐名其子曰錦來請余字字以尚絅復請廣其義人有真錦非錦衣之錦比真者歴萬世而不壞仁義禮智中充而本固發而為孝為弟為禮樂文章此我心之錦著而為我身之錦也豐功偉績充塞天地忠肝義膽照耀日月載筆者不能盡其實咏歌者不能悉其辭百世而下深恩厚澤漸漬弗涸此事功之錦而原於心與身者也君子有此心若何哉譽之而弗聞與之而弗居退然惟恐有所譽有所與市井之人能是乎是即絅其錦焉此余與乃君之志也錦再拜領言去王礬字説礬别名羽生河西山谷及隴西武功石門等處有白緣黄黒絳五色其初皆石磊磊焉齒齒焉採得碎之煎鍊乃成礬礬有大用能入藥染家亦多用之不但通都大郡雖窮鄉下里良醫師良色工争先貨居以待不時之需礬為色五而光明者為上澱山王君克信名其長子曰礬其外舅奉議大夫荆府左長史張公循伯字以汝明其意以礬之上者待其外孫焉近克信與長史公相繼下世礬冠而娶世其業而為區氓之長懼無以守家保民也就余求説字名之義併請教策嗚呼克信塟余銘其墓長史塟余填其諱余可孤其問耶乃呼礬來余與爾言礬即石耳子知石之為礬乎煎鍊者成礬之道也君子亦人耳子知人之為君子乎切磋琢磨者成人之道也石為礬人為君子煎鍊而已矣切磋琢磨而已矣切磋道學也琢磨自修也二者求至乎如礬之光明則於守家也何有礬能堅色能療病比歲湖鄉之民旱澇薦臻菜色者多告病者甚子為之長使菜色者易其色告病者愈其病於斯盡心力而光明行之則於保民也何有長史之子克强讀吾儒書者子歸而更問之以為何如周邦楨字説汝南周生士吾鄭氏外孫也其祖惠吉父德元筮日與之冠禮成賓以邦禎字之余為説曰士莫盛於有周尤莫盛於文王之世見於經曰濟濟多士見於傳曰周有八士噫何其盛耶在當時咏歌之者其辭曰王國克生維周之楨子朱子釋之曰楨者幹也築墻之具也國立於士猶牆立於楨以况國非士不國牆非楨不牆迨後以舊邦而膺新命肇立八百年基業固其聖德所致亦曰有疏附先後奔奏禦侮四者之臣要而言之皆士也士乎士乎非楨而何哉吾鄭與周皆士族自祖宗來厠於士林者多矣今德元多才多藝部使者與郡大夫至咸以儒士稱余亦忝進士吾兩人固不敢直以古之士自居亦不敢不以古之士自勉生也居今之世為今之人茍亦能勉之是即周士也然則勉之何先焉鄒孟氏有言堯舜之道孝弟而已矣矧文王乎請從事於孝弟殆將不為邦楨亦必為家楨矣潘廷貴字説竊觀近時子弟名字多取瓊瑤珍珤珩璜琚瑀之類為名復取廷用廷重廷儀廷佩等字為字取之者不憚其煩聞之者莫覺其醜東家之子名瓊西家之子亦名瓊東家之子字廷佩西家之子亦字廷佩甚者孫曽犯其祖而不顧門生犯其師而弗怪此類之名字不但鄉氓為多往往士大夫家亦然也曩遊兩京或同舍或同席甲曰瓊乙亦曰瓊甲曰廷佩乙亦曰廷佩十常四五又不但吾郡為多他郡亦然也及觀歴歲登科錄載各位三代名諱并本位姓字其間以瓊瑤珍珤珩璜琚瑀之類為名以廷用廷重廷儀廷佩等字為字十常四五又不但他郡為多天下亦然也竟莫喻何為而必於此字之名之耶余嘗謂周臣之名不嫌夭孔門之字不嫌牛奚近時紛紛若是之雷同焉潘氏之第三子名璡字廷貴少時因其諸兄名字為之其意深以余所云者為病余曰焉用病勿求其同當求其異子今為編氓卒未有仕路於廷貴未副茍能力修孝弟忠信以求異諸人豈非亦一鄉之貴哉橘泉辯蘇耽將仙吿母曰後二年郴人大疫宜植橘鑿井使病者食橘一葉飲水一􅊦自愈後其言果驗客有問者曰橘葉井水果可療疾乎予曰橘葉不入藥井泉止消渴解熱毒謂能療疾恐未可也然則橘泉果不可療疾乎予曰蘇公往事具載史冊謂不能療疾亦未可也二者曷從乎予曰有理在曰何如曰橘葉井泉不能療疾或能療疫耳客曰以子之言神仙果無乎予曰惡是何言也耽之明效竒驗天下後世無有議其誣者未敢必其無也然則神仙又有乎予曰昔有深嗜酷好之者至忘寢食卒無所遇文成五利皆以詐誅未敢必其有也二者曷從乎予曰有理在曰何如曰孟軻所謂盡信書則不如無書也客意不解務欲畢其説予口吃不能為辭長洲有趙叔仁者隱居錦溪之上為時良醫嘗以橘泉自號必達神仙施療之㫖宜從而問焉與陳自强書康復自强足下向日弔哭令先大夫哀盡而起見置柩北首因怪問故吾子答以先叔在南海殯時柩南首有一大人曰禮當北首遂北首今亦從之竊意不然朱子家禮小斂大斂二圖圖心皆倒書衾字向北字之有上下猶屍之有首足也以故故家舊族凡停喪在堂者率皆南首寒家治喪亦然彼時即欲令吾子返正猶恐彼大人者必有考據質證以此言而中止次日捜檢羣書不見南北定説邑尊生侯明熟禮文博通典故亦嘗以此事請教未獲報劄近者不意家禍又起停喪雖安故常於心不能無疑今日雨中偶讀王源易覽雜傳内一章然後南北之䝉昭然而發矣其引孔子曰塟於北方北首三代之達禮也之幽之故也註曰之幽往幽也北方國北也塟於國北及北首者鬼神尚幽闇往諸幽冥故也殯時仍南首者孝子猶若其生不忍以神待之也以此觀之彼大人者其亦妄説也歟予惟令先大夫高明正大之學人所罕及體魄倒置神魂或恐不安故不敢不告也孟軻謂養生者不足以當大事惟送死可以當大事吾子其亮之十九日康復錄趙彦可事趙彦可吾崑山人洪武初任山東臨清縣知縣公勤寡慾好士愛民其妻受民賂彦可覺之以所賂之物徑白於府復箠其妻而遣之事聞歴任甫一載陞陜西鞏昌府知府噫彦可亦可謂之士矣惜乎崑山舊誌可書而不書今亦不識彦可之子孫有無何在也錄出以補誌書之缺庶見前輩之有人焉歪硯銘歪硯一方穴其面以貯水背陰更作𨽻書勒以歪銘銘曰堅磨有容正處則安為用敬將庶保其完祭胡孺人文維正統九年歲次甲子某月日乙丑開封鄭文康以肴羞之奠致祭於胡孺人之柩嗚呼有其期而未能成其期可緩為而莫容緩其為一迫於官一迫於私官私相迫塟於闍毘陳辭薦酒聊復爾爾嗚呼尚饗徐皋翁喪偶十年未能塟廵按御史下暴屍之令甚嚴一時郡城中在淺土者九百餘喪數日間交馳於道皋翁亦在令中力不能買磚灰舉而火之塟其骨文之鄙意因識之祭朱素菴文維景㤗三年歲次壬申四月十九日甲子開封鄭文康以潔牲清酒祭於素菴朱君之靈曰嗚呼先公密友時維數人唯君最少於君最親道義相許心腹具陳詩酒娛樂争先致勤同心同德有喜無嗔深情厚意磨而不磷彼此綢繆共締婚姻私計百年相保户門夫何一旦失伍離羣先公赴召君入鄉村一時諸老星散雲分四五六年二三其存晚得予吿棲息晨昏舊事雖非寒盟重温終歸寥落無復前倫惟余始仕歲在戊辰舍弟夭折先公喪神疽發於背覆大如盆針刀毒手不忍問聞時一思及芒刺膚身叩罰之由天高莫捫不意今者繼見於君形色敗惡體炙如焚覩今思昔吾斷吾魂自瘡至殂不盈兩旬兩人儒者貪義利人何天弗監罹此苦辛年齒半百猶日未曛先公雖病幸多廿春我父孔哀公尤可憐對面訣别撫柩吟呻死或有靈還結鬼鄰地下往返迭為主賓俾我生者寃痛少伸逭兹悲戚甘此孤貧嗚呼君有五子滿目蘭蓀一枝挺秀為時儒臣顧余無似忝厠縉紳私喜兩家遺澤方殷五十非夭矧已多孫庶以自慰瞑目九京酹以清酒誦以斯文言發於衷莫知其煩嗚呼尚饗吿祠堂祝文惟景泰四年歲次癸酉十一月癸丑朔越十有三日乙丑孝曽孫進士文康敢昭吿於列位祖宗之靈祠堂肇建垂三十年先君存日已漸朽蠧兹者撤舊更新雖選材弗及於前而崇廣倍之經始於秋七月今已落成謹奉神主序列龕中追念先君成造之艱不勝悲咽尚饗先君祠堂建於永樂甲辰年嘗語文康曰片瓦塊磚並無非義之物祭湓瀆古墓文維景泰七年歲次丙子二月庚子朔越廿有七日丙寅開封鄭文康謹以酒肴羮飯之儀祭弔於湓瀆古墓之靈曰人於托體之地皆願付之子孫以圖永逺不幸不再世而鞠為草莽者此非擇地之不善而守之者之寖微弱也顧兹古墓蕪穢有年老長凋殘罔究伊始雖四鄰之恣蝕幸抔土之未夷因連先子之室堂收入吾家之版籍樵蘇逺去羊牛下來王果有情不負五百年之望若敖無祀適當百五日之期躬奠獻之多儀庶精靈而少慰所願陰功黙相年年増犬馬之齡世嗣永昌歲歲灑松楸之飯嗚呼尚饗予童時聞塟者為一道士為宋元不知也國初為村伯所發剖其棺裏用朱漆裂而分諸鄰家為圊桶其人不久為他事敗籍沒家産云吿后土文維天順三年歲次己卯八月庚戌朔越十有九日戊辰進士鄭文康敢昭告於湓瀆后土氏之神念文康年未半百多病早衰正寢歸休必有一日雖古之上聖苐有久近之差孰能逃之今倣古人故事營兹壽藏以待將來謹取明日己巳禮就穆位匠氏興作惟神保佑俾無後艱謹以清酌庶品用伸䖍吿尚饗再祀后土文維天順三年歲次已卯八月庚戌朔越廿有六日乙亥進士鄭文康敢昭吿於湓瀆后土氏之神壽藏聿成既堅既好神既佑之復勞神守謹以清酌庶品用伸吿謝尚饗平橋藁巻十八
