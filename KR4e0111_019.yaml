body:
  text: 附録鄭介菴先生傳載崑山人物傳張大復鄭文康字時乂父壬自號雙松居士居士精儒術而亨於醫居恆謹言笑不喜聞人過失有相告者莊聽之嘗令其辭不得盡其孝友天性也正統十三年公舉禮部試觀政大理未匝月而居士有疾聞京師公馳之不及含已又喪其母夫人公毁瘠不自支喘喘數盡遂不欲前乃就廬闢館𢎞奬後進督繩削墨必顧其安令人人各自得遊誦之暇品劑草木香達户外歲所全活不可殫記秋霜春露輒從一二耆英訪遺郊外斷碑荒塜多所搜述僮僕化之皆欣欣有幽討之致公偉幹豐頥兩瞳子爍爍精光射人談説忠孝如振金玉一時軒蓋旁午春和里中至不能容馬足而公意泊如非其人弗與見也以故平橋之教迄今如山斗云玄孫若曽有籌海圖編等書行世稱開陽先生論曰以豫所聞鄭先生之道甚大其地望可以有為而終其身用之一鄉豈有説歟長老言先生與葉文莊公相厚善蓋嘗分盟出處曰吾經略不及下執事表章先哲領袖後學庶幾近之請以相與卓哉斯語倘亦非造作謂先生者耶豫觀先生杖履所及即荒田野草之間千載上死人重開生面述其一二蓋亦先生之志焉述曰先生存唐李漍妻唐氏志石於樂菴之墓表貞元間姚仙客妻張夫人墓碣於陳諫營葬之時斯亦幽矣趙彥可者吾崑山人也洪武初嘗為山東臨清縣知縣公勤寡欲好士愛民妻受民賂箠而遣之事聞升知鞏昌府絶特之行晦於邑史將令後世不復知彥可何人而先生出之鞏志之中無善不彰雖幽必録斯亦曩者雙松居士不喜聞人之過擴而充之者歟然其道大矣鄭氏於吾鄉故在甲乙之列至先生益顯而後寥寥也嗚呼此其天之未定者耶鄭介菴先生像贊陸釴豐腴充溢其貌之盈端凝靜正其神之清豹蔚彬彬鴻飛冥冥視道義如泰山之重比爵祿於鴻毛之輕文乃彰德詩以言情超一世之塵網流千載之芳名斯所謂尸居而龍現淵默而雷聲者耶鄭介菴先生像贊王世貞鄭介菴先生諱文康字時乂崑山人頎而偉軀意豁如也舉進士自以不能俯仰流俗屬微恙即乞告歸以此終其身先生居恆杜門踽踽少公府迹於書無所不窺而尤善經生義所指授多顯者雖用隱約成好至於表忠烈稱勳閥未嘗不慷慨有深味也故葉文莊公盛仕通顯而時時推先生以為不可及今像殊魁然非山澤癯也所著有平橋藁若干卷贊曰一命未膺飄然里居升斗未沾耕而讀書殁無易名生不辟除以擬靖節人或謂踰吾不知其他其藻弗如明進士開封鄭君壽藏志葉盛此吾友進士開封鄭君所營壽藏也曷為而營之古達人不諱死君所取法也壽藏在崑山縣城西南湓瀆先塋穆位其營為天順三年八月二十一日志之為天順四年十月十有六日若其藏為成化元年三月十三日與夫君之壽五十有三君之壽止於成化元年正月二十四日皆君不諱之日通家子弟門人進士朱萱所填也君鄭氏文康名時乂字介菴則其所題齋居也鄭自開封徙崑山今居崑山之平橋稱開封者識所自出也始顯者宋贈太師豐繼而大之者太宰封華原郡王居中史有傳譜牒有稽郡邑乘有紀載宦迹儒書纍纍不絶者其先世也曰彥實曰以敬曰有林號雙松先生史官謂儒而醫配盧有賢稱者其曽大父大父與考妣也長身偉軀目耽耽光射人高談座中氣蓋一世斷乎上友古人下視流俗輩其氣貌性行之大略也年十七而遊歌邑庠十年而升於鄉又十年而登進士科觀政大理寺大理之堂上下官皆譽之曰能弗久而得請歸養以病弗克再赴職者其宦業也羣經子史批勘翻閲雖卧病不少休指物操觚頃刻數千百言為之皆有深意者存篇章既成輒為好之者持去間與編類成集君見即火之火之再三而猶存平橋藁十八卷皆可傳者其學問文章也崑山故家鄭在甲乙之列君能守家法冠婚喪祭一遵朱氏禮異端左道之徒不得過其家修齊有道尊養卑惠家庭閨閫肅如臨賓風範夙著此君之行成於家也非公事不輕入公府隨時俯仰茍且部使者相傾慕求見非其人亦不之見開門授徒執經而來者自逺相踵接一時後生晚進多出君門下取科第去稱謂必曰鄭先生鄭先生此君之行聞於人成乎物也平居好談忠孝節義事表賢禮士盡力為之斷碑荒塜人不之顧者遇之或徘徊竟日擊節長嘯人莫測其云何或為故人遺老相招擕名山勝景清歌善謔亦不揮謝者其中歲後所自樂也崑山醫學官董伯儒女孫君正室處士潘竒女側室也子膏子育其二子子育為弟友光後也虞何子之婦也幼子受側出以鄭世旁習産醫本薛將仕受復後薛也女二德娩德柔正側出各一也君以有為而不為惟孝友為為政超乎物表是曰知命此鄉之評而知君者以為確論也蓋君之事多可書志略言者有能銘者在也志藏有石用漢𨽻法泚丹其中者君女弟之夫周號氏刻者唐藝皆預為之約不即刻者君之壽未涯當續有所書也以君之命為君杜牧之敘君之事志君之藏者君之友也君之友為吾吾為敕巡撫廣東西等處都察院右僉都御史葉盛與中也鄭介菴先生壽藏記沈魯鄭先生文康字時乂號介菴登戊辰彭時榜進士第觀政大理將授之職遽以終養告歸已而子女婚娶畢遂屏絶勢利惟窀穸為事時年未逾五十而杜門掃軌已三年於此矣營壙之日告始事於后土集所與交洎通家子弟酬飲塜次衆訝爾而相會曰人情樂於有生而惡言終命所以春秋而猶為醫藥巫祝以利生恤死奈何年方鼎盛正增修德業之秋而急為此無祿不祥之舉無乃情實不近夫人哉先生啞然笑曰古而無死爽鳩氏之樂也夫誰得而有焉晏平仲之所以賢於人者惟盡理之常是為委順吾浮吾休得其正焉而已矣嘗於史氏所記得趙太僕之寓荆州陶徵君之居栗里司空表聖之處王官谷皆預為之所而完名高節擅美百世吾將辭逆旅之舍以圖久於此與三子者遊雖其脫然無纍若不可及而吾學焉粗知禮義之所在行焉而不敢有負於初心平居容與而疾日外至命不吾與焉耳豈若溢虛譽以沽重名樂慆淫而多忘諱積隱慝而不可解其為心病不識其何治而孜孜謀生之不暇吾惡乎不厭彼而樂此以盡吾常以俟夫命哉介菴銘有序江浦張瑄正統辛酉余舉於鄉時舍於金陵逆旅主人主人蓋敦朴樂善之士為余言曰吾之舍甚利舉子前年崑山鄭先生文康居此已中選且言先生善行縷縷它不能悉記大約非茍於為人者余因其言而心竊敬慕遂詳記其邑里名氏見崑之人士輒舉而問焉與主人之言無相逺者後先生捷春闈對大廷不旋踵豫告歸里亟欲一見弗果得往往詢其在家介然自守開門授徒雖一介之取與不茍闢一室為藏修之所揭其額曰介菴因以自號著素志也今年王師有事兩廣上命巡撫都憲葉公贊理戎務余得參侍左右蒙不以文字鄙薄從容謂曰吾鄉鄭進士某子知之乎蓋慕柳下惠之為人者所居介菴子其為我銘諸不敢以陋辭夫逆旅主人雖知先生之大都而未探其底裏崑之人士類若可信然人固難知平居號於人曰我介也我介也一旦臨小利害輒變其所守外剛介而內脂韋者蓋比比也未及見其人不敢遽信其實惟公敦行古道不茍毁譽人與先生居同鄉學同師欲知其人視其友則夫先生之介果可信哉世之委瑣者固不足論而過於狷者或盩大道先生之中行必名實相孚言行不爽烏可無述苐愧余久廢文字無以張先生無以塞公命漫挂漏敘而銘之銘曰有翼斯菴有飭斯士名菴曰介志吾素志其志伊何佩服仁義其介伊何辨别義利義有不可利或幸致貴為三公曽不一視富纍千金棄如唾涕人趨於同我行獨異所以然者但求其是有偉介菴名實相類悔吝無憂作止無偽砥柱屹然弗違造次我思古人惟柳下惠徐邈有常似亦不愧模稜反覆固已無謂亦有賢相迎合取媚可鑑可戒可勉而至尚友千古獨立一世庶幾介菴以永終譽介菴卷後跋葉盛古今人名字稱謂有取於介者要之祖魯大夫展禽耳大夫以一德名得聖之和矣而又以介稱之蓋介有分辨意和有含容意初非有二義也大夫之和和而不流此其所以為介歟孔子推之為逸民孟子尊之為聖人且曰百世之師宜哉後來文山丞相有言石介之介為孤峭唐介之介為直方鄭介夫之介敢決之介王介甫之介執拗之介三人之介純於天資荆公之介雜於客氣諸公之為介不同而同有可觀者如此余亦曰今之世吾於介得將相者二人其一故少傅戶部尚書永嘉黃公維其一前征西將軍定襄伯鳳陽郭公登兩人皆以介名菴而吾友進士開封鄭先生時乂適與之同焉噫大夫之介聖賢取與無以議為矣文山之所謂介是非既定其賢與否不容掩矣余之所謂介方將與鄭先生者交觀焉詩曰伐柯伐柯其則不逺朂哉乎先生尚慎夫其所以觀平橋藁附録
