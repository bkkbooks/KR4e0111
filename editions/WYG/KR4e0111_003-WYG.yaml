body:
  text: 平橋藁巻三明鄭文康撰五言絶戊辰元日京國新元日隨朝入紫宸雙親故山下稱壽是何人曙鴉霜冷曉星高羣鴉近九霄禁城鐘鼓動環繞似隨朝思友對雨思君子胸中萬巻書知心非一日有志作眞儒白髪火熾撲難滅波頺防亦傾鏡中新白髪三物總無情讀李太白詩集白髪三千丈秋來日夜生汪倫忽相見無語各含情畫册四景浦濶帆如馬歸心猶厭遲莫因順風裏忘却逆風時水獺荷花下鷺鷥荷葉邊漁舟更數罟誰為小魚憐橋上月如晝魚罾收未曾清光且遲轉留作小家燈雪霽景如畫幾家詩酒歡誰知白屋下連日有飢寒太常卿夏公仲昭進階從二品時年七十七雲鶴上羅衣犀鞶映壽眉年高喜身健恩重覺行遲偶憶芮明府朱商潛彭水竹范淞南四老遺事去縣日已久威風尚爾寒城中舊豪猾不敢舉頭看片玉曾誇我牽絲許問名雁書來報晩耿耿幼時情寡嫂多風節門如法吏家小郎空好事不為表貞嘉雙目老來瞽深衣實稱情年年鄉飲酒不忝大賔名自喜自喜平橋路橋平路不斜若論徃來久誰得似寒家其二自喜傳家物傳家有舊編當時修譜者特記孝宗年七言絶元夕東家火樹夜光飄堂上春寒向晩消楚舞吳歌盈耳目千金一刻度良宵宿車塘張氏舘縣城寒漏雨中沉江舘無人醉擁衾年少書生豈陶穀肻因一笑費千金題趙仲穆出獵圖駿馬胡鷹萬里天飛塵一道暗如煙清平正好調弓馬莫為從禽學少年山齋山齋無事樂忘飢姓氏何須太守知有客叩門驚犬吠若非求藥定求詩新酒初熟約徐寛共嘗候久不至羣鴉飛盡月黄昏不見人來共酒樽坐久隔牆聞犬吠桂花香裏又開門夏日讀書樹下高樹凉風落翠陰古詩三百治平音壯年且盡雙瞳力莫為功名易動心漁樵問答妻子同舟釣浪花曉行淮浦暮長沙采薪只在深山裏得似江湖處處家擔頭春酒一瓢多樹底看山樹底過謾説江湖妻子樂幾人失脚在風波和曾刑部韻曾習江西泰和人訓導崑山兄翬任刑部郎中以詩寄至習邀余同和杜陵花竹怨離居驛使遥傳日下書啼斷西風原上鳥海天愁思正紛如詠鶴丹頂𤣥裳雪羽衣水邊石上最相宜清高不入樊籠裏只許仙人渡海騎寄徐叶祥南州高士有佳兒清節雖貧亦自持閉户讀書多歲月不將名姓向人知春園栁眼茶芽總未抽滿天雲意呌寒鳩轆轤罷轉人蹤静不是春天是晩秋刺牡丹名花不入小家園歲歲花時沸管絃只恐春風容易過鄰翁耕作種𤓰田客中聞弟病家書無雁到京遲兩月沉疴近始知莫是勞心思遠客夜牕多誦鶺鴒詩貧兒哀哀枕上淚成氷哭入長更不忍聴子母同眠猶較可阿婆獨宿更零丁寄海上韓杲一紙相思托便鱗客鄉人寄故鄉人看花深憶山中樂只恐歸遲不見春其二行盡清溪到水涯好山環繞故人家寥寥一犬柴門外只隔橋東幾樹花送洪彦章致仕還括蒼壯年遊宦晚年休落盡紅顔漸白頭别郤江湖風浪險扁舟歸去入安流題西溪書舍倒用韻東家歌舞隔花陰日夜歡情似海深獨有西溪隱君子一編探盡聖賢心富貴功名不動心數掾遥在百花深先人手種庭前樹長得孫枝滿地陰題静室静中風月静中身不見長安市上塵自分封侯無骨相只應終老作閒人其二饑采松苓渴飲泉静中最喜日如年衣冠不接閒賓客只向詩書接聖賢玉立亭前元時崑山王君祐有玉立亭會稽楊亷夫嘗飲其中題詩曰王郎崑之秀玉立而長身亭子如笠大不直一欠伸亭前千尺峯倒影入水濱燒琴有爨桐漉酒有烏巾客來塞屋破露坐草上茵時時來鐵叟共酌羅浮春題曰令小朶雲捧硯為賦此章君祐之宗孫益復亭其地予亦為賦二絶云亭中曾寫鐵仙詩人去亭荒碧草滋千尺危峯今尚在重來磨洗認當時其二玉立長身舊主君百年遺事至今聞宗孫賔客還如舊只欠楊君小朶雲與謝素菴酌酒宣德十年乙夘冬余與朱珤同山陰蔣西齋以公事赴蘇州假舘謝素菴宅有夏顯者崑山狂人酒醉不知何從來語言半莫可了道遇郡人伊侃士剛邀其同過素菴士剛予友也美丰姿顯强其就寢士剛亦欣然從之時夜頗寒素菴家甚貧私念枕衾不備指其逸去顯即使酒大怒發罵四鄰驚問西齋撫慰不解素菴内君畏伏不敢喘息漏下三鼔顯不别而逃明年士剛登進士第擢工科給事中再明年余亦第是歲顯以好酒亡又三年士剛在京因忿死素菴内君亦物故後二十年為景泰五年正月十七日素菴見過酒中偶道及此歴歴如昨日事不勝存殁之感西齋告休在家尚無恙今已八十一歲素菴六十四歲珤四十七歲予少四歲文康識卄年易過似流星對酒憐君已暮齡舊事凄凉半陳蹟一塲春夢不堪聴甲戌歲景泰五年隴頭一夜雪平城海口潮來水就氷百歲老人都解説眼中從小不曾經吾崑高年老頗多唐子華年九十歳陳徳剛年八十九歲歸叔度年八十六歲朱士栗年八十歲諸老皆强健能言晨興一宵酣睡不曾醒忽見東牕日已明自笑起遲非中酒為無人解報鷄鳴藥名詩贈鄭完藥名詩始於唐張籍有江臯歲暮相逢地黄葉霜寒半下枝句宋元來亦有作者永樂初曾狀元在翰林有十首多寫幽思之情有半生空帶宜男草遠客當歸尚未還又石髓難將補骨脂乳香消減見青皮句膾炙人口蔣恭靖集中有八首皆述已懐其言曰莫道衰殘能獨活丹砂曾遇葛仙翁又曰人言此老當歸去總得回鄉已白頭題曰和翰林鄒仲熈韻想一時唱和必尚有人也蘄陽尊生鄭侯作宰吾崑三年其子完來省親平生最愛曾公藥名詩行坐詠歌似有膏馥霑染其齒舌間亦其嗜好在是也今因其還相祖道上采廿八味綴四首送之草果堆盤酒滿觴羮調五味鬱金香誰言沒藥延親壽煉得靈砂貫衆方使君有子正烏頭雙眼空青氣伏牛半夏裏來知母健忍冬歸去亦忘憂有客回鄉賦白駒怕將薏苡混珍珠道園藳本君家刻只載車前百部書紫苑彫殘百草霜醉騎海馬送賓郎紅娘敲折金釵股笑對王孫續斷腔送馬紹榮補學官弟子有客新從泮水游誓將刀筆換公侯若非正學叨封拜終落功名第二籌其二臨軒天子覓眞儒郕國遺編第一書君去盡心須盡讀好擕十傳赴公車安閒脱却朝衫製芰荷芙蓉亭上嘯還歌生來骨相知輕賤長得安閒幸已多喚渡渡頭風急水生波客路歸心向晚多喚出小舟行不上隔江無奈雨來何其二白浪浮空散作花蕩舟食力度年華行人不用愁風雨過得江來似到家觀燒刼圖元僧有提㸃昌都事燒刼事在至正間邑人葉秀實上燒刼圖副現藏五世孫都給事中盛家詳具王尚書直傳福嚴寺裏秃鶖兒不竪旛幢竪賊旗白晝殺人憑佛力嚴沙溝變火坑池其二燒刼誰能作畫圖南陽壯士手親摹官兵一出髠郎死滿縣歌聲聴鷓鴣題雜畫題古今雜畫詩頗多悉棄弗録獨於史事用已意寓勸懲者存之得十八首直道難容竟獨歸離騷賦罷淚沾衣魂靈不逐湘流逝還向懐王殿上飛自古含容解弭災將軍從此負荆來早知一飯三遺矢悔不當初謝郭開纔逢生客便呼郎仙女風情想未忘莫笑思家輕出洞家中自有舊糟糠恨無顧愷刺心鍼擔負風流仗酒醺誰料鄰家機上女懐春不似卓文君追憶蒲鞭漢大夫撲刑雖用得完膚郤憐東魯臧孫氏不去鞭蒲去織蒲壯士輕生易許人圖謀未遂已亡身明知一去無還理底事狂歌竟入秦弱水蓬山幾萬重仙宫未必勝秦宫君王輕聴齊人語空駕樓船入海中史傳荒唐怪事多乘槎那得上天河不知織女支機石遺落人間竟若何讀罷司徒一紙書北軍門外報鑾輿君王若問平時釣不釣功名只釣魚白日豪奴擅殺人生擒不避主家嗔最憐文叔行柔道容得當時强項臣長營兵甲似雲屯號令曾聞遏至尊他日凄凉廷尉獄獄門無復似轅門會稽太守駕行軒山叟龍鍾立道邊買得千金聲價重臨行只用一文錢負擔行歌過古墳故妻猶是飯王孫他年一見呼同載不念前情念後恩一入沙場與漢辭節旄落盡髩成絲生降得似生還樂膓斷河梁五字詩曾奪麻池厭老拳十年深抱死生寃石郎亦是英雄客握手平生不諱言强臣欲竊晉山河萬騎西來奈爾何此日新亭迎候者侍中不及謝安多伴食空居政事堂死時惟剩一空囊家中留得蒼頭在自鬻身錢辦主喪嫁女惟愁致客難君王詔遣共交歡誰知後日生兒樂虛授朝廷五品官壽徐老翁還丹九轉解延齡不及心丹更有靈三戒從來是良藥養生湏讀素王經其二年登七十無老態歲歲壽星光射秋王母蟠桃不須獻醉呼方朔自來偷擬張允懐寄内代内答南京張允懐舍家遊江湖十年一日作寄内并代内答詩各五絶曲盡幽怨情狀似有翻然改悟賦歸之意余恐其既作復止言之而不果也亦各擬五首促之年年曾寄客邊書冩盡眞情只當虛十紙到家無一答恨人心性願消除故園歸計屢蹉跎不是狂夫薄倖多山鳥報人泥滑滑况聞江上有風波寒家諸父挽宗孫又與先人掃舊墳莫聴無稽長舌者浪言身在百花村百花村裏錦成雲盡賣烏程若下春白面書生今漸老有誰年少肻留人思家獨上仲宣樓何處青山是舊游便覔鯉魚先寄信月圓時節大刀頭右寄内頻年收得慰安書畫餅難充腹内饑見説錦城無限好錦城雖好不如歸聞君黒髪漸成皤誰信閨人白更多唱慣閶門楊栁曲無心來聴扊扅歌檀郎蹤跡似風蓬幾夜因縁在夢中不及天孫衾與枕一年猶得一相同一燈一影共成三人問移天只自慙近報歸來非誑説便從牕下種宜男十年隔别面如𤓰無復容顔似舜華只恐到門初下馬一天愁悶悔還家右代内答黄栗妻東海黄栗妻凌氏其夫遠出適海水泛漲里中豪民乘時逼脇使服役隄捍凌氏曰我為婦人救死且不贍焉能事此豪民怒壊其室廬毁傷其薪木凌氏不得已遂自盡事在景泰闕年天時人事總堪哀一婦難當兩様災報與憂民巡撫使早騎驄馬火星來其二不因洪水為豪民逼向黄泉送此身巡撫到來煩説與一時似我尚多人和鈍菴弔樂菴龍洲蓮峯半山四古墓白頭村嫗白頭翁盛事驚看在眼中可惜一抔江上土野花黄蝶領春風一篇醉渡浙江詞不是尋常句讀詩空有故人三十萬等閒盡付酒家兒泗園文脉接蓮峯姓氏曾收縣誌中只為書聲消歇乆子孫誰免哭途窮清江百里古名婁總管佳城此地留龍虎氣消君莫怨新漕風景更多愁新漕王葆墓壽山中人羔羊春酒雜仙桃兩鬢秋霜一布袍白鹿青騾來㑹者滑稽方朔最年高題王同知梅花少年頭角老成身一寸心中萬古春清白自然顔色好江南歌咏有詩人古墓野梅荒草水邊墳無處從人問子孫三尺斷碑今又失幾多遺恨夕陽村送老兵劍光如火馬如飛破敵曾隨大將車斗酒彘肩常不飽胸中磊塊盡兵書題呂推官鳯池春雨竹鳯凰池上鳯凰翎帶雨離披舞舜庭分得一枝盱郡裏清風常滿節推廰班姬陽阿禍水灑塗椒從此劉家火漸消莫恃齊紈長在手西風容易到芭蕉題徐氏隱居南山楊栁北山桑山下人家禮義鄉擕取舊書辭舊隱願從東壁借餘光題倦繡圖暖籠雙袖軃雲鬟繡出鴛鴦帶笑看侍女不須猜倦倚玉纎氷冷怯鍼寒題爛柯圖一局棋殘已爛柯仙家歲月信難過衣衫最是輕柔物不識當時爛幾何喜故人子至百年茅屋幾秋風已見高門在眼中况爾纍纍盡英物高曾元是漢于公題黄生文藳不識黄家玉樹枝偶於草藁見文辭若非沈老同菴裏那得諸生有項斯題梅花送沈太守之廣州笑乘五馬向南天一路仁風捲瘴煙心比梅花更清白任教人説有貪泉題小畫楊栁村西野路荒渡頭風急水如湯客行不用憂狼虎只恐逢人變虎狼宗能寓夏氏舘暑夜以詩招之故人清話類清標清似清風月下飄不及清風能自至故人須待寄詩邀江行逢漁父衣食年年半有無冷風寒雨在江湖長貧不為官家課盡送黄公舊酒壚題倪元鎭雙樹小景百年片紙非朋貝湖海收藏墨未昏金谷園中千萬樹不知留得幾株存題菖蒲抱持清節任清癯獨笑山花醉似泥欲寄楊家舊知已問誰驛使過關西題雲山小隱遠山雲白近山青竹裏芽齋水上亭常恐城中官客至帶將塵土汙階廰讀張騫傳漢家西域是誰開博望功成事可哀斷送壯夫知幾許換將胡物過東來讀歸去來辭折腰懶向督郵前歸去還耕栗里田身到元嘉將十載夢魂只在義熈年江鄉江鄉酒熟黍離離蓴菜鱸魚正及時堪笑同行門外客月明烏鵲歎無枝題劉龍洲像長髯廣額酒杯深人物孤高月下岑七尺微軀三寸舌江湖形迹廟堂心野雲野雲如水湧如湯飛向遥天入渺茫人説野雲閒似我看來翻覺野雲忙懐葉與中三首石浦橋頭少保家有田有宅有船車芙蓉黄菊開將遍白酒蓴羮稨荳茶十畝金潼隔市㕓水香地暖草如煙奉思菴外長松下明月清風不用錢新買齋居近學宫傳家書籍儘堪容北牕又有娱情物三里青山百丈峯題邵啓南橘軒橘葉青青橘柚黄藥罏茶竈盡生光寛衣大袖秋香裏一巻靈樞不下堂其二自古神仙事渺茫郴州橘井漸遺忘家傳只用君臣藥不慣單行施療方懐孫紹先兄弟當家子若林情懐偏向酒邊深里中惡少多相侮不設機關半㸃心送查若庸下第東還讀書不為科名讀若説科名誤此生請看草廬初讀起便知專不為科名其二浮名得失何須較實學盈虛當自强君有長才長十倍好於十倍更增長平橋藁巻三
