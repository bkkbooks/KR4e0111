body:
  text: 平橋藁巻七明鄭文康撰記思誠齋記蘇城葑門東去一舎許有沃壤焉曰甫里茂林隂翳平疇環繞清江浸其後室廬數百家煙火相接雖古聚落米粟布帛魚蝦蔬菓之饒過於山川野縣矧無官府輪蹄之轇轕心目爽豁民不作偽自唐天隨子肥遯其地甫里之名遂聞於天下不求聞達者亦多隠其間其宅一區淪入僧籍今為保聖寺當時曰蓮池尚在騷人墨客過臨其上猶能想像鬬鴨之趣寺之稍南太原祝君以節居之以節力學謹行醉心六經身若不勝衣而於義利之辨毅然不少假貸節同志永道與心融扁其讀書之齋曰思誠屬記於余噫誠者真實無妄之謂思誠者未能真實無妄思之欲其真實無妄之謂也天地之運日月之明山川之流峙萬物之化育誠為體也誠既體物而不遺又何事乎思乎此致曲之功也聖人受命於天而為性存諸心者無非實理見諸身者無非實行其次理之發也未能皆實思之以求其實行之著也未能皆誠思之以求其誠誠者雖有天道人道之殊終亦同歸於誠而已矣此希聖之賢所以庸其力也雖然心之官則思思則得之不思則不得以節不思其他而思夫誠可謂知要者歟學能知要則能盡博矣余亦欲誠而未能者願相與勉之槐軒記太原王君以平隱居東海上母氏壽考兄弟四人無恙恒念西山日薄職所當愛頍弁者集義所當篤乃構一軒於緑槐之下命曰槐軒春酒介壽在是棠棣倡和在是官府賦役之供惟勤畏而無逋緩故終歲得遂其私焉噫亦樂矣予嘗誦潘岳閒居賦曰太夫人在堂有老羸之疾乃御板輿升輕軒逺覽王畿近周家園席長筵列孫子稱萬壽以獻觴咸一懼而一喜又讀漢書姜肱傳載肱彭城廣戚人友愛天至與二弟仲海季江常共卧起及各娶妻兄弟相戀不能别寢肱與季江嘗遇盗兄弟更相争死賊遂兩釋之今以平之母髪固種種幸而聰明未失有田數百畆歲獲粟數百斛可謂有岳之母而無其母之疾有肱之兄弟而無其兄弟之難天之厚以平者多矣此槐軒之所作也嗚呼一軒小物也孝弟大行也以平構軒以事親從兄為事其鄉其里之人豈無亦欲軒其軒者乎大行盡諸已大效見諸人此徳鄰之必然也君子作室豈茍焉富潤而已哉萬竹秋聲記有形之物皆有聲聲者形之所發也聲隨形而為小大逺近小不可大近不可逺故曰鼓鐘於宫聲聞於外鶴鳴於九臯聲聞於天是已蓋有形斯有聲未有無形而有聲者即有之非妄也亦妖也新淦李君宗伯讀書善吟詠工筆札有聲江湖間家於樂溪之上種竹萬竿西風一來鏗然而玉石交閧然而金革至宗伯坐而聽俯而思思而若有不豫色然客有從傍窺之者疑曰聽聲將以悦耳也胡為乎其然哉余聞之噫我有以知之矣夫聲一也君子小人之聽異小人聽聲而溺物君子聽聲而求已葢以形乎我之目者竹也形乎我之身者耳目也口鼻也君臣父子也夫婦長幼朋友也彼之為形有聲此之為形獨無聲乎人慾莫難制乎耳目人道莫難盡乎臣子耳目何聲耶曰聰曰明耳目之聲也臣子何聲耶曰忠曰孝臣子之聲也是聲也發乎邇而達乎逺在已不容偽在人不容諛然則我之耳目果聰明乎抑聾聵乎我為臣子果忠孝乎抑詐逆乎推類而聽愈聽愈懼嘗求在古之人有曰大孝有曰達孝有曰孝友或著聲於一時或流聲於天下後世噫我猶有所未至也夫何而能豫哉茍無其實徒以聲音笑貌取之我恐人之聽之譬猶嘯於梁哭於當道適足為妖妄而已所以聲聞過情君子耻之客曰三時獨無聲乎余曰秋者成物之時猶君子成徳之年也舍是弗聽則衰老漸迫亦將無暇於聽矣客曰聽聲求已彼固為然不知其亦有惡聽者乎曰有焉牝雞膠膠青蠅營營此皆其所惡聽者也客退乃歌曰維竹之貞兮維聲之清兮為君子之儀刑兮再歌曰維他人之有心兮我能探其情兮我豈敢為佞兮請為宗伯夀養浩齋記人物在天地間其盛大流行必待善養而後能若雞豚狗彘也若杞柳桐梓也由小而大由拱把而合抱何耶葢養之以雨露芻豢也又若耳目也性情也血脈也使其悦豫而和暢何耶葢養之以聲音采色歌咏舞蹈也人物且爾矧浩然之氣可不養乎是氣何氣也天地之正氣也得於天而具於人以言其體至大至剛以言其用配義與道厥初本自浩然失養故餒惟君子懼夫舍是無以為志之卒徒也乃有養之之功焉其道何如曰直而已直即集義也猶所謂雨露也芻豢也聲音采色歌咏舞蹈也茍善養之則能塞宇宙貫金石以一身而參天地以一心而贊化育有不難致者矣古之聖王十一征而無敵於天下一怒而安天下之民其征何征耶氣使之也其怒何怒耶氣發之也所以三代盛時人皆有是氣雖不待養而自無或消之弊故當時比屋可封而非後世之所能及也迨夫戰國之時人知以氣使氣不知以道養氣有敵國相征者矣有一怒而諸侯懼者矣其征其怒視湯文之征怒何如耶於是有亞聖者出因門人問荅特發養浩之言以曉天下後世使天下後世皆知有是氣而在所養故忠臣孝子號為大丈夫者自先秦兩漢而下有不勝其紀載焉嗚呼孟子之功不在禹下詎不信夫長洲唐君服周家於二百畝上題其讀書之齋曰養浩余過之與之論説其㫖服周歴舉孟氏得其善養而見諸言行者更僕不置請記於余余不能悉直謝曰為忠臣為孝子我於服周望之怡梅記流天下皆水也而惟智者能怡之峙天下皆山也而惟仁者能怡之植江南皆梅也而惟清者能怡之何耶以其似之焉耳葢智者達於事理而周流無滯有似於水故其怡在水仁者安於義理而厚重不遷有似於山故其怡在山清者之人一塵不染有似於梅故其怡在梅所謂維其有之是以似之也清河張君廷慎孤潔之士剛勁而有節淡薄而不華家於闔閭城之西厭市聲之混濁也乃築别業於山水之間短牆茅屋環植以梅廷慎於將蓓蕾之時日必探焉南枝北柯足跡殆遍及花既放廷慎則命蒼頭治行具若衣篋食匱與夫文房雜物莫不畢備若將有行役者抵其所止息樹下立而倚坐而嘯或歌或咢徘徊瞻眺心之悦之雖聆天樂玩朋貝嘗八珍沐蘭麝不是過之酸風凍雪視猶春日佳麗往則必留旬日而後返不但信宿而已或曰子之清固似矣得無凝滯於物乎廷慎曰吾豈特似其清哉其所以似於我者亦多矣夫人之與物異者以有天地之性也性於君子盡之庶民去之人而物舉世皆然也物而人吾安得而不怡乎請借前箸言之其根柢生意不以歲寒而息有似吾之仁山棲夜處日與詩人處士為伍有似吾之義桃李輕薄不訾不笑有似吾之禮影雖瘦必待月而出香雖微必待風而聞有似吾之智商之鼎神農之本草調羮而羮成攻疾而疾愈繁植諸子亦似吾之信吾安得而不怡乎然則斯五者於松竹奚擇耶曰是又不能無議焉祖龍何物也招其浪封之辱嵇阮何徳也與之沈酣為樂二者梅有之乎春秋責備竊恐不能或逃也余聞之噫成人在性廷慎既能重以自待而又有慎交之志因其請記遂以記之龔鈍菴壽藏巻後記自古衣薪虆梩而麤備然後塟埋之禮起矣有預為身後之謀者所謂衣衾棺槨誌銘祭挽往往多自為之一以悟晝夜不可違一以獲全歸為可樂葢有生必有死未有長生而不死者然死雖所不免君子於立徳立功不以有死而自棄誠以塟者藏也塟以藏體魄也功徳則不可藏也古婁鈍菴龔先生蓋有不可藏者存焉先生自幼隱居海濵不求聞達盡讀先大夫兵科公所遺書惟以修徳修辭為事今年八十有二乃築壽藏於先隴之在縣庠之旁者為歸休之宫托外孫周雍守之有論先生者曰天忍使斯人獨無後乎予維先生𣲖自遇仙翁遇仙之族散在吾崑者甚盛則凡同出遇仙者不必出於家庭皆先生之子弟也先生著述之功孝友之徳言立而行成使後生小子皆有所矜式則凡私淑先生者不必躬侍函丈皆先生之門人也百歲而後徳行在人心者久而弗忘文章在人口者逺而愈傳追維想像孰忍有毁傷其一薪一木者乎聿觀圖成敬識其末李氏家乘記崑山辛居陋家多舊書近得其宋人舊抄一集惜乎首尾脱散頗多中間又被毁裂去者三之一其幸存而未亡者計紙三十有九翻所抄多宋侍御史樂菴李衡彦平祖孫三世祭文挽章予乃以類相從謄錄一册分為六巻題曰李氏家乘附裝語錄之後獨李妻唐氏誌文不繫舊抄葢今年春三月予邀龔鈍菴沈誠學上樂菴圓明之塜家僮陳行朱福於野水之濵得石刻焉即此文也石刻雖云與余祖父之兆同一里先兄九進士之墓為一帶相望皆百歩今則茫然莫能尋矣且圓明里多古塜初余之弔樂菴也纍纍相似莫識某處為是訪諸村之長老共指一處四旁交蝕之餘僅存東西十歩南北二新塜廹之石版露出甚鉅似非當時有力者莫能營此因憶先生臨終囑付其子曰汝祖父母安厝皆有棺無槨只以磚砌覆之石版足矣坐此將信將疑徘徊瞻眺者久之意者先生神靈昭著無乎不在於是北靣三奠而回自後上塜亦只在是更不他適矣然樂菴之塜尚莫可得而定况唐氏明文固在曷從而定之耶所得石刻將以明年附埋石版之上而特登載其文於末事殊世異可勝歎哉余既書完仍令學子别錄一册留於墓鄰楊俊家使里中之來者得以考徴李氏文獻之遺或可因此保存其抔土於永逺也懐賢錄序東崑沈倥侗壯宋龍洲劉先生當壽皇時上書謂中原可一戰而復擯弗用竟以客死於是採其行為小傳一通以補前史之闕復散收其詩詞若干篇將刻梓以傳題曰懐賢錄予取而讀之嗚呼南渡君臣之不振也甚矣葢盈虚消長此天之道亦理勢之常也雖以三代之盛有不能免焉者殷衰於小辛髙宗則中興之周衰於厲王宣王則中興之然則二君果何為而能爾哉余嘗有以考之矣髙宗躬黙思道夢帝賚以良弼乃使人旁求於天下得傅説於版築之間與之論列天下之事宣王内修外攘若仲山甫尹吉甫南仲諸公布列左右出則征伐入則相理所以光復舊物再造邦家彼南渡諸君包羞忍恥忘不共戴天之讐豕突䑕伏今日議和明日議和曽有髙宣一日之志乎於良弼也既無夢賚之徴又無物色之勤幸而挺身有龍洲者出以布衣而任天下之重雖未敢謂其可以比擬商周人物然其忠義之氣固無以異也當時國柄付之小人使斯人之訏謨逺猷不得少見不亦悲夫雖然天生龍洲不在朝廷而在江湖有如龍洲者或在朝廷又隨用隨罷甚至竄殺無已嗚呼已焉哉是誰為之此天意之於趙氏薄矣豈宜獨歸罪於人事也哉送陳重器赴任東安序崑山陳君重器由太學上舍授知東安縣事東安永屬邑永之為郡地連楚越水合瀟湘其野有香茅之産芬馥可愛又有西山澹巖浯溪之勝地雖在郡郡有之即東安之有也重器能酌酒賦詩又善𨽻古得其地殊為可樂况其材堪治劇而東安事簡民淳殆將卧治而有餘裕矣雖然願有告焉吾崑自聖朝開國以來計為令者近三十軰其善政遺愛在人心念念而不能忘者僅兩人焉餘則飄風浮塵冺滅無聞久矣兩人者郾城芮翀子翔襄陽鄭達叔通逺者數十年近者將十年雖兒童走卒愚夫愚婦至今皆能道其為人一聞縣有厲政墨行違法即追念曰若芮若鄭在肻若是魚肉狗彘我乎今安得斯人復來耶嗚呼均為令也一則無聞一則不能忘何薄於彼而厚於此耶是由公論所繫而非私恩小恵之可使然也余與重器皆崑民也兩人善政薰蒸於耳鼓舞於目已非一日咸有為此不為彼之願今重器年始壯氣正鋭有志竟成斯行也不使東安之民異時念之如崑民之念芮鄭兩侯吾知民之志肻已乎其初心肻遂負乎永去郾城逺而襄陽近鄭侯之子若孫不審饑寒飽暖何似重器尚當時一致問以慰崑民之思焉隨身小寳序往年備員鄉校時手抄前人所擬葩經題目一冊標經㫖於章㫖之額附破題於各條之足置諸懐袖旦晚自隨凡可偷閒處所時一展觀以備遺忘雖詩酒謔浪方濃亦間取出當時同游有以近名竊議余者迨後習以為常衆口雖曰難調遂亦莫之非也歲戊午忝科名後原冊竟為同業取去今亦不知何在此特些小餘力若夫逐日功程自有鹵菴所定記註講題作文背義四大條目在初不專事乎此也病間無事重寫此冊題曰隨身小寳與門人小子共之較之舊抄不無增添遺落大同小異於其間天府開塲執此以往亦一短兵也哉賀王指揮得子序崇沙守禦鎮海衛指揮使王侯某年踰五十始獲弄璋之慶嘉議大夫太常寺卿夏公仲昭與侯善喜而謂余曰侯今萬事足矣文其賀之在昔堯封華華封人祝曰願聖人多男子周宣王中興築室既成讌飲以落之詩人祝曰乃生男子當是時可祝之事多矣何乃切切於生男多男之辭乎誠以君子承之於莫可窮之前開之於不可計之後莫有重於此也故鄒孟氏曰不孝有三無後為大殆以是歟古者聖人立法女子必二十而嫁男子必三十而娶各使之惟其時焉而不失者葢欲其於生育之道稟之也固成之也實而無脆弱之患也考之經衛有七子之母考之傳周有四乳八子之母夫以言其時時則若是其壯也以言其數數則若是其多也一曰七子一曰八子其父其母未聞苦其多而厭之者也况在五十之年昔無而今始有者乎若夫庶民之家其事也農工商賈其人也布衣韋帶既無祖宗廕襲半級之爵又無朝廷月給升斗之禄無男固微賤也有男亦微賤也幸而猝添一丁其人亦津津喜見顔面必告人曰吾箕吾裘吾今將有所托矣為之里鄰者湯藥之奉豚蹄之饋莫不各致其情焉矧在世臣世禄之家而有三品之位者乎余聞侯前人之在先朝汗馬之功隨地而著當時紀載天府者實多然其百年以來享有富貴固本其勳勞所致使無深仁厚徳孰能保其久而不衰乎侯將種也其職以武功報朝廷茍能以仁用武將見英物之來袞袞豈有涯哉平橋藁巻七
