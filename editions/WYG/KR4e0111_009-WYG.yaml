body:
  text: 平橋藁巻九明鄭文康撰序東歸集序東歸集者樂安蔣奎章先生繇岳陽而還崑山之詩也先生教諭慈利日嘗言元儒臨川吳澄有功道學宜從祀孔子廟廷朝廷已允行之無幾以謗言得罪外臺先生儒者趨與諂不能作小人狀臺臣去其官先生即怡然居慈之東臯物論不能平咸助其辯詣京白不難事先生笑曰辯固是奚以辯為古人於得失利鈍雖智者莫能逆料預圗茍有遇焉但求俯仰不愧不怍耳栁下三黜未聞一辯且辯未見吾能必信能無俯仰於人乎吾先人之田廬故鄉之山水具在無恙始以布衣出今以布衣還又何辭焉此東歸之詩所由集也嗚呼靖節翁舎彭澤而返柴桑里著歸去來辭以見志篇中備言田園舟車壺觴琴書親戚老少話言笑傲等事末結之曰聊乘化以歸盡樂夫天命復奚疑曾有毫髪芥蒂於方寸地哉故歐陽子曰晉無文章惟陶淵明歸去來辭一篇而已朱子又曰其辭義夷曠蕭散雖托楚聲而無尤怨切蹙之病先生之詩豈有得其流風餘韻歟不能折腰事人不肻屈膝信已二者一心也先生抵家杜門謝客謂健談必取自賤命私室曰黙菴謂卑身必取自辱文私印曰以道自髙可謂得休閒之義湖海竒士有未識者造其室讀其詩考其印文斯人平生將不待問矣贈單日新序東溪單翁日新有仕才而無仕路年將六十縣大夫選為里之老人葢朝廷舊制一里百家有長焉有老焉長取丁産老選齒徳老重而長輕也嗚呼以均體之民又非符檄之銓注有訟許聽有言許言得與朝廷命吏相可否於一堂之上而長不得與雖無仕者服猶仕也崑山散仕四方而休於家者樂翁如始仕相率而賀焉文康嘗伏聞太祖髙皇帝臨御日召畿内老人訪民間疾苦中有趙居任者金壇人也通五經能文章歌詩獨於聖問所及奏對詳盡由是天顔悦懌歎曰老人中有此等人遂即日拜官我朝老人之有官自居任始後遷通政使司左通政永樂初來治蘇松水患剛方正大如神明然其規畫處置無能出其意慮之外一以煦養窮赤為務清心寡慾自謂無慚古人性好飲山水不飲井泉汲者日給其直餘無所擾也其遇贓墨必誅而後已幸或未敗者望其車塵鮮不魂散膽落面色如土朝廷有差遣人出京其所厚者必相戒曰趙通政在彼中須慎之其見敬畏如此此皆得之前㑹稽知縣陳君孟東葢孟東時掌文牘從其徃來者也夫以居任非出學校非由科第向之老人有居任也今之老人豈無居任乎且日新所居去城僅廿里不為不近環其居左右前後皆吾民也不為不多饑寒痛癢盈耳溢目倘一日立玉階方寸地敢不以居任之詳盡者望吾日新乎雖然居任一部使者耳近之部使者朝過而暮續日新與之相見政事之餘從容閒暇又不知能誦斯人否乎送郭廷輝訓導龍游序君子有言科目能進身科目亦能誤身夫何為發此言前人詩有之有朝為田舍郎暮登天子堂者有天福三年來應舉雍熈二載始成名者噫進身者科目也誤身者亦科目也予於郭君廷輝不能無慨焉廷輝崑山人宣徳中嘉興朱鹵菴先生以春秋來掌崑山教事嚴毅方正以師道自任視徳業優劣為待士之次時士四十輩獨余八人增廣讀書勵行得入其眼而親愛之八人陳翊孟佐瞿太安伯暘沈訥文敏張穆敬之夏遂存良葉盛與中余與廷輝也鹵菴學政考徳以日考業以月三月一考周歲四舉分席命題悉如塲屋故事余八人凡遇舉考各以其業采新獻竒求上人無肻退然甘立下風其訓導亦希本齋占第一為已功然而往往居第一不出余八人八人第一獨廷輝所占尤多夫以廷輝之學博而弗雜廷輝之文贍而有理宜其取科第先於衆也八人皆先後選去獨廷輝累數科不合主司之格踰二十年竟以歲貢行嗚呼事亦寃哉今八人中都御史一人按察副使二人部正郎二人教授一人以余不肖亦忝出身已廿有三年廷輝年近五十僅得一㨗俯就訓導而去乃知科目誤人非無為而言也雖然科目固負士矣士可負所學哉科目負士責在科目士負所學罪實在士大抵人情巧於鋭進而拙於晚成晚成則因循茍且之心生所行非所學者多矣廷輝曾大父羲仲讀書萬巻安貧寡合隠然上古之士年五十辟為崑庠訓導至今學者仰為泰山北斗廷輝出處頗與相似吾知其必不肻習世俗晚成之弊自負所學而忝乃祖也送孫飛卿還銅城序樂安孫雲飛卿世家蘇之崑山祖延年有學行以善奕鳴吳東事具蔣教諭所纂崑山新誌延年母朱同里儒者伯盛女兄伯盛讀書十年不下樓年五十不娶與㑹稽楊鐵崖錫山倪雲林軰締文字交鐵崖為撰方寸鐵志雲林為作静喜亭詩嘗自著印文集考若干巻行世延年與伯盛以舅甥為師友故得往返縉紳間延年五子長常世次永世傳世積世繼世傳世積世繼世俱無子常世年十六洪武中謫戍銅鼓飛卿其子也永世二子曰紹先曰嗣昌紹先舊𨽻皇城匠籍中崑山之土田糧税與夫室廬墳墓獨嗣昌為之供守焉噫一家一族丁力各有所事而前人詩書之聲孝弟之行故在也余嘗慨夫世之𨽻行伍者謂已任莫重之役且有罔測之禍恒厚責望於原籍同宗之人稍有不至或遂亡匿或妄稱疾其意故使所司行移冊牘使其族人擾而弗寧然後為快殊不知下而里胥之頑上而州縣之墨藉此公文入手饕餮無厭有如狼虎馴至破家失業者十常八九不但弗寧而已飛卿洞鑒兹弊則曰寧我獨當勞苦使我昆季子姪安居讀書光大我祖宗門閭不亦可乎是以父子兩世歴年六十未嘗有一日責望之私然而紹先嗣昌雖各事事而軍中艱危未嘗一日敢忘也景泰初湖湘薦饑紹先歸其世母來養迨今將十年今年冬飛卿復來奉其母去噫東西相隔七千里兄弟母子孝義厚而不薄謂非前人遺澤浸潤其心可乎鄉之有官者各賦詩為飛卿贈以余老鄰也推為之序云周貢士挽詩序挽詩何俑乎或曰肇自哀三良夫以三良不得其死宜其可哀也近世士大夫死往往亦從而哀之何耶葢於不必哀之中而有可哀者寓焉且如窮居而野處誦詩而讀書修身踐行以化其鄉為禮義廉恥之俗孝弟忠信之行此無位者之所為也一旦而死人莫不哀之哀之者哀其道僅行於一鄉而未及於天下也或左右輔弼或承宣方岳以天下為已任以斯民為我責此有位者之所為也一旦而死人亦莫不哀之哀之者哀其道雖及於天下而未能被於後世也至若積勤一世矻矻求道將為異日立徳立功之用不但人以古之君子望之其亦以此自望彼父母妻子滿眼期待不幸而死非夫人之為哀而誰為其貢士周君宗武之謂乎君蘇之常熟人道成厥躬去年領所司貢上道而殁獨其父母寡孤其妻子嗚呼事非所宜逢而逢之誰為之哉由是向之共望之者咸哀之哀之不足而又形於聲詩連篇累牘而未巳使見之者不容不讀而又不忍盡讀也雖然世有匪材横飛而直上者作孽太過而不得其死上貽父母之辱下貽妻子之禍使親愛之人欲哀不足以哀之視周君何如哉送范元徳詩序范君元徳宋文正公十五世孫也清才正學為時名流余往年遊歌泮宫時與元徳四人同齋舍若今山東副使張穆敬之福建副使沈訥文敏是已元徳年最少志髙而氣鋭自許取科第一舉手可得也余三人舍元徳去已久元徳累以其業試於所司業愈精而身愈屈年踰四十始得領歲貢治任將行與之遊者設祖於問潮館下賦詩餞之余恐其磨礱既久向之髙鋭者能無夷且鈍乎乃執爵告曰夫人之出處遲速早暮固有其時然則君子所存不可因之而為變遷焉先文正在仁廟也職諫垣守大州出將入相忠義滿朝廷勳業滿邉陲名聲滿天下而子孫四百年來愈昌愈熾彼將何修而有此耶葢本其心術之正而充之以學術之正也在當時論者有曰本朝人物以仲淹為第一其學必忠孝為本其志則先天下之憂而憂後天下之樂而樂噫何其偉哉公蘇人也至今我邦之士麤有知識者莫不醉其言而飽其徳雖以余之無似亦必以公厚以自待而不敢自餒况賢於區區者乎又况其孫子乎服堯之服誦堯之言行堯之行是堯而已矣詩曰無念爾祖聿修厥徳請歌以壯行色送龍知縣序吉水龍侯遵叙由監察御史為縣之三年其縣人府從事瞿珵沈文因其考績賦詩餞之求言引首葢嘉定蘇之壯縣為里者七百為户者七萬其户之口與賦之額數則又蓰其户數其壯如此有民情焉有民瘼焉茍非其人有情不能以上通有瘼不可以易告雖以歲和時豐亦不能保無凍餒於其間也矧當旱澇薦臻饑寒滿目不有善政君子孰能收諸溝壑之濵而措之袵席之上者乎侯之初來也適凋瘵之後或曰侯御史必急獄訟刑罰而緩民事侯至謁神視學之餘即求民疾苦而弔問之告病者藥倒懸者解專以撫摩鞠育為務使耕夫織女各盡力於所事然後修舊起廢次第不失其倫或又曰御史較縣令聲勢頓殊侯一旦舍華要而就奔走得無有所不堪而鮮克有終乎久之觀其聲色聲色不隨時而損益察其心術心術不因地而變遷嘗自言曰東南數郡朝廷之根本也天下之民國家之元氣也固根本保元氣乃我為縣者之責我敢無事動揺而耗散之哉侯而知此由是三載之間百里之内向之嗷嗷者得一日之溫飽矣匪侯之政民將卒癉其能有瘳乎古有閽吏𨽻臺中時以所執梃視臺臣賢否而横直之凡初入臺者惟恐其梃之直夫閽吏賤夫也一梃小物也可畏如此况士大夫之公論乎余鄰封之氓也病卧林下踰十年其邑更數令其賢否咸麤得而知之若侯者豈余之所能獨私哉珵故儒家世有宦蹟且多詩書聲故弗辭為之序張教諭壽序天下之事有出智力所能者有非智力所能者葢可能者繫諸人不可能者繫諸天能與不能古之君子恒䖍恭寅畏於不可欺者焉人之私願固多要其大者有三曰富曰貴曰壽考是已貴不可以茍得能修天爵則貴可坐而取也富不可以倖致能法猗頓則富可立而待也若夫壽趙孟之勢弗能刼晉楚之富弗能買日月之明也星辰之逺也一左旋一右轉咸石固能探之矣其能探已壽之幾何泰山之髙也滄海之深也一如礪一如帶賁育固能使之也其能使殘喘一日之强延是何耶以有主宰之者耳其為道也至公而無私極信而不誣如其人則予之非其人則奪之一予一奪修短存焉嗚呼俾爾耆而艾昌而熾君子豈容虚授乎崑山掌教張先生治毛氏詩工古今文辭其初教於邵也邵之士有登進士者矣繼教於杞也杞之士有魁天下者矣其教之盛如此豈無所本而然哉葢以不敢欺其不可欺者耳故其治已者天理也教人者天理也治已或有所未至非敢忘天理智不足也教人或有所未盡非敢舍天理力不贍也其今教於崑也崑士纍纍而起亦將有如杞之士者矣歲辛巳春正月先生登六袠羣弟子歡然執爵稱南山壽求余文侑觴時余在病未有以荅之於兹又三年先生壽益進教益成智力未巳晚節未易限量異時告休還山中秋分之旦春分之夕候大星見於弧矢之南我知天為畏天者發祥焉贈歸克愛序崑邑之勝在馬鞍山而半山橋為山之喉襟焉云半山者以縣治至山當路之半也山之勝雲窻霧閣層見疊出自唐宋郡縣誌登載已然中有孟郊張籍留題詩又有王荆公和章其為勝槩可知至勝國末舊觀雖多陳蹟而城中士女至今花時菊節擕酒上冢登髙望逺者故在也往則率從橋而北焉舍是則迂僻穢汙軒騎不通謂非喉襟而何雖然此特燕游者耳未足以見其要也至其城隍之祠厲鬼之壇驛使之館皆隨山前後而列縣大夫有事告謁祭饗迎送亦從橋而北焉又非喉襟而何此特命吏之事耳猶未足以盡其要也若夫九鄉之民近者數十里逺者百餘里所需菜粟布帛雞豚薪芻菓蔬茶鹽之類以其所有易其所無者咸趨橋而為市焉此民庶飽暖安定養生送死所繫其要如此使壊而弗修則居者困而行者阻民無依歸市無貿遷雖有命吏亦將何以使民足用士女何以及時為樂哉天順辛巳歲雨久水漲梁斷而柱危主縣者患而謀治焉踰年財費民勞績用弗成㑹主者以墨去佐縣者曰事誠在我不得老成人終弗克就緒乃起歸翁克愛於閒散之中俾理其事克愛年將八十矣筋力未衰聰明尚存乃夙夜經營勞悴弗憚環石為梁而柱仍其舊焉幾半載而告畢工於是縣之命吏與城中士女及九鄉之民遹觀厥成靡不讚歎才翁噫韓昌黎作方橋詩其辭曰非閣亦非船可居兼可過君欲問方橋方橋如此作退之儒者何能事於此乎識者知其以宰制天下自况克愛掌鄉賦三十年民帖帖而治正大公平隱然古之良吏宜其於修橋小事何有使其有官為政其方橋之制亦存於心久矣肻以乘輿濟渡哉惜其老而不復仕也送祝以節序太原祝君以節清才正學有希賢望聖之志觀其自名讀書之齋曰思誠可見已年四十未仕今年春嘉禾陶君徳民與其弟濟民甫聞以節名以吳伯剛為紹介捧書幣聘主西階賔席濵行以節不逺數十里求余一言以補行囊之缺嗚呼余久病漸老筆研蕪穢將何言以荅其請乎嘗聞其賔於刑部郎中松陵梅氏矣又聞其賔於冠帶士龎山龎氏矣當其初行時鄉之大夫士詩文贈送者亦已盈箱積案矣以節貯蓄若是其富又欲余言豈前所言者以譽不以規未足以盡其意耶不然何其踰越鄰境而切切有請也我知以節在是無疑矣乃言曰祝欽明在唐中宗朝為國子祭酒帝燕羣臣欽明體肥請作八風舞為樂以手據地搖頭轉目備諸醜狀帝大笑吏部侍郎盧藏用歎曰祭酒五經掃地矣宋祝象器登儒科為太學博士文章道徳為一時宗師其孫穆字和甫從晦菴游刻意問學後著書立言以遺後世夫三人皆儒業祭酒博士皆儒官一臧一否若是之逺哉臧否在當時而公論在後世為吾儒者立心行已不可不慎也以節與余交頗久重厚老成其精神心術之微固不待審察而已洞識之矣豈敢援欽明之事為戒矧儒者之賢猶有賢於象器祖孫者余獨舉此之意詩有之曰豈無他人不如我同姓故耳抑余又有説焉近之館賔者久則怠其敬敬怠則禮乖作賔者久則怠其教教怠則業墮坐是進以禮而退不以義者亦多我於以節之行善交平仲請為徳民兄弟箴伐檀詩人以節尚當友之驄馬青山圖序驄馬青山圖者太倉衛指揮使某侯贈髙君茂卿按行湖湘也作圖者張翬文著圖之意葢取漢桓公雅任御史執正無所回避常乘驄馬京師語曰行行且止避驄馬御史初公雅年十二喪父母事叔母盡孝曾祖祖皆大儒公雅以尚書教授潁川立亷操門生故吏問遺一無所受然其風威動人豈在乘驄之日其志固已素定而然乎今之士大夫往往援其事以擬人人亦往往援其事以自擬茍無其實擬人者失之諛自擬者失之妄奚公雅之差似哉夫御史古官歴代因之而弗革雖各有增改名員大抵以彈劾諌諍為職業至我朝尤為嚴重論其位位不過郎官問其階階不過七品朝夕咫尺天顔與玉音相可否天下事或時言及乘輿則天子改容事關廊廟則宰相待罪嗚呼君子居此不為公雅忍為公雅之罪人其負朝廷莫甚焉茂卿由名進士拜監察御史進士也御史也人皆可能也茂卿通經而博史為文章追古作者守官恒以辱先為懼其視公雅學問之正孝廉之誠是亦公雅焉雖然余忝交茂卿最久平時之望豈在一御史今日之望豈在一公雅然則望之之意安在哉余與茂郷俱蘇人也蘇人能以先憂後樂為心者天下之望也余以斯人而望茂卿也平橋藁巻九
