body:
  text: 平橋藁巻十二明鄭文康撰誌銘淳安知縣陳翁墓誌安止翁與先公雙松先生生同壬戌而翁差長前交先公三十年義相勸而過相規日必相聚行必相伍後不以余小子不學無似又辱忘年交十年齒牙餘論多見奨借於逺方故舊翁年七十有五素善飯初病召余謂曰我死汝為之銘余應曰諾竊意其未即死嗚呼今果死矣忍為之銘耶翁姓陳氏諱皥字孟東安止其别號也上世浙之奉化人元有諱紹參者為崑山州學正因家焉諱雷字華卿諱㣲字顯之諱勉字執中三代曽祖考也翁早孤上惟母李下惟弟晊恐一旦門户遂至頽敝乃専心為法律算數之學勝冠人多用之永樂初郾城芮侯翀由進士知崑山縣事選佳士為吏翁蹶然曰我志也既從事始専心又讀吾儒書乃晝則在公夜則就林松谷先生學春秋偶江雨先生説詩乆之羣經四書悉能領會大義要㫖通政使趙公居任通五經來治蘇松大水州縣無有當其意者一日與翁語異之曰儒生也異日必為循吏呼與之偕事者二年藉其勞而成績頗多滿考入京適總兵官豐城侯有事於交阯奏乞掾史以隨吏部選翁數輩遂從南征轅門機密於數輩中獨得與聞還朝以年勞授會稽縣知縣下車讞減寃囚死罪杖殺害民逃軍人稱快焉河南按察僉事吕旦寅伯古君子也以事去官翁首論薦其賢得授江西建昌府推官其政見翰林學士曾公棨之文曰先是會稽民頑獷不就徭役政務委靡及皥至申敎條明法令不一月翕然從化繼改嚴之淳安政一如㑹稽彼失此得民懐欣戚焉後退休家居囊無素儲雖有漕澧涇薄田百畆資給不足時卑幼三人令丞大縣人覘其或希助翁髙尚其志付不足於度外人亦髙之身長七尺餘性弗縮肉不甚好飲酒歴代史歴歴能記於杜工部詩陸宣公奏議文正忠宣父子集口不釋誦作詩惟宗杜遇已作有與之合輒長嘯放歌旁若無人所著有安止齋藁若干巻晩年尤好譏刺時政與凡君子名而小人行者恒於稠人廣座非議而貶抑之以故人多切怨忿詈以余隨侍日親亦有波及之者雖昔屢以恐失忠厚沮之至是不敢以是為辭而翁之直氣愈壯也景泰六年八月廿六日卒正娶王氏生三女先六年卒側室周氏杭州人夏氏交阯人俱無出王氏生一子曰劭桂氏生一女妾具在最少者今已五十矣孫男四人劭擇天順二年十二月初六日塟合王孺人之兆嗚呼余維先公殁先翁八年而強健過之惟余小子名譽之在人翁實播之受託為銘而無辭以措之徒使余追念夙好而興哀慕也寶善徐翁墓誌銘翁姓徐氏字斯明諱楙昭嘗築堂而落之題曰寶善呼二子亮忱二壻王士紳顧昇立堂下訓之曰善者天理至當之謂吾平生無過人者亦無他好惟以此為寶耳汝輩宜心我之心復自號曰寶善翁父勝祖母倪氏世居崑山楊林塘之上初翁冠沈静謹重同里薛仲實時為江寧縣丞愛之館於甥室後仲實無嗣塟祭皆主於翁一遵禮度由楊林徙嘉定婁塘鎮婁塘之民多居貨翁從其俗室廬之完舟輿之備産業日底廣厚兄子瑾早孤擇室而同居焉心有逺謀識有先見忱為學官弟子攻尚書能文章去年有巡按御史至崑任情考校若忱數輩俱被黜蘇松學總十三處黜者百人百人中學成者半之退有後言雖幸而留者亦羣譟御史翁獨戒忱曰第姑安勿妄言隨波流當修其在已者為官若此鮮不敗若輩後或有更張之理聞者皆笑其迂未乆御史及𤓰卒左遷前之被黜者巡撫都臺大臣初至行郡得其情俾仍復舊業悉其所料惜翁不及見而忱適居憂未獲與兹盛舉也翁之謀見乃如此天順二年四月廿六日以疾卒春秋六十有五男即亮忱亮娶胡氏忱娶王氏亮卒已五年孫男四人曰經娶孫氏曰綸娶吳氏曰縞曰孝祥尚幼女一曾孫男女三以是年十二月六日塟楊林塘之原博陵邵黼忱師也列行於狀忱泣拜而求銘銘曰作善降祥為善最樂阿衡之訓東平之學善樂在人降祥自天彼寶善者篤信其言亦有心法昭告來者於以求之於言之下朱彦達配殷氏墓誌銘孺人姓殷諱妙夀父君瑞母胡氏崑山朱彦達之配也彦達負直尚剛孺人以柔順事之甚得婦道後殁彦達十有五年為景泰七年二月某日夀七十有七子男三曰珍曰珤曰玢女一孫男七曰芹永康縣儒學敎諭曰蕙曰芸曰萱鄉貢進士曰菊曰茯曰苓女五曾孫男女七以天順二年十二月六日袝彦達兆初彦達托交先公頗厚因結為婚姻約曰吾死塟地必求邇若墓寒家墓舊在西湓瀆上花園之東南縣南城外負濠一帶修一里許名東西湓瀆湓瀆東西復有兩花園今西花園尚有名而東花園冺然無聞矣故彦達卜兆東湓瀆逼濠嗚呼余兩家至親不幸有不忍言之事中傷孺人之心者今已十年幸而天性夙成篤信古人之為貴期與之齊天或佑余兩家盡其心終其身是則余小子與孺人之志也墓之所在俾百年之後子孫有可考焉銘曰微其辭惟蘄靈慈以成其期周惠吉室鄭氏墓誌銘汝南周惠吉喪其室鄭孺人悲悼弗堪不忍見其柩於堂裁半月即舉塟西湓瀆新原孺人鄭姓淑安諱上世居蘇之吳縣祖叔孚任中軍都督府都事考昭出贅崑山葉茂實為壻生三女孺人最長姿容秀麗德性婉娩與惠吉結髪相處四十年未嘗一日反目事無專制無違夫子兹殁也故惠吉思之不置焉洪武四年都事公南謫恐子孫昧其所從來乃重編族譜二册具上世事甚詳一授兄子鵬飛一留昭所後昭客死逺方譜亦遭火惠吉雖嘗展觀不能盡記鵬飛繼徙常州音問不相通者已數十年孺人尊宗祖重族屬累嘗遣人訪求其人冀併得上世事實今兹尚未有獲也生二男三女號娶先公雙松先生女民娶駙馬府訓導梁昱女孫曰士生永樂甲申四月一日卒天順己夘正月十日塟以是月廿四日銘曰速其塟不能速其忘吁嗟乎糟糠許廷珪配浦氏墓誌銘鄉貢進士黄琳狀吾崑許廷珪之配浦氏諱淑清以天順二年二月八日卒距生洪武十四年某月日得夀七十有四生男子一曰澤娶龔氏女子二曰某曰某男孫一曰璲娶强氏女孫二曰某曰某女之壻曰周誥楊益孫之壻曰顧式郁慶廷珪擇明年三月十五日塟縣治左陳賣羊巷先塋狀言廷珪兄弟二人兄玉永樂甲午科鄉貢出仕廷珪家城中而田畆散在鄉保以一身周理躬課無暇及内事孺人會計歲用裁度上下若薪以束粟麥以斛寒暑布帛以尺茶鹽醯酒麯之類以斤以斗具有目恒曰贏則傷於浪費縮則苦於不足與其苦於縮寧若傷於贏也臧獲輩食給當時衣授先候無不俛焉以盡其力者獨祭先燕賔不預為之限必極豐厚而後已由是廷珪門望日大而有不可禦之勢孺人弗直以此贊助其夫又能使其子親賢友善往返士大夫間也他若持已簡素不尚服飾之華憫人窮窘能揮儲蓄之物亦其善行孺人考文妣李銘曰於事有為為克有制愈大來世夏存賢墓誌銘天順二年正月某日崑山夏存賢卒於福建建寧之官舍其妻喬氏攜十一歲孽子汶扶其柩還以明年三月十五日丁酉塟所居邵家灣延福菴後菜圃存賢諱佑姓夏氏宣德中由儒士薦起授台之臨海丞時年二十餘頗負英氣不能屈下於人未一載輒得罪例該除名遇恩宥左遷廣東海北鹽課提舉司白石塲大使三年有惜其才者薦之轉禮部鑄印局又改户部檢校批驗所九年通考陞福建建寧府廣實倉存賢積官廿餘年南北走萬餘里始得入從九品官歴四所銜皆大使亦命矣哉為人濶達豪放口不能容掩人過初與之見者意其中之險峻不可近久之乃知無町畦崖岸咸與契合祖友諒妣鄭即先公雙松先生女弟考善長以弟遂貴贈承直郎禮部主事妣林封太安人先是承直與太安人與遂皆塟馬鞍山西麓有地理者過曰此墓多少亡適存賢三弟一子皆不永年存賢亦僅得五十有一喬氏懼不敢塟乃謀易今地就余白故而可否之余曰夀夭有定命夀不可夭夭不可夀非塟地所能可夀可夭也天命固定人事亦能變之立巖牆死桎梏此變夀為夭也寡嗜慾慎寒暑積隂德此變夭為夀也似與塟地無與茍舎舊從新能保山西之封異時不為夷蝕而蕪穢乎喬氏與汶母大慟曰未亡人固弗敢深泥乎此其如險子何且菜圃我家舊物泉甘而土肥予羙平時所遊樂者塟此計我母子之榻去其兆不百歩庻幾朝省暮視可得而躬也於是卒定菜圃之阡當存賢赴建寧時觴余求贊其像余為贊數語深入其意醉躍曰我老死當勒墓門為銘嗚呼孰謂竟在今日耶將塟其從弟應城知縣璣買石余表叔也因取舊贊而刻之其辭曰於其外辭鋒之利也於其内心地之恕也無何其利聞者無不畏也無往非恕畏者無不慰也利使人畏恕使人慰人也異乎蜜口笑刀者之類也是為銘務本翁墓誌銘翁姓馬氏諱隆字士隆自號務本世居常熟雙鳳鄉塗松里曾大父克誠大父元吉考子夀妣沈氏三代皆以衡門泌泉為樂而無河魴齊姜之願故為丘民而殁子夀三子長士德次翁次士良皆端謹質直克肖厥父厥祖同心協力以造家業知貨有悖入悖出之患聚以義而用以義一錢尺帛不敢妄取妄費雖有有名緇黄過門亦謝却之用是家致饒裕而為塗松之右無何弗謹於火室廬邸第盡燬於災公乃書夜竭力經營仍復舊規繼而兄弟相先下世纍然諸孤姪未能成人翁見無父之子多心放慾縱而為汚下之歸乃亟築室於居第之西偏扁曰竹深書舍延良師以托之囑曰藝之工拙質有利鈍勿深罪惟童而巽言弗入冠而幼志弗棄不知德義可尊可貴者幸為我痛箠之由是諸孤長而率履本分咸克肖翁亦猶翁之肖前人也至若殯無棺者遺以木突無煙者與之粟又其常事生於洪武庚申某月日殁於天順戊寅某月日夀七十有九配陸氏夀考在堂生男一曰駿娶張氏女一適凌海孫男三曰綵曰組先卒曰約曾孫男四惟寅惟明惟榮惟清以明年某月日祔七浦塘北先塋銘曰道之有本人鮮知之矧能務之乎知而能務於事多助考言觀德可謂無愧胡汝禮墓誌銘太倉沈廉宗能致其外舅胡翁之言曰我今年六十有五氣體一旦衰甚似不乆於世子將逺行盍為我謝鄭公預乞墓石之刻不亦可乎余諾而不辭廉行僅餘月而翁果卒天順三年三月某日也翁姓胡諱富字汝禮蘇之嘉定人世居太倉南門祖祖乙考通甫妣陳氏三代皆業賈大約計一歳在外日半之由是譜諜散失無從考證上世名位初通甫寓京邸客有誤認翁為畢某者與之叙契濶計嵗月似有乆要狀通甫固知其誤辭則恐其顔頰頳熱遂相對唯唯不敢辯客去同舍共大發胡盧因戲呼為畢通甫乆而江湖相識皆畢呼之不復知其本胡氏也後殁塟東門外今里人亦指為畢家墓至翁之世以訛襲訛有與翁訪宗之同異又有不敢與之聨姻者噫事之初出於戲而後至大誤有如此翁之二兄榮華榮華之子海浹愉恒本姓自若也翁身不踰中人質直而無妄其事端本之事其家法不敢用智力設機巧以射利故門户三代如一日彼反是者雖所獲頗厚而意外之患亦多也盛衰舉墜恒一世三變焉配張氏男一曰懌女即廉婦以是月廿日壬寅塟南門外應江門新阡銘曰用巧多敗用利蚤缺鈍夀於利巧劣於拙惟用愚者恒保完節視翁庶幾匪曰諛説周宗本墓誌銘蘇郡周君宗本年五十有五疾作上有八袠之父從善在堂力疾起抱其首曰兒不得終養矣飲泣而卒往年朝廷有事於西洋選羣藝精良者與偕從善良於醫當行君念老人冒險歴逺乃白狀代之去三年然後返宗族鄉黨皆曰孝哉宗本也在道時母李已謝世君抵家依依柩旁號慟之聲有足感動人者初同里有謝義孚者從善姑之夫也以瘍醫行郡中無子取從善為已子不易其姓托以身後事因授以治瘍之術逮殁塟祭皆從善主之至宗本始大其業其所學旁及諸科又不專於治瘍友人龍患滯下疾苦貧甘死牖下君聞而歎曰若我友也我可坐視而弗之拯哉不待其招袖藥往得瘥姻家趙病疫死家人相染者半雖至親知己莫敢往君旦暮周視調劑卒皆瘥其治瘍瘥者可知己恒言曰醫仁術也行仁莫過乎醫郡之窶者儒業者疾衆莫能療者咸樂趨焉君諱茂宗本其字别號東林曾祖性初祖廷儒世為吳縣人三代皆不登仕版配黄氏子男四曰旻曰昱曰昻曰晐陳黄石李婦之姓也女三人壻曰孫英王銘陸某孫男三曰順曰賚曰頡女二人生於永樂元年十月十九日終於天順元年八月廿五日塟以再明年十二月十二日墓在胥門周家灞嗚呼君樸實渾厚無妄言邪行見短於人雖不獲霑祿位得銜朝廷命身履目覽殊邦萬里外事豈不亦一快哉銘曰孝徵於家仁徵於人内外之徵為嗣人之型朱英齋墓誌銘吾崑前元時有世醫曰劉國英居馬鞍山前業精而家鉅室廬街東西相嚮為間者數十什物器皿小大莫不畢備老無子館三人為壻曰何子雲曰馮思齋曰朱通甫是也子雲宋進士朝散大夫塾曾孫子雲通甫遂從國英授醫藥盡得其祕方密㫖亦為良醫初馮壻未乆即捐館其寡妻遺孤衣與食悉主通甫不煩子雲始終十餘年後國英殁取其産三分之計通甫育孤功獨得十之四至今朱氏何氏兩家百餘年來所居所業皆得之國英者通甫生二子長廷玉次時中廷玉今有五孫安寧源仝浩皆善醫獨諱寧者病聾最有名後其姑之夫陸廷鑑人因呼陸聾近亦殁矣時中生英齋諱英又生貴時中早世英齋遂失其業乃更學為賈其為人質實口若不能言所居貨雖價踴無贗物人爭趨與之市嵗費之外恒有餘貲平生無他異能惟日以懷刑為心天順元年十月十三日年八十而終母妻皆姓李子男四曰璿曰瓛曰瓖曰瑄女一以疾不嫁孫男八緣繩綨繗繼緩綬純卜再明年十二月十二日庚申塟馬鞍山新阡銘曰玉山之陽陳墓之前覆玉而藏無有毁年王以平墓誌銘人有為衆所憎惡無所容其身可死而未死有為衆所愛欲舉皆贊其賢未當死而死小丈夫不能無惑志予謂彼可死而未死者葢將乆暴其醜惡於世彼未當死而死者正使人咨嗟痛悼以增衆所憎惡者之顔甲也此東海王君未當死而死者也君姓王氏諱衡字以平蘇州崑山人兄弟四人君善記歴代諸史盛衰興廢之蹟家有田數百畝嵗收佃者租不計租之常額而視嵗之豐歉豐則取盈歉則降下其數有田家皆惡之君不為改故佃者樂佃其田恒恐入租之後也其租入嵗費之餘不習犬馬聲色無益惟以濟貧結客為事其結客不結聲勢氣焰而結道義雖寒士有文墨藝能亦所不遺建祠堂以龕先主構槐軒以養母志風日佳麗又速諸兄以樂天倫故其死也雖疏逺亦為之咨嗟痛悼而不容已焉初君之殁適余病莫之知踰三月病間始知之問其柩安在告者曰已火之矣嗚呼悲哉余為設位而哭使舉子周文泰致余言往弔其遺孤君家力頗厚能舉塟能舉而不舉葢寡妻幼兒無能與之主者余辱君愛厚死既不知塟又不能與主幽冥之中負此良友於是乃謀其所密上谷成廷珪補刻誌石納其壙君上世在宋多顯人譜牒藏諸兄所嘗兩煩廷珪借考其世系言行收入序中乆之未見發至也廷珪乃訪諸僧房中僅得其家謁僧舉薪狀狀載祖曰伯用考曰公輔母妻皆陸氏天順二年十月十四日卒得年五十有一墓在湖川里摩溪東原三子曰湜曰泌曰慶俱穉母為朱氏女曰素瓊贅周汝欽則正出也此皆得之狀云狀乃予友海虞周紹榮所述紹榮是時何寧以狀抵僧而不以書抵余耶使能抵余余當力疾往而曲為之圖烈焰之慘則以平或幸得而免也茲焉無及嗚呼悲哉若今礱石之費及刻工之直皆出自廷珪贊其事者則沛國朱勗也銘曰嗚呼此王君以平之墓其美無度軒者當式而過詹德言墓誌銘崑山詹諶甫成人喪其父德言襄事嚴乃奉父客梁檼所撰事狀匍匐謁余請為幽堂之銘德言諱宗智德言字也居吳淞之南陶湛橋祖友中考瑜精九數之學號稱名家將仕年三十而殁德言時始六嵗母胡盛年守節嚴閑邪以底於成娶王氏生男即諶女館陶慎為甥諶娶雲間邵汝玉女天順三年十一月二十一日以疾卒享夀六十損一即以是年十二月十二日庚申塟所居東北之原狀列德言讀書知大義諳曉聲律善結客客有負時名者必先人請見焉作廣堂以待肯來儀式刑其仁賢歌道左杕杜自况讌遊則有竹林菓園之勝故德言事親以孝聞居鄉以義齒其得於所資者葢多也檼之狀如此余又訪諸人言歴歴與狀合乃為之銘曰人之德或成於客君於客也克所擇平橋藳巻十二
