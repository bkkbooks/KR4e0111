body:
  text: 平橋藁巻十三明鄭文康撰誌銘宋處士墓誌銘崑山宋翁之没遺言闍毘其屍而蔵其骼今已十年矣其子寧遭家多事久未克安厝天順六年二月廿九日始得地城南之西湓瀆遷其配陳氏之函合塟焉葢陳先翁五年卒翁諱春字景和其先揚州江都人髙祖貫字文英居瓊花觀東南鄉里稱為六提嶺墓在州東門外三里村曽祖性字泰卿祖榮字徳元仕元為海道千户因家崑山之太倉考珪字君章妣楊氏千户與君章皆塟太倉大西門外潮字圩翁又自太倉移家崑山翁為人無意妄求過圗平生以勤為業以儉為徳故家不肥不瘠身不榮不辱享壽八十有三男子二長曰實字本誠次曰寧字本道婦皆蔣氏女子曰守貞壻為貴州興隆衛經歴虞常孫男闕曽孫男十今翁之新阡寒家先壠在其右王氏孫氏在河東周氏在河北相去皆不五十歩皆寧故交舊㜕翁之樂可知也銘曰宅得地吉無不利王古潭同配陳氏合塟墓誌銘死常事也而人多畏之至有鐘鳴漏盡之家猶以後事為諱一夕數至顛倒錯亂卒莫能逃此輩往往於亦讀吾書者見之更誰哂哉惟清心寡欲燭理明白者視之怡然為順事若古潭王翁殆庻乎此翁年七十有一氣體未甚衰憊一日晨興忽覺頭目旋眩餘無所苦乃從容召其子恒與婦嚴語之曰我將觀化矣恒未果信翌旦衣冠而逝景泰六年八月十四日也噫亦偉哉後六年為天順壬午臘月廿四日恒謹擇徐公浦南髙村之原塟焉乃奉練川徐克明狀請銘墓門之石翁諱璣字叔正别號古潭其先閩之福州人髙祖松軒宋任平江路照磨終於官曾祖舉之不能還遂為崑山于氏贅壻舉之有學行多所著述今所藏者僅存梅花一百咏祖瑞卿考天麟皆隱居崑之南戴村南戴密邇雙江永懷寺寺則琇師伯塋開山自後修舊補廢多藉天麟古潭天資敦厚能以誠謹自律早年有事江湖其博聞洽見因游而充中嵗有司委掌鄉賦翁於催科之中厚加撫字隱然有古良牧遺意晚節厭倦官府乃以是役并家務悉付其子日與佳客詩酒為樂搆重屋扁曰望雲旦暮登眺以寓孝思其配陳氏諱某安溪右族仲莊女結髪成禮恭敬如賔友親愛如兄弟後仲莊老無子移翁過其家盡出所有畀之俾主塟事乆之碩人於宣徳己酉九月某日卒夀僅四十有二於時火其骨藳袝陳氏先塋今兹三十幾年矣所生男女四男即恒女之壻陳亮陳浩姜江孫男三曰經娶張氏曰緯娶沈氏曰緒娶葛氏孫女三俱幼初碩人之殁翁念之不置竟不復娶然其終事過人其亦有所本哉至是恒遷碩人之函合焉銘曰一夫一婦偕老是矢茈虒參差固多有此夫鰥可續婦寡惟死於可續者亦有中止山海盟堅或已有子古潭孔義内君多祉中焉暫分終復其始南髙村南新宫在是一笑相逢何如其樂只孫以清配王氏墓誌銘惜薪司大使孫君以清之配王碩人諱某贈嘉議大夫工部侍郎允吉女孫處士子傑女也世為崑山積善家碩人在處子時與母蔡同起居母或少有疾輒憂戚滿容母數日不食飲亦不食飲家人初不知疑其亦有疾其母患之屢紿以已瘥紓其心及適以清以清郡人少從事官府養親碩人事其舅姑如事父母問安調膳不煩以清後父母舅姑相繼淪没一遇兩家遺書故物於目若掬其手澤必下淚故舊或談及其父與舅前言往行必下淚匪直見似目瞿聞名心瞿葢其天性然也以清壯而仕老而休以收始終令名碩人與有内助之道焉天順二年七月十七日疾卒享夀六十有五子男一人曰銘充郡庠弟子員明春秋女三人孫男女二人卜嵗庚辰某月日塟虎丘山之原先事以清遣銘泣拜請銘與之銘曰夫曰順子曰慈懿慈順孝之支考世徳允在兹舒筠澳墓誌銘初余聞雲間有儒者曰筠澳先生隱居吳淞之左古心古行非聖賢書不讀或勸之仕則曰我非適用之材其居家冠婚喪祭一遵用朱子所定家禮家素窶與厥配陸相敬如賓生男充陸殁繼范生男廣屢遭鬱攸之變人為其不堪先生賦詩有囊箱一掃成灰燼獨有凌雲志不消句余心竊慕其人亟欲往拜而從游焉彼時妄意仕進有南北之役未暇也後予賜告歸荷不擯斥得與締文字交者十年雖筆劄月有往來而互致敬恭苐恨未獲一識顔面而叙話言也今年春余卧病山中辱筠澳移舟見過使余驚喜交集時年七十二矣外和而内剛年髙而禮恭聰明未衰不好飲酒而喜談論出經入史切切於天理人欲之辯余為之屈留信宿聽敎良多客有舊識筠澳者就余館速餉午筠澳曰諾客曰當以歌兒為夀筠澳艴然不悦曰爾以是為多儀哉余弗享此也拒弗往客愧使人揮卻之然後往筠澳正大之學峻潔之行一見而兩徵焉别後又辱詩來余亦勉强裁荅方將冀賤軀一日少瘥造謝先施不意竟得訃報事在天順三年九月七日嗚呼筠澳其果死耶其不死耶抑報者誤耶今果死也竊負筠澳多矣筠澳諱斆字志學舒姓其先汴人宋南渡寓家蘇之青龍髙祖七六居士曾祖某祖元輔國朝某府同知考彦和為招民百户錢某館甥今為上海人宣徳初巡撫大理少卿熊公欲薦起之筠澳力以母老辭繼有賢良方正之詔郡縣大夫争先推轂俱不就由是益肆力於問學弟子相從者席不能容敎人讀書不當求之紙上言語俾盡力於性分之内為文章不尚竒巧艱澀躬敎二子業成遣廣補學官弟子充卒又躬敎四孫剛陽翼習弗容少納於邪所著有筠澳集若干巻廣以某年月日奉塟某地易簀之夕呼門人沈璧使求余銘墓上之石璧以告嗚呼銘固弗忍又忍於辭乎乃銘曰君子求道有誠有偽誠者自成偽為鬼魅惟誠身者道焉斯聚謀豈為食行不在利嗟嗟先生永示來世中順大夫福建提刑按察副使沈君墓誌銘嗚呼天之生材也其有意乎其無意乎謂其無意也何以異乎衆者兼備於一人謂其有意也何以獲乎已者不及乎庸人斯固從古有之我於亡友憲副沈君不能無慨焉沈君以正學直道立心制行上有老母年僅四十有六而又無子天難諶斯有若是耶君以天順三年十一月二十日卒於位訃報兄通理還其䘮卜明年某月日塟馬鞍山西麓先塋以余相知頗深求為銘君去年㑹同福建布政司䀻余為鄉試主文考官因病不果行孰謂今竟銘君墓耶君姓沈氏諱訥字文敏蘇之崑山人弱冠遊縣庠學春秋時嘉興朱鹵菴先生冕掌敎事毅然辭色講讀有程而尤嚴於考校嵗四考分席命題悉如塲屋故事君在衆中最少所作文章往往吐竒語驚人鹵菴以竒貨居君宣徳乙夘遂選南京鄉薦第九人會試兩辭乙榜後登正統七年劉儼榜進士第無何丁父趣菴先生憂嵗乙丑授大理寺右評事國朝以刑部都察院獄皆責平於大理允則施行之葢大理民命所闗之地遇未平者皆得駁還其辭務在厭服兩司之心君為之屬凡其所駁能使受駁者無退言時尚書金公都御史陳公咸知大理屬有君而禮貎之正統己巳冬滿初考階文林郎賜勅有式克慎勤之褒贈父方爵如君封母徐太孺人妻杭孺人尋署本寺左寺副事景泰元年沙尤盗起朝廷以福建銀坑去處民有盗採者因亦聚衆為非特簡勅君為按察司僉事專董其事君視事潔已率人正供之外上無掊克之擾下無覬覦之釁民帖然樂趨於役踰年浙江慶元盗王敬區入松溪縣界君擒之盗得不滋蔓三年陞食從四品俸五年盗鄭懷冒起勢頗猖獗君在政和得報狀首先起集各村民快并守塲官軍親自統領勦捕勇不顧身繼而㑹鎮守巡按三司委官然後渠魁授首羣醜悉平時鎮守兵部尚書孫原貞具題曰鄭懷冒偽稱王號造成反謀若非僉事沈訥首先破其巢穴未易就擒等語君之功可見天順二年陞本司副使積階中順大夫君身不踰中人天性明敏刑書素非家學迨入棘寺始取讀之即能諳通微義乃知淹滯苛刻法家大患及居外臺聽斷累數十人在前兩喙争譟君一言折之無不得其情實日不移時而成牘已具矣人雖畏其嚴明欽恤之心未嘗不行乎其間然君之學學乎聖賢君之志志在天下初不專在律學武功而已觀其柩過所部州縣民悲號躃踴者遮其道不能行亦畧可見其人今之誦之者不過曰法官曰廉吏抑末也伯兄通理仲兄誠學一以詩一以古文辭並鳴吳下君兼有之文曰兎園遺册詩曰下里餘音總若干巻惜乎以官掩之善小楷得宋克筆意髙祖伯源曾祖叔陽祖士怡詳見少保南郡楊公所撰趣菴墓表疾革時執太孺人手泣曰歸當以僎為嗣僎通理次子也悲夫銘曰古之仕也以行其志今之仕也富貴為事其志維何曰道曰義義以行道道以濟世懿君之心篤信在是矢用儒術相毗聖治位未滿徳學未盡試賦予速奪罔測天意嗟彼貪頑何以為礪周知縣墓誌銘始予從監察御史季溫周先生游見其季父天澤翁往來其家衣冠杖履歩趨閒雅壯時從事江湖養親其所經山川道里向人道歴歴能記且曰路有險夷安危繫之人多慎險而忽夷恒於夷覆敗我獨視夷猶險夷固安險亦安也善音律時或製新樂府穠豔纎麗多有寓譏刺意者翁二子公其長也諱弁字景星弱冠游邑庠永樂中進升太學嘗理淮陽鹽法能洗其宿弊雖未仕已有聲於六館宣徳初授四川嘉定州蒲江縣知縣蒲在京師萬里外土風民俗頗異先是為縣者民多不安其政公以平日所學者若所謂愷悌平易施之蒲大治後以憂制改福之連江一以治蒲者治之其治如蒲正統丙寅遂得引年家居無事性不好飲酒敎子訓孫之餘日弄禽鳥為樂天順四年二月九日卒享夀八十有二髙祖諱宗曾祖諱太祖諱達卿妣陸配薛子男一曰瓛孫男三曰欽邑庠生曰鎣曰銓女二吳恩諸天民壻也曾孫男一薛孺人之塟也公命術者擇地得之乃手築壙二虚其右自待至是瓛卜嵗辛巳十二月十八日開其封合焉銘曰南闉之左膴膴原前臨沃壤後平川風日孕秀草樹妍𤣥堂髙燥不及泉我銘載石後有傳王彦深同配許氏合塟墓誌銘人家之門户立而仆者恒屢見之有立於人而仆於已有立於已而仆於人立之甚難而仆之甚易要之不出乎玩法浪費二端而已玩法則有忘身及親之禍浪費則無量入度出之謀坐是繁華日短消歇日長有所不免矣余於崑山王公彦深之殁不能無慨焉者公諱安其字彦深家於吳淞之南曾祖夀峯祖福源丁元季繹騷徙居六合入國朝仍還淞南考子昭幸逢太平日惟懷刑為事蠶而衣耕而食不敢奸紀不作無益洪武中有司選為萬石長公挈其弟徳上奉官府下撫窮赤民安而事畢辦子昭殁公為之衆方䑕竊其民公曰民王民也䑕竊必斂怨彼為魚肉公為兒女衆方蠶食其税公曰税國計也蠶食必致禍彼為泥沙公為珠玉衣非不足於華色則安於布素食非不足於兼味則甘於蔬薄衆争鄙之公則喜之衆争嗤之公則宜之其配許諱某孝敬溫惠得舅姑心慮公或變其初節恒以言堅其志於是夫倡婦和心神不驚氣體和適無何向之異公及嘗嗤鄙之者卒之敗露顛憂覆辱無所不至公方髙枕熟睡聞之愈自兢惕乃召其子瓛與其婦董示之曰此前車也慎哉慎哉公老瓛代為之瓛卒其孫銘鑑鏞又為之今銘也公牘無逋負之名村落無吏兵之跡觀此可知其人矣噫是役也始於子昭歴公而至銘為世三四歴年近百則凡祖宗舊物不失不改不仆於已不仆於人誠有得所謂謹持三尺奢也寧儉之大訓歟矧其曾孫曰慈曰孝曰永曰慶又森立庭下王氏之盛殆肇於公乎至若女之壻某咸克守家又皆流風餘韻所及聞公休閒日晨必焚香祝天曰我世積徳善未有顯人惟天其監之今年鑑新登應天府鄉貢進士惜不及見也五年前鑑相其兄銘以禮塟其父於度城湖之坎隅今復以禮塟其祖且曰我日下有官一惟我祖為鄉者為之繫之銘曰九九踰四乃公夀九九踰二婦亦富夫先出世兩年前婦随没世五月後庚辰季春日壬寅仲秋壬戌纊再覆天順六禩灰鬲成臘月廿四術者取有言有行序掛漏蔣君之狀非妄謬周近仁室王氏墓誌銘碩人王氏諱徳娩祖士良父永年崑山新安里人永年名齡濶達大度掌萬石於鄉兒童走卒皆識其名生碩人愛惜不舍出嫁乃館同里周近仁為甥謂碩人曰坐以致夫我負其譏近仁之曾祖曰富九祖曰勝十父曰元吉勝十隱居業儒近仁抱其遺書而讀之將仕不幸早世時碩人僅踰四十謹身逺嫌得寡婦之道焉天順四年七月十七日卒夀六十有四所生男子三曰旻曰昕曰勉沈濮王婦之姓也女子二壻為王烈莊信嫁烈者早寡不再嫁嫁信者其母側室男孫十四庠序某某女孫五男曾孫四完賓寅實卜再明年二月廿五日塟本里杜溪北原袝近仁兆銘曰中道而孀下夀而喪曾孫多男天所償費孟釗墓誌銘費氏世為湖州長興人有諱㮤者當元初乗風雲之㑹掌舶司官至浙東道宣慰使宣慰生拱辰以漕運功授海道都漕運副萬户萬户生二子曰雄曰儁雄世父官儁承祖廕兩為州同知雄之曾祖妣沈祖妣姜生母陸因宣慰公寓松之上海故三夫人皆塟上海邑西之慈雲汴人趙與稷銘其墓碑翰林學士承㫖趙孟頫書篆焉子孫遂為上海人自雄再世至諱谷華配倪氏生彦良配顧氏彦良攜所生二子又從上海徙崑山淞南之同丘此即孟釗祖考考妣也孟釗諱釗字孟釗其弟名敏字世學互往來江湖為業彦良既老析二子為兩房東西並居之孟釗長世學十餘嵗世學老多病孟釗輕身健歩倍蓰其弟不意年七十有四竟溘然先逝天順四年四月廿六日也娶彭氏常州江隂人先廿年卒繼唐氏子男二曰㢲字宗正娶許氏曰元字宗善娶顧氏女一壻吳諒孫男二曰綱字思目娶張氏曰纘尚幼女三以嵗癸未臘月廿二日安厝本里沈四濵上按與稷誌云世系之詳見宣慰萬户二公碑誌惜乎今不可見以考費氏之全盛也銘曰慈雲之刻樹彼中野大書特書無漫漶者宣慰之前尚多顯人文獻中衰世逺言湮公侯子孫必復其始將以俟之在公孫子姜母任氏墓誌銘太學生姜輅之母任碩人年六十有六卒於天順五年三月二十日越明年臘月壬午輅開其考君之封合焉碩人諱善定揚州髙郵人永樂中随其父子善客南京時輅之祖璿寓與之鄰乃問其名䀻為子志剛婦禮成還崑山志剛忽得危疾踰年碩人周旋枕席烹調藥食深憂長慮之色可掬可矜嫁時服御盡為日用所費一無顧吝幸而平復志剛遂從事江湖養親計嵗在家無兩月碩人事厥舅姑委曲承順子雖不在膝下亦弗深念之也碩人晚以多病其治家教子初不以病而廢祭祀以時室廬無壞躬督輅讀書為文章晨而鷄夕而燈輅興亦興輅寢斯寢卒致業成膺貢待銓有日里之舉能婦職母道者碩人與焉所生男女二人男即輅娶唐氏女之壻曰楊讓輅之壻曰董㫤曰諸天錫銘曰東門之右城牖之下有宅孔安樂哉斯土葉輻續誌輻之死箓竹初意擇地夾山塟之土築誌石已具而守鎮諸公請曰彼旅魂孤寓寧無故山之思乃買舟還其喪余以是年九月九日附塟湓瀆先隴之旁誌書葉姓者其意葢欲彼中居人愛其主或知念之耳嗚呼昭瘴地也晉陵鄒忠公銘張明墓備述焉輻童年弱質觸其毒而死可憾也雖然死生有命以一豎子御史斂之都御史銘之而太守又題其石輻何憾焉平橋藳巻十三
