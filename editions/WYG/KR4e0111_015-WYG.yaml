body:
  text: 平橋藁巻十五明鄭文康撰誌銘奉直大夫長蘆鹽運副使致仕陸公墓誌銘正綂丁夘四月四日奉直大夫長蘆都轉鹽運使司副使致仕陸公孟和卒後二年為嵗已巳四月廿四日奉公魄窆於崑城東南新漕上孤宣奉徵士沈文昭狀求書墓石公與文康為忘年交且厚詎忍辭公諱塤陸姓孟和其字也世為雲間人髙祖某徙崑山太倉曽祖文貴祖元真元季沉浮閭里皆不仕父徳賢母張氏洪武初選閭右實京師遂占籍江寧徳賢私幸民京畿遣公入府庠治進士業公内明外和於儒者事無不學於儒者道恒懼有或戾葢本家教之嚴也業成太宗文皇帝詔選能書者入内閣預纂修府尹向寳以公舉己丑事竣授湖廣新寧縣知縣時方年廿四新建楚南之邊邑西鄰羌僰猺獠雜處久難其治公以少年能用古道順其欲而不擾以事政是以舉歴三考上冢宰銓居最増秩從六品時乆勞於用者例得暫閒公歸寓江寜囊無素積日給不足鄰叟里嫗咸訝曰是尚儒生耶母孺人喪塟祭以禮宣徳戊申用薦拜左軍都督府經歴階奉訓大夫都府總内外軍政簿案奏牘旁午轇轕長貳皆勲臣而責成在經歴公以勤能竟超於同官兩考賜誥褒嘉有出典邑政入贊戎幕咸勤厥官之語進階奉直大夫封徳賢同其官母妻贈封皆宜人壬子秋雲南車里軍民宣慰等司交惡朝廷務加来柔未忍即命將問罪遣公往諭曲直彼皆改謝迨還復遣賫金符册其酋長凡兩往返歴三寒暑有功改長蘆都轉運鹽使司副使是位也有為子孫計者多溺居之公行亦有議其淺深者公精白一心畧無疵累無何竊念登列仕版踰三十年筋刀既衰才弗稱禄尚未可退乎數請告遂得致政時年五十四東歸崑山結廬開田園日稱觴為封君夀庋經書為子孫業鬚髩兩翁冠帶相耀不多見也公病痰氣羸弱日甚恐先朝露視乃翁即沈咽日不下數四為是竟不起噫天不憫人子螫以是耶享年六十有二配張氏寶安知縣鏞女弟子男四宣容宏宜女一適瑞州知府夏仲昭子鉞孫男女三公囬時人目其達宦既乆所居皆要位宜有厚儲踰年無異寓江寜日始公不自信而後人自信之也公無愧於出處哉銘曰進之早進以其道退之疾退無失徳無移其操孰涅其白有逆其逢不終其翁是宜歸夫化工也又何尤乎公朱母李氏墓誌銘舉子朱瑄徳敬之母諱阿衍崑山農家李潮女瑄之父字英齋農之飽暖恒足者有二道曰勤曰儉而已母以父家家法移為夫家之用故英齋在永樂中連遭鬱攸之變而門户弗墜以有母在内也姑喪明事之甚謹英齋居貨業賈頗致贏餘母不敢妄用惟儲以供瑄遊學費瑄初在小學暮歸必考問程課休少時即布席展巻促曰膏已然矣瑄吚唔徹鄰家母女紅其傍至夜分瑄寢斯寢雞鳴復先興呼瑄與之盥潄梳沐往肄所業雖有事無容虛其日逮入官校亦然嘗語瑄曰我見橋南沈副使與爾相貌短長畧相似人皆稱其為好官竊問之曰不貪我為爾勞苦將廿年無他望但望爾異日為好官使人稱爾瑄謹受教今年將領貢上禮部而母殁矣天順癸未八月七日也得夀七十有七所生男子四人璿瓛瓖瑄瓖已卒女子一人孫男女十三人以嵗甲申九月庚午祔英齋馬鞍山陳墓前之兆予瑄之經師也復請銘有賢如母烏忍辭銘曰子業就將同榮何弗待觀厥成終當揚賢母名潘桂林墓誌泗橋潘先生去歳暑中辱過余草堂求題宗譜圖并定諸孫名且言復姓事余留宿旬餘得為其記大乗妙典數百言甚喜臨别自念氣體衰甚恐不復来此矣去半載一夕感寒嘔吐卒為天順八年二月廿六日得夀七十曩過時杯話間謂余曰子負潔直名乆矣識不識咸信而弗疑我嘗見人持幣求子銘墓或謝或諾諾則受其幣輒與記其善行數事不識其人果善而無惡乎抑亦有之而不暇書乎子之銘如古人所謂無愧色者有幾乎不然無乃劉义所謂䛕乎得不累夫潔直名乎余謝曰誠有如先生所云葢誌其善而掩其不善古人之書法也撰於前者莫不皆然余何為獨不然乎使善否兼采而並書之何以慰彼孝子慈孫之心乎夫惡之為言逆理亂常之謂逆理亂常之人在君子必深惡而痛絶之者也余雖不肖安敢輕於一諾而與其相濟乎借有人焉曾有及於我庭者乎褒過其實愧色容或有之䛕又豈余之所能乎曰然則茍若是也子今病且老其亦當知已乎獨不觀夫韋貫之之於裴均乎余曰謹受教噫先生之論不亦高哉先生諱竒字桂林祖紹宗父日新妻妾二人各生男二人女三人男曰瑛琇璡瑩女曰明卿者處余側室孫男七人琇之子三人復殷姓曾孫男三人三月某日塟於所居後祖塋瑛請銘墓石余因先生前日高論特為叙其歳月及子姓位數於銘則不敢綴一辭焉封宜人張氏壙誌宜人諱端姓張氏湖州烏程縣人父景忠寳安知縣鏞之女弟為封奉訓大夫左軍都督府經歴陸公徳賢冢婦奉直大夫長蘆都轉運鹽使司副使孟和之配也宜人初嫁孟和遂有新寜之命以少年處官下不為驕奢氣習所移上奉舅姑下事夫子年愈長而心愈卑往来宦途三十年衣能為華而寜於素食能為厚而寜於薄孟和弟篪以孟和故上京墮水死訃聞宜人抱其婦賈與其子宬痛哭曰爾寡孤由我而致共保始終無憂也未寒先衣未饑先食凡可盡情盡力者皆為之不倦賈以其過厚不能勝惶恐稱謝宜人曰第安之在我當如是也及孟和致仕家居日給稍艱猶勉强眷戀不衰不幸孟和殁世門户日漸頺敝始不能相守矣乃與相對終日嗚咽無聊諸子亦各散去自存因得末疾不能行獨與季宜處者十年煙火寒冷不堪余辱孟和素愛時往過之或遇宜於途不敢詳問自愧力不足以振之耳天順七年七月七日卒夀七十有五所生男子四人宣容宏宜女子一人先卒孫男女七人以歳甲申臘月丙午塟合新漕之原孟和墓余既銘之矣宜人墓宏日下已有官當求顯者銘續刻焉陳母金氏墓誌銘碩人金氏諱某崑山縣民隆夀女為陳以信之室太學上舍生瓊之母也以信農家雖不躬親耕耨之役而指揮調度時播時穫恒與碩人偕焉候雞而興分夜而寢素衣薄食弗恥弗厭是以冠婚喪祭慶弔饋問能使以信有麤給之備瓊童時善書行部御史見而愛之遣入官校治進士業碩人家去城北十里瓊在校月一再省見則問其燠寒憫其勞苦訪其業之進否能使瓊専意於學惜乎瓊將有官而碩人不待矣得年六十有二所生男子二長即瓊娶王氏次瑢娶錢氏瑢後半月亦卒年僅二十有六女子一納邵晟為壻孫男曰美聘鄒氏愛卿宜卿其孫女也卒於天順七年臘月二十八日塟於八年臘月二十七日墓在清水港某原即所居後也銘曰夫成家子成名勤儉慈三徳并化者魄存者型陳維明墓誌銘陳氏常熟之塗松大家諱倫字維明者宗美之子竹軒之孫定海縣主簿朱孟林外孫也生二十有二年矣維明天資穎悟狀貌瑰偉好讀書其讀靡晝靡夜雖寒暑寢食咸坐而忘焉積數歳松陽教諭錢君耑學為其經師屢止之曰宜少間弗聽日漸羸弱其祖又止之亦弗聽宗美謂曰爾讀書圖以慰父母顧乃貽父母憂何耶維明曰我自樂此不為疲也其母亦以為言終弗聽竟得疾日處牀席猶抱書堆枕旁天順三年九月三日卒卒之日家人啟篋得所為四書詩經義若干篇古體近體五七言詩又若干首手抄臨唐人詩古法書尤多竹軒挈其藁納諸棺中以六年某月某日塟於祖塋之次娶周氏銘曰古之教學作息有程所以游藝玩物適情使學者作而勿息何晝夜之有名九京可起我將以此而誅生韓子有言業荒於嬉精於勤惟子篤信遂以亡身是又非其罪也我當歸之於天周致和墓誌銘致和諱宰字致和周姓曾大父進學大父强考仲名值元季俱浮沉閭里而殁母吳繼陸致和早事吳晚事陸事陸如事吳陸亦愛如已出致和自幼樹立劇知稼穡艱苦平生以儉為徳計口而田度身而蠶二者取足不以贏或曰須贏有備致和謝曰足則足矣奚以贏為凡人贏多興分外之思與其贏以取敗孰若足僅充用致和繼仲名之世土田不加增屋廬不加飾知足者是焉嘗有盗十餘人夜壊其戸而入家人從隙識其一明發告致和致和曰渠損我可惡聞官則死矣我亡者物彼存者命物與命孰重卒寢其事正統丁卯科其子泰以儒士選南京鄉闈第十六人泰受經於余最名善記人謂其取進士甚易㑹試致和囑曰我三代無仕者幸得一官足矣無論崇卑雖教職慎勿辭及期泰名在乙榜衆勸以辭泰曰辭拂父意也竟授烏程訓導人多惜泰之善記致和易足之心不但處已而又處其子也景泰三年九月九日病痰瘧卒享年五十有八配余氏子即泰泰擇明年甲戌某月日塟馬鞍山之陽銘曰其生也靡毁其殁也靡訾易足有田貽厥子世守耕穫亦良䇿兮朱教諭墓誌銘景泰三年八月廿二日永康縣學教諭崑山朱克誠卒於官其父惟賢扶柩還以十月三日塟乃祖彦達之旁克誠姓朱諱芹克誠字也自幼不凡篤學儒業年十六從予説詩記誦雖拙而筆力甚高月羣試館下經義鎔意鑄語鮮克過之喜飲酒酒後頰赬議論泉湧行輩莫能挫書法宋克得其筆意繼又從刑部主事瞿伯暘説禮竟以禮選應天丁卯郷試明年中乙榜進士授金華永康學諭先是嘉興朱鹵菴掌教崑山嚴毅方正為學者型範古心古行名動兩京克誠在官五載律已導人一以為則婺郡縣職教者獨克誠最少而獨有名如鹵菴之在崑山藩臬大臣争欲推轂而克誠不起矣年止二十有八嗚呼悲夫克誠父惟賢母鄒氏自祖而上已見余叙彦達墓石妻許氏黄巖教諭温如孫男一曰韶女二銘曰進鋭退速理之經也與其夙知寜暮成也不夙不鋭亦或傾也嗚呼克誠殁有名也夏徳威室劉氏墓誌銘劉氏諱桂北京真定人崑山夏徳威之繼室也江西㕘政悦之女為太常少卿仲昭之冢婦徳威元娶奉訓大夫長蘆鹽運副使陸孟和女塞淵溫惠得舅姑心娶六載而卒少卿與徳威旦暮聚食歳時祭饗追思不置陸卒六載而徳威不忍娶正統戊辰少卿由吏部郎出守瑞州續劉為徳威婦劉賢如陸而開爽過之少卿與徳威得劉始忘陸先是㕘政公予告留寓北京止有一子冠而未娶俾還真定營菟裘歳已已冦犯真定殁於難凶問至劉驚得疾再踰年㕘政在京凶問又至疾遂劇景泰四年九月十五日卒年二十有七一子未週歳病革時强抱其子於懐呼家人悉至牀下盡出所有分遺有差至婢嫗亦各有物囑曰我舅七十未有孫我夫三十未有子惟此一息若輩宜寳保之因泣數行下嗚呼賢哉徳威擇十一月八日塟於元配陸氏之左奉舉子范徳元狀來求為銘銘曰人亦有言天勝人我儀圖之理相因賢而傷愛殞厥身元配在右安斯鄰陳復初墓誌銘景泰四年二月廿五日崑山陳公復初卒其子山東膠州學正翊匍匐奔還擇明年甲戌三月九日奉柩合塟母孺人胡氏馬鞍山北麓之兆奉同年鄉貢進士朱旻狀求為銘余與翊同學同時居且同里公之外母與先公外母兄弟也不敢辭公諱善字復初陳姓曾大父正大父求益世居太倉弗仕父繼宗承家饒裕永樂初元朝廷選閭右實京師繼宗與焉遂占籍為宛平人母顧時留太倉與兄某竭力侍事務致其樂縣人胡宗器聞其幼孝館為甥舅甥較諸父子恩愛出自人合多不克終公事其舅如其父縣之為甥者獨稱公為佳壻胡亦自慶所得不止半子也居數歳母顧割貲産三之一畀公公謂已外贅辭歸於兄一無所受所居密邇縣治一蹴即至令丞出入識公為熟客史胥假貸仰公為德主圖謀為作直易易耳公畏官府退縮如懦夫然睨彼公門不但百里人屢有不憚百里至者一日公門往返數四熟客徳主茫無所恃顧乃為計百方輕生重利公遇若輩恒為之蹙額不敢與近逮其屢進屢敗公歎曰與其奸紀而破家孰若守已而逺禍也嘗被誣繫憲臺衆稱其寃數月不得雪公仰天曰我之所恃者惟天耳天何使我乆繫耶造謀者與誣人者俱敗露一自經死一病惡疾死公出曰謂天髙逺者誣天者也自壯至老素履其分而殁年六十有二子三長即翊嘗為禮部㑹試考官次衛次靖孫男四曾孫男二銘曰兢兢恐説其輻也業業以御其服也百鈞千里疇云其覆也彼昏罔知盍亦從其轍也采實造銘来者用告也朱宗海墓誌銘公姓朱氏諱衍字宗海蘇州崑山人曽祖南坡祖均禮前元時隠伏市井中有古君子氣節厥配王氏平生不食素不事佛年一百四歳而終父本道早世公與兄禧尚穉母陳氏率二孤共守以死徇教施恩兼言誘身導詳見中書舍人范陽盧儒所撰誌文公生碩大且儼幼讀書長讀律諳練世務克謹朝家三尺縣大夫而下有謀則就有疑則問公無舞弄心術料事靡或疎漏大夫之賢者謂公有吏才勸其盍仕公謝而不答有愛之不置者或處為一鄉長或處為一里老非其志亦未嘗有所終三年淹其為長為老遇鄉里孝弟節義舉為之揚言於人弗忍埋沒無聞或匪度匪彛愚而自用者必呼至委曲喻以辱身玷先之禍使其改徳率行不幸不及而敗焉復憫其誤罹法網力與解紛然後已故公之鄉之里善者獲播令聞而愚者亦得以寡過免罪也正統初民病饑公請官廪之贏設粥以食惸獨旦暮獨任其勞多藉以生茅家橋通憲臺頽圯弗治公鑿石為梁布甎為街復亭橋之上旁堂觀音大士像咸公義績晩築别業於吳淞之南日與耕夫釣叟為伍不知歳月幾何與夫城府升沉榮辱何如也生於洪武某年月日卒於天順二年某月日享夀七十有幾娶蘇氏男子三人曰璲治春秋學者稱為素菴先生先七年卒娶陸氏曰璧娶唐氏曰洪娶沈氏孫男九人曰昊曰旻鄉貢進士順天府昌平縣儒學教諭曰昪曰昱曰㬊曰炅曰昰曰暲曰曙孫女六人曾孫男五人曰栻曰樐曰格曰某曰棁曾孫女七人冡孫昊以再明年庚辰正月十九日奉塟許墓塘東原匍匐銜哀乞銘為之銘曰年也登登乎爾曾也繩繩乎爾匪徳也其能乎爾陳惟學壙誌銘常熟之塗松陳君宗美有丈夫子五人次曰倫者治進士業垂成而卒今其長諱儒字惟學天順七年八月一日又卒年僅三十有一宗美家素鉅家鉅則事繁惟學憫其父勞不待指使恒以身先而逸之賔客曰將見宗美有休閒期矣其處兄弟妻孥克盡恩義孰謂斯人不永齡耶妻金氏生女子三長者已受王磵聘宗美以歳甲申三月七日塟先塋之側倫壙余嘗誌之今又誌惟學壙悲夫銘曰父失家督妻亡予美咎將焉委平橋藁巻十五
